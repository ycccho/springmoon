<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>마케팅 워크스페이스</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- SortableJS for drag-and-drop ordering -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#fff7ed',
              100: '#ffedd5',
              200: '#fed7aa',
              300: '#fdba74',
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
              950: '#431407',
            }
          }
        }
      },
      plugins: [
        function({ addVariant }) {
          addVariant('dark-mode', '.dark-mode &');
        }
      ]
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans KR', 'Outfit', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    body.dark-mode {
      background-color: #111827;
      color: #f9fafb;
    }
    .editable-cell {
      outline: none;
    }
    .editable-cell:focus {
      background-color: rgba(59, 130, 246, 0.1);
      box-shadow: inset 0 0 0 1px #3b82f6;
      border-radius: 4px;
    }
  </style>
</head>
<body class="text-gray-800 bg-slate-50 min-h-screen">
  <!-- MOBILE HEADER -->
  <header class="md:hidden flex items-center justify-between p-4 bg-orange-600 text-white shadow-md z-30 sticky top-0">
    <div class="text-xl font-bold" id="mobile-brand-name">cho</div>
    <button id="mobile-menu-toggle" class="p-2 rounded hover:bg-orange-700 focus:outline-none">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </header>

  <!-- MOBILE OVERLAY BACKDROP -->
  <div id="mobile-sidebar-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden transition-opacity duration-300 md:hidden"></div>

  <div class="min-h-screen grid grid-cols-1 md:grid-cols-[240px_1fr]">
    <!-- LEFT SIDEBAR -->
    <aside id="sidebar" style="background-color: #dd5828;" class="fixed inset-y-0 left-0 w-[240px] z-40 transform -translate-x-full md:relative md:translate-x-0 md:transform-none text-white p-4 md:p-6 overflow-y-auto flex flex-col max-h-screen transition-transform duration-300 ease-in-out">
      <div class="text-2xl font-bold mb-8 cursor-pointer" id="brand-name">cho</div>
      
      <!-- Date/Time & IP widgets above buttons -->
      <div class="space-y-3 mb-6 border-b border-white border-opacity-15 pb-4">
        <!-- KST Date & Time Widget -->
        <div class="bg-white bg-opacity-10 rounded-xl p-3 space-y-1">
          <div class="text-[10px] text-orange-200 uppercase tracking-wider font-bold">KST (한국 표준시)</div>
          <div id="sidebar-date" class="text-xs font-semibold text-white">로딩 중...</div>
          <div id="sidebar-time" class="text-lg font-bold text-white font-mono leading-none">로딩 중...</div>
        </div>
        <!-- IP Address Widget -->
        <div class="bg-white bg-opacity-10 rounded-xl p-3 flex items-center justify-between">
          <div class="text-[10px] text-orange-200 uppercase tracking-wider font-bold">🖥️ 접속 IP</div>
          <div id="visitor-ip" class="text-xs font-mono font-bold text-white bg-orange-700 bg-opacity-40 px-2 py-0.5 rounded">조회 중...</div>
        </div>
      </div>

      <!-- SIDEBAR MENUS -->
      <nav class="space-y-2 flex-1">
        <a href="#" class="block w-full px-4 py-3 rounded-xl text-sm font-bold bg-white text-orange-700 transition-all flex items-center gap-2">
          💼 워크스페이스
        </a>
        <a href="/?menu=webp" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          🖼️ webP변환
        </a>
        <a href="/?menu=keyword" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          🔀 키워드조합기
        </a>
        <a href="/?menu=keyword-search-count" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          📊 키워드조회수
        </a>
        <a href="/?menu=negative-words" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          🚫 부정단어찾기
        </a>
        <a href="/?menu=html-analysis" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          📝 html분석
        </a>
        <a href="/?menu=url-extraction" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          🔗 도메인 url추출
        </a>
        <a href="/?menu=powercontent" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          🔍 파컨 키워드
        </a>
        <a href="/?menu=about" class="block w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:bg-white hover:bg-opacity-10 transition-all flex items-center gap-2">
          ℹ️ 소개
        </a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="p-4 md:p-8 overflow-y-auto relative bg-slate-50 dark-mode:bg-gray-900 min-h-screen">
      <!-- TOP CONTROLS -->
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <h1 class="text-2xl font-bold text-gray-800 dark-mode:text-white flex items-center gap-2">
            💼 마케팅 워크스페이스
          </h1>
          <span id="storage-mode" class="px-2 py-0.5 rounded text-[10px] font-bold bg-yellow-100 text-yellow-750 dark-mode:bg-yellow-950/50 dark-mode:text-yellow-400">
            로컬 브라우저 저장소
          </span>
        </div>
        <div class="flex items-center gap-2">
          <button id="btn-edit-mode" class="px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-colors flex items-center gap-1.5 shadow-sm">
            ⚙️ 수정하기
          </button>
          <button id="theme-toggle-btn" class="px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 hover:bg-gray-300 text-gray-800 dark-mode:bg-gray-700 dark-mode:text-white dark-mode:hover:bg-gray-600 transition-colors">
            🌙 다크모드
          </button>
        </div>
      </div>

      <!-- PORTFOLIO LIST CONTAINER -->
      <div id="portfolio-container" class="space-y-8 max-w-6xl mx-auto">
        <!-- Rendered dynamically -->
      </div>
    </main>
  </div>

  <!-- PASSWORD MODAL -->
  <div id="password-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark-mode:bg-gray-800 rounded-xl p-8 shadow-2xl max-w-sm w-full mx-4 relative">
      <button id="password-close" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
      <h2 class="text-2xl font-bold mb-2 text-gray-800 dark-mode:text-gray-100">관리자 확인</h2>
      <p class="text-gray-600 dark-mode:text-gray-400 mb-6 text-sm">포트폴리오 수정을 위해 비밀번호를 입력해 주세요.</p>
      <input type="password" id="password-input" class="w-full px-4 py-2 border border-gray-300 dark-mode:border-gray-600 rounded-lg mb-4 bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="비밀번호">
      <button id="password-submit" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition-all">확인</button>
    </div>
  </div>

  <script>
    const PASSWORD = "2";
    let isDarkMode = false;
    let isEditMode = false;
    let portfolios = [];
    let isServerStorage = false;

    // Load dark mode
    function initTheme() {
      isDarkMode = localStorage.getItem("darkMode") === "true";
      applyTheme();
    }

    function applyTheme() {
      if (isDarkMode) {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle-btn").textContent = "☀️ 라이트모드";
      } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle-btn").textContent = "🌙 다크모드";
      }
      localStorage.setItem("darkMode", isDarkMode);
    }

    document.getElementById("theme-toggle-btn").addEventListener("click", () => {
      isDarkMode = !isDarkMode;
      applyTheme();
    });

    // Date/Time Clock
    function updateClock() {
      const now = new Date();
      const kstTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3600000 * 9));
      const year = kstTime.getFullYear();
      const month = String(kstTime.getMonth() + 1).padStart(2, '0');
      const date = String(kstTime.getDate()).padStart(2, '0');
      const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
      const day = dayNames[kstTime.getDay()];
      const hours = String(kstTime.getHours()).padStart(2, '0');
      const minutes = String(kstTime.getMinutes()).padStart(2, '0');
      const seconds = String(kstTime.getSeconds()).padStart(2, '0');

      const dateEl = document.getElementById("sidebar-date");
      const timeEl = document.getElementById("sidebar-time");
      if (dateEl) dateEl.textContent = `${year}년 ${month}월 ${date}일 (${day})`;
      if (timeEl) timeEl.textContent = `${hours}:${minutes}:${seconds}`;
    }

    async function loadVisitorIP() {
      try {
        const res = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        document.getElementById("visitor-ip").textContent = data.ip;
      } catch (err) {
        document.getElementById("visitor-ip").textContent = "확인 불가";
      }
    }

    // Mobile sidebar handling
    const sidebar = document.getElementById("sidebar");
    const backdrop = document.getElementById("mobile-sidebar-backdrop");
    const mobileToggle = document.getElementById("mobile-menu-toggle");

    function toggleMobileMenu() {
      sidebar.classList.toggle("-translate-x-full");
      backdrop.classList.toggle("hidden");
    }

    if (mobileToggle && sidebar && backdrop) {
      mobileToggle.addEventListener("click", toggleMobileMenu);
      backdrop.addEventListener("click", toggleMobileMenu);
    }

    // Load brand name
    const brandNameEl = document.getElementById("brand-name");
    const mobileBrandNameEl = document.getElementById("mobile-brand-name");
    const savedBrand = localStorage.getItem("brandName") || "cho";
    if (brandNameEl) brandNameEl.textContent = savedBrand;
    if (mobileBrandNameEl) mobileBrandNameEl.textContent = savedBrand;

    // Fetch API implementation
    async function loadPortfolios() {
      try {
        const res = await fetch("/api/portfolio");
        if (res.ok) {
          portfolios = await res.json();
          isServerStorage = true;
          const badge = document.getElementById("storage-mode");
          badge.textContent = "서버 저장소";
          badge.className = "px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 dark-mode:bg-green-950/50 dark-mode:text-green-400";
        } else {
          throw new Error("Server API missing or KV not bound");
        }
      } catch (err) {
        console.warn("Server storage failed, loading from localStorage:", err);
        isServerStorage = false;
        portfolios = JSON.parse(localStorage.getItem("portfolio_data") || "[]");
        const badge = document.getElementById("storage-mode");
        badge.textContent = "로컬 브라우저 저장소";
        badge.className = "px-2 py-0.5 rounded text-[10px] font-bold bg-yellow-100 text-yellow-750 dark-mode:bg-yellow-950/50 dark-mode:text-yellow-400";
      }
      renderPortfolios();
    }

    async function savePortfolios() {
      // Serialize DOM values into portfolios array first
      serializePortfoliosFromDOM();

      if (isServerStorage) {
        try {
          const res = await fetch("/api/portfolio", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(portfolios)
          });
          if (!res.ok) throw new Error("서버 저장에 실패했습니다.");
          alert("서버에 성공적으로 저장되었습니다!");
        } catch (err) {
          alert(`❌ 저장 오류: ${err.message}. 로컬 저장소에 우선 저장합니다.`);
          localStorage.setItem("portfolio_data", JSON.stringify(portfolios));
        }
      } else {
        localStorage.setItem("portfolio_data", JSON.stringify(portfolios));
        alert("로컬 브라우저 저장소에 저장되었습니다!");
      }
      isEditMode = false;
      document.getElementById("btn-edit-mode").textContent = "⚙️ 수정하기";
      document.getElementById("btn-edit-mode").className = "px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-colors flex items-center gap-1.5 shadow-sm";
      renderPortfolios();
    }

    // Toggle edit mode / authentication
    const editBtn = document.getElementById("btn-edit-mode");
    const pwdModal = document.getElementById("password-modal");
    const pwdInput = document.getElementById("password-input");

    editBtn.addEventListener("click", () => {
      if (isEditMode) {
        // Save
        savePortfolios();
      } else {
        // Prompt password modal
        pwdInput.value = "";
        pwdModal.classList.remove("hidden");
        pwdInput.focus();
      }
    });

    document.getElementById("password-close").addEventListener("click", () => {
      pwdModal.classList.add("hidden");
    });

    document.getElementById("password-submit").addEventListener("click", handlePasswordSubmit);
    pwdInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handlePasswordSubmit();
    });

    function handlePasswordSubmit() {
      if (pwdInput.value === PASSWORD) {
        isEditMode = true;
        pwdModal.classList.add("hidden");
        editBtn.textContent = "💾 저장 완료";
        editBtn.className = "px-4 py-2 rounded-lg text-sm font-semibold bg-green-600 hover:bg-green-700 text-white transition-colors flex items-center gap-1.5 shadow-sm";
        renderPortfolios();
      } else {
        alert("비밀번호가 올바르지 않습니다.");
        pwdInput.value = "";
        pwdInput.focus();
      }
    }

    // Add portfolio card
    function addPortfolioCard() {
      const newCard = {
        id: "card-" + Date.now(),
        logo: "",
        clientName: "",
        businessType: "",
        salesTable: [
          { period: "마케팅 진행 전", value: "", note: "" },
          { period: "마케팅 진행 후", value: "", note: "" }
        ],
        marketingTable: [
          { year: "1년 차", cost: "", roas: "" }
        ],
        description: "",
        optionType: "none", // 'none' or 'interior'
        optionLogos: []
      };
      // Serialize DOM first so we don't lose current typing values
      serializePortfoliosFromDOM();
      portfolios.unshift(newCard);
      renderPortfolios();
    }

    function deletePortfolioCard(cardId) {
      if (confirm("정말 이 포트폴리오를 삭제하시겠습니까?")) {
        serializePortfoliosFromDOM();
        portfolios = portfolios.filter(p => p.id !== cardId);
        renderPortfolios();
      }
    }

    // DOM Serialization
    function serializePortfoliosFromDOM() {
      const cards = document.querySelectorAll(".portfolio-card");
      const updatedList = [];

      cards.forEach(card => {
        const id = card.dataset.id;
        const logo = card.querySelector(".logo-preview")?.getAttribute("src") || "";
        const clientName = card.querySelector(".client-name-input")?.value || card.querySelector(".client-name-text")?.textContent || "";
        const businessType = card.querySelector(".business-type-input")?.value || card.querySelector(".business-type-text")?.textContent || "";
        const description = card.querySelector(".description-input")?.value || card.querySelector(".description-text")?.textContent || "";
        const optionType = card.querySelector(".option-type-select")?.value || card.dataset.optionType || "none";

        // Sales Table
        const salesRows = card.querySelectorAll(".sales-row");
        const salesTable = [];
        salesRows.forEach(row => {
          const period = row.querySelector(".sales-period")?.value || row.querySelector(".sales-period")?.textContent || "";
          const value = row.querySelector(".sales-value")?.value || row.querySelector(".sales-value")?.textContent || "";
          const note = row.querySelector(".sales-note")?.value || row.querySelector(".sales-note")?.textContent || "";
          salesTable.push({ period, value, note });
        });

        // Marketing Table
        const mktRows = card.querySelectorAll(".mkt-row");
        const marketingTable = [];
        mktRows.forEach(row => {
          const year = row.querySelector(".mkt-year")?.value || row.querySelector(".mkt-year")?.textContent || "";
          const cost = row.querySelector(".mkt-cost")?.value || row.querySelector(".mkt-cost")?.textContent || "";
          const roas = row.querySelector(".mkt-roas")?.value || row.querySelector(".mkt-roas")?.textContent || "";
          marketingTable.push({ year, cost, roas });
        });

        // Option Logos
        const optionGridItems = card.querySelectorAll(".option-grid-item");
        const optionLogos = [];
        optionGridItems.forEach(item => {
          const optLogoSrc = item.querySelector(".option-logo-preview")?.getAttribute("src") || "";
          const optPrice = item.querySelector(".option-price-input")?.value || item.querySelector(".option-price-text")?.textContent || "";
          optionLogos.push({ logo: optLogoSrc, price: optPrice });
        });

        updatedList.push({
          id, logo, clientName, businessType, salesTable, marketingTable, description, optionType, optionLogos
        });
      });

      portfolios = updatedList;
    }

    // Dynamic Row Manipulation
    function addSalesRow(btn, cardId) {
      const tbody = btn.closest(".sales-table-container").querySelector("tbody");
      const tr = document.createElement("tr");
      tr.className = "sales-row border-b border-gray-200 dark-mode:border-gray-700 bg-white dark-mode:bg-gray-800";
      tr.innerHTML = `
        <td class="p-3"><input type="text" class="sales-period w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="예: 마케팅 진행 전"></td>
        <td class="p-3"><input type="text" class="sales-value w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="예: 월 2,000만 원"></td>
        <td class="p-3 flex items-center gap-2">
          <input type="text" class="sales-note w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="비고">
          <button onclick="this.closest('tr').remove();" class="text-red-500 hover:text-red-700 font-bold p-1 text-xs">➖</button>
        </td>
      `;
      tbody.appendChild(tr);
    }

    function addMktRow(btn, cardId) {
      const tbody = btn.closest(".mkt-table-container").querySelector("tbody");
      const tr = document.createElement("tr");
      tr.className = "mkt-row border-b border-gray-200 dark-mode:border-gray-700 bg-white dark-mode:bg-gray-800";
      tr.innerHTML = `
        <td class="p-3"><input type="text" class="mkt-year w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="예: 2년 차"></td>
        <td class="p-3"><input type="text" class="mkt-cost w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="예: 월 300만 원"></td>
        <td class="p-3 flex items-center gap-2">
          <input type="text" class="mkt-roas w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="예: 800%">
          <button onclick="this.closest('tr').remove();" class="text-red-500 hover:text-red-700 font-bold p-1 text-xs">➖</button>
        </td>
      `;
      tbody.appendChild(tr);
    }

    function addOptionItem(btn, cardId) {
      const grid = btn.closest(".option-logos-container").querySelector(".option-logos-grid");
      const itemIndex = grid.children.length;
      const card = btn.closest(".portfolio-card");
      const cardIdRaw = card.dataset.id;
      
      const div = document.createElement("div");
      div.className = "option-grid-item flex flex-col items-center p-3 bg-white dark-mode:bg-gray-750 border border-gray-200 dark-mode:border-gray-600 rounded-xl relative shadow-sm";
      div.innerHTML = `
        <button onclick="this.closest('.option-grid-item').remove();" class="absolute top-2 right-2 text-red-500 hover:text-red-700 font-bold text-xs p-1">❌</button>
        <div onclick="document.getElementById('opt-file-${cardIdRaw}-${itemIndex}').click();" class="w-16 h-16 border-2 border-dashed border-gray-300 dark-mode:border-gray-600 rounded-lg flex items-center justify-center cursor-pointer overflow-hidden bg-gray-50 dark-mode:bg-gray-800 hover:bg-gray-100 transition-colors">
          <img id="opt-preview-${cardIdRaw}-${itemIndex}" class="option-logo-preview max-w-full max-h-full object-contain hidden" />
          <span id="opt-plus-${cardIdRaw}-${itemIndex}" class="text-gray-400 font-bold text-lg">➕</span>
        </div>
        <input type="file" id="opt-file-${cardIdRaw}-${itemIndex}" accept="image/*" class="hidden" onchange="handleImageFile(this, 'opt-preview-${cardIdRaw}-${itemIndex}', 'opt-plus-${cardIdRaw}-${itemIndex}')" />
        <input type="text" class="option-price-input mt-2 w-full text-center px-1 py-0.5 text-[11px] border rounded text-gray-800 dark-mode:bg-gray-750 dark-mode:border-gray-600 dark-mode:text-gray-100" placeholder="공사금액 (예: 8,000만 원)">
      `;
      grid.appendChild(div);
    }

    // Handles image upload -> base64
    function handleImageFile(input, previewId, plusId) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById(previewId);
          const plus = document.getElementById(plusId);
          if (preview) {
            preview.src = e.target.result;
            preview.classList.remove("hidden");
          }
          if (plus) {
            plus.classList.add("hidden");
          }
        };
        reader.readAsDataURL(file);
      }
    }

    function toggleOptionType(select, cardId) {
      const card = select.closest(".portfolio-card");
      card.dataset.optionType = select.value;
      const optContainer = card.querySelector(".option-logos-container");
      if (select.value === "interior") {
        optContainer.classList.remove("hidden");
      } else {
        optContainer.classList.add("hidden");
      }
    }

    // Render Portfolio Cards
    function renderPortfolios() {
      const container = document.getElementById("portfolio-container");
      container.innerHTML = "";

      if (isEditMode) {
        // Add card button at the top in Edit Mode
        const addCardBar = document.createElement("div");
        addCardBar.className = "flex justify-center mb-6";
        addCardBar.innerHTML = `
          <button onclick="addPortfolioCard()" class="px-6 py-3 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-bold text-sm shadow-md transition-all flex items-center gap-1.5">
            ➕ 새 포트폴리오 카드 추가
          </button>
        `;
        container.appendChild(addCardBar);
      }

      if (portfolios.length === 0) {
        container.innerHTML += `
          <div class="text-center py-20 bg-white dark-mode:bg-gray-800 border border-gray-250 dark-mode:border-gray-700 rounded-2xl shadow-sm">
            <span class="text-gray-400 font-bold block mb-4 text-4xl">📁</span>
            <p class="text-gray-500 dark-mode:text-gray-300 font-bold">등록된 포트폴리오가 없습니다.</p>
            ${!isEditMode ? '<p class="text-xs text-gray-400 mt-2">수정하기를 눌러 포트폴리오를 작성해 보세요.</p>' : ''}
          </div>
        `;
        return;
      }

      portfolios.forEach((item) => {
        const card = document.createElement("div");
        card.className = "portfolio-card bg-white dark-mode:bg-gray-800 p-6 md:p-8 rounded-2xl border border-gray-200 dark-mode:border-gray-750 shadow-sm relative transition-all w-full";
        card.dataset.id = item.id;
        card.dataset.optionType = item.optionType || "none";

        // Header controls (Delete Card & Drag Handle) in Edit Mode
        let editControlsHTML = "";
        if (isEditMode) {
          editControlsHTML = `
            <div class="absolute top-4 right-4 flex items-center gap-2 z-10">
              <div class="drag-handle cursor-move px-2.5 py-1.5 border border-gray-200 dark-mode:border-gray-700 rounded-lg bg-gray-50 hover:bg-gray-100 dark-mode:bg-gray-750 dark-mode:hover:bg-gray-650 text-gray-500 dark-mode:text-gray-400 font-bold text-xs select-none flex items-center gap-1">
                ⠿ 이동
              </div>
              <button onclick="deletePortfolioCard('${item.id}')" class="text-red-500 hover:text-red-700 font-bold text-xs p-1.5 border border-red-200 rounded-lg hover:bg-red-50 transition-colors">
                ❌ 삭제
              </button>
            </div>
          `;
        }

        // 1. Header (Logo & Name/Type)
        let headerHTML = "";
        if (isEditMode) {
          headerHTML = `
            <div class="flex flex-col sm:flex-row sm:items-center gap-4 border-b border-gray-150 dark-mode:border-gray-700 pb-6 mb-6 pr-24">
              <!-- Logo Upload -->
              <div onclick="document.getElementById('file-${item.id}').click();" class="w-20 h-20 border-2 border-dashed border-gray-300 dark-mode:border-gray-600 rounded-xl flex items-center justify-center cursor-pointer overflow-hidden bg-gray-50 dark-mode:bg-gray-750 hover:bg-gray-100 transition-colors relative">
                <img id="preview-${item.id}" src="${item.logo || ''}" class="logo-preview max-w-full max-h-full object-contain ${item.logo ? '' : 'hidden'}" />
                <span id="plus-${item.id}" class="text-gray-400 font-bold text-xl ${item.logo ? 'hidden' : ''}">➕</span>
              </div>
              <input type="file" id="file-${item.id}" accept="image/*" class="hidden" onchange="handleImageFile(this, 'preview-${item.id}', 'plus-${item.id}')" />

              <div class="space-y-2 flex-1">
                <div>
                  <label class="block text-[10px] font-bold text-gray-500 dark-mode:text-gray-450 uppercase mb-1">업체명 (Client Name)</label>
                  <input type="text" class="client-name-input w-full px-3 py-1.5 border rounded-lg dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100 font-semibold" placeholder="예: 인테리어 전문 A사" value="${item.clientName || ''}">
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-gray-500 dark-mode:text-gray-450 uppercase mb-1">업종 (Industry Type)</label>
                  <input type="text" class="business-type-input w-full px-3 py-1.5 border rounded-lg dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" placeholder="예: 인테리어" value="${item.businessType || ''}">
                </div>
              </div>
            </div>
          `;
        } else {
          headerHTML = `
            <div class="flex items-center gap-4 border-b border-gray-150 dark-mode:border-gray-700 pb-6 mb-6">
              <div class="w-16 h-16 rounded-xl overflow-hidden bg-gray-50 dark-mode:bg-gray-700 flex items-center justify-center border border-gray-100 dark-mode:border-gray-650">
                ${item.logo ? `<img src="${item.logo}" class="logo-preview max-w-full max-h-full object-contain" />` : `<span class="text-xs text-gray-400 font-bold">로고</span>`}
              </div>
              <div>
                <h3 class="client-name-text text-xl font-bold text-gray-900 dark-mode:text-white">${item.clientName || '업체명 미정'}</h3>
                <span class="business-type-text text-sm text-gray-500 dark-mode:text-gray-400 font-medium">${item.businessType || '업종 미정'}</span>
              </div>
            </div>
          `;
        }

        // 2. Tables Grid (Sales and Marketing Cost & ROAS)
        let tablesHTML = "";
        const salesRowsHTML = item.salesTable.map((row) => {
          if (isEditMode) {
            return `
              <tr class="sales-row border-b border-gray-100 dark-mode:border-gray-750 bg-white dark-mode:bg-gray-800">
                <td class="p-3"><input type="text" class="sales-period w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" value="${row.period || ''}"></td>
                <td class="p-3"><input type="text" class="sales-value w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" value="${row.value || ''}"></td>
                <td class="p-3 flex items-center gap-2">
                  <input type="text" class="sales-note w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" value="${row.note || ''}">
                  <button onclick="this.closest('tr').remove();" class="text-red-500 hover:text-red-700 font-bold p-1 text-xs">➖</button>
                </td>
              </tr>
            `;
          } else {
            return `
              <tr class="sales-row border-b border-gray-100 dark-mode:border-gray-750">
                <td class="sales-period p-3 text-sm font-semibold text-gray-700 dark-mode:text-gray-300">${row.period || ''}</td>
                <td class="sales-value p-3 text-sm text-gray-900 dark-mode:text-white font-bold text-center">${row.value || ''}</td>
                <td class="sales-note p-3 text-sm text-gray-500 dark-mode:text-gray-400">${row.note || ''}</td>
              </tr>
            `;
          }
        }).join("");

        const mktRowsHTML = item.marketingTable.map((row) => {
          if (isEditMode) {
            return `
              <tr class="mkt-row border-b border-gray-100 dark-mode:border-gray-750 bg-white dark-mode:bg-gray-800">
                <td class="p-3"><input type="text" class="mkt-year w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" value="${row.year || ''}"></td>
                <td class="p-3"><input type="text" class="mkt-cost w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" value="${row.cost || ''}"></td>
                <td class="p-3 flex items-center gap-2">
                  <input type="text" class="mkt-roas w-full px-2 py-1 text-sm border rounded dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100" value="${row.roas || ''}">
                  <button onclick="this.closest('tr').remove();" class="text-red-500 hover:text-red-700 font-bold p-1 text-xs">➖</button>
                </td>
              </tr>
            `;
          } else {
            return `
              <tr class="mkt-row border-b border-gray-100 dark-mode:border-gray-750">
                <td class="mkt-year p-3 text-sm font-semibold text-gray-700 dark-mode:text-gray-300">${row.year || ''}</td>
                <td class="mkt-cost p-3 text-sm text-gray-900 dark-mode:text-white text-center">${row.cost || ''}</td>
                <td class="mkt-roas p-3 text-sm text-blue-600 dark-mode:text-blue-400 font-bold text-center">${row.roas || ''}</td>
              </tr>
            `;
          }
        }).join("");

        tablesHTML = `
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <!-- Sales Increase Table -->
            <div class="sales-table-container border border-gray-150 dark-mode:border-gray-700 rounded-xl overflow-hidden shadow-sm flex flex-col justify-between">
              <div>
                <div class="bg-gray-50 dark-mode:bg-gray-750 px-4 py-2 border-b border-gray-150 dark-mode:border-gray-700 flex justify-between items-center">
                  <h4 class="text-xs font-bold text-orange-700 dark-mode:text-orange-400 uppercase tracking-wide">📈 매출 상승 지표</h4>
                  ${isEditMode ? `<button onclick="addSalesRow(this, '${item.id}')" class="text-blue-600 hover:text-blue-800 font-bold text-xs">➕ 추가</button>` : ''}
                </div>
                <table class="w-full text-left border-collapse">
                  <thead>
                    <tr class="bg-gray-50/50 dark-mode:bg-gray-750/30 text-[10px] font-bold text-gray-400 dark-mode:text-gray-450 uppercase tracking-wider border-b border-gray-150 dark-mode:border-gray-700">
                      <th class="p-3 w-1/3">구분</th>
                      <th class="p-3 w-1/3 text-center">매출액</th>
                      <th class="p-3 w-1/3">상승률 / 비고</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${salesRowsHTML}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Marketing Spend & ROAS Table -->
            <div class="mkt-table-container border border-gray-150 dark-mode:border-gray-700 rounded-xl overflow-hidden shadow-sm flex flex-col justify-between">
              <div>
                <div class="bg-gray-50 dark-mode:bg-gray-750 px-4 py-2 border-b border-gray-150 dark-mode:border-gray-700 flex justify-between items-center">
                  <h4 class="text-xs font-bold text-blue-700 dark-mode:text-blue-400 uppercase tracking-wide">💸 마케팅 비용 및 ROAS 성과</h4>
                  ${isEditMode ? `<button onclick="addMktRow(this, '${item.id}')" class="text-blue-600 hover:text-blue-800 font-bold text-xs">➕ 추가</button>` : ''}
                </div>
                <table class="w-full text-left border-collapse">
                  <thead>
                    <tr class="bg-gray-50/50 dark-mode:bg-gray-750/30 text-[10px] font-bold text-gray-400 dark-mode:text-gray-450 uppercase tracking-wider border-b border-gray-150 dark-mode:border-gray-700">
                      <th class="p-3 w-1/3">연차</th>
                      <th class="p-3 w-1/3 text-center">마케팅 비용</th>
                      <th class="p-3 w-1/3 text-center">ROAS 성과</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${mktRowsHTML}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;

        // 3. Description (Characteristics / Process)
        let descHTML = "";
        if (isEditMode) {
          descHTML = `
            <div class="mb-6">
              <label class="block text-xs font-bold text-gray-500 dark-mode:text-gray-450 uppercase mb-2">💡 업종 특징 및 전략 실행 과정</label>
              <textarea class="description-input w-full px-4 py-2.5 border border-gray-300 dark-mode:border-gray-600 rounded-lg bg-white dark-mode:bg-gray-750 text-gray-800 dark-mode:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3" placeholder="예: 인테리어 업종 특성상 30-50대 실수요층을 공략하기 위해 고품질 시공 포트폴리오 기반의 블로그 마케팅과 지역 기반 네이버 파워링크 검색 광고를 동시에 세팅하였습니다.">${item.description || ''}</textarea>
            </div>
          `;
        } else {
          descHTML = `
            <div class="mb-6 bg-slate-50 dark-mode:bg-gray-900/40 p-5 rounded-xl border border-gray-100 dark-mode:border-gray-750">
              <h4 class="text-xs font-bold text-gray-400 dark-mode:text-gray-450 uppercase tracking-wider mb-2">💡 업종 특징 및 전략 실행 과정</h4>
              <p class="description-text text-sm text-gray-700 dark-mode:text-gray-300 leading-relaxed whitespace-pre-line">${item.description || '작성된 내용이 없습니다.'}</p>
            </div>
          `;
        }

        // 4. Client Option logos Grid (e.g. Interior items done)
        let optionControlHTML = "";
        if (isEditMode) {
          optionControlHTML = `
            <div class="flex items-center justify-between border-t border-gray-150 dark-mode:border-gray-700 pt-4 mb-4">
              <div class="flex items-center gap-2">
                <label class="text-xs font-bold text-gray-500 dark-mode:text-gray-450 uppercase">업종별 하단 추가 옵션:</label>
                <select onchange="toggleOptionType(this, '${item.id}')" class="option-type-select px-3 py-1.5 text-xs border rounded-lg dark-mode:bg-gray-750 dark-mode:border-gray-600 text-gray-800 dark-mode:text-gray-100 focus:outline-none">
                  <option value="none" ${item.optionType === 'none' ? 'selected' : ''}>없음</option>
                  <option value="interior" ${item.optionType === 'interior' ? 'selected' : ''}>인테리어 (서브 브랜드 로고 + 공사비)</option>
                </select>
              </div>
              <button onclick="addOptionItem(this, '${item.id}')" class="btn-add-option-item text-blue-600 hover:text-blue-800 font-bold text-xs ${item.optionType === 'interior' ? '' : 'hidden'}">➕ 업체 추가</button>
            </div>
          `;
        }

        let optionLogosHTML = "";
        const isHidden = (item.optionType || "none") !== "interior" ? "hidden" : "";
        
        let gridItemsHTML = "";
        if (item.optionLogos && item.optionLogos.length > 0) {
          gridItemsHTML = item.optionLogos.map((opt, idx) => {
            if (isEditMode) {
              return `
                <div class="option-grid-item flex flex-col items-center p-3 bg-white dark-mode:bg-gray-750 border border-gray-200 dark-mode:border-gray-600 rounded-xl relative shadow-sm">
                  <button onclick="this.closest('.option-grid-item').remove();" class="absolute top-2 right-2 text-red-500 hover:text-red-700 font-bold text-xs p-1">❌</button>
                  <div onclick="document.getElementById('opt-file-${item.id}-${idx}').click();" class="w-16 h-16 border-2 border-dashed border-gray-300 dark-mode:border-gray-600 rounded-lg flex items-center justify-center cursor-pointer overflow-hidden bg-gray-50 dark-mode:bg-gray-800 hover:bg-gray-100 transition-colors">
                    <img id="opt-preview-${item.id}-${idx}" src="${opt.logo || ''}" class="option-logo-preview max-w-full max-h-full object-contain ${opt.logo ? '' : 'hidden'}" />
                    <span id="opt-plus-${item.id}-${idx}" class="text-gray-400 font-bold text-lg ${opt.logo ? 'hidden' : ''}">➕</span>
                  </div>
                  <input type="file" id="opt-file-${item.id}-${idx}" accept="image/*" class="hidden" onchange="handleImageFile(this, 'opt-preview-${item.id}-${idx}', 'opt-plus-${item.id}-${idx}')" />
                  <input type="text" class="option-price-input mt-2 w-full text-center px-1 py-0.5 text-[11px] border rounded text-gray-800 dark-mode:bg-gray-750 dark-mode:border-gray-600 dark-mode:text-gray-100" placeholder="공사금액 (예: 8,000만 원)" value="${opt.price || ''}">
                </div>
              `;
            } else {
              return `
                <div class="flex flex-col items-center p-3 bg-slate-50/50 dark-mode:bg-gray-800/50 border border-gray-100 dark-mode:border-gray-700/60 rounded-xl shadow-sm">
                  <div class="w-16 h-16 rounded-lg overflow-hidden bg-white dark-mode:bg-gray-700 flex items-center justify-center border border-gray-100 dark-mode:border-gray-650 p-1">
                    ${opt.logo ? `<img src="${opt.logo}" class="option-logo-preview max-w-full max-h-full object-contain" />` : `<span class="text-[10px] text-gray-400 font-bold">로고</span>`}
                  </div>
                  <span class="option-price-text mt-2 text-xs font-bold text-gray-600 dark-mode:text-gray-300 text-center">${opt.price || '금액 미기재'}</span>
                </div>
              `;
            }
          }).join("");
        }

        optionLogosHTML = `
          <div class="option-logos-container ${isHidden}">
            <h4 class="text-xs font-bold text-gray-400 dark-mode:text-gray-450 uppercase tracking-wider mb-3">🛠️ 진행 시공사 사례 및 대략적인 견적액</h4>
            <div class="option-logos-grid grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4">
              ${gridItemsHTML}
            </div>
          </div>
        `;

        card.innerHTML = `
          ${editControlsHTML}
          ${headerHTML}
          ${tablesHTML}
          ${descHTML}
          ${isEditMode ? optionControlHTML : ''}
          ${optionLogosHTML}
        `;

        container.appendChild(card);
      });

      // Initialize or update SortableJS for drag-and-drop
      initSortable();
    }

    let sortableInstance = null;
    function initSortable() {
      const container = document.getElementById("portfolio-container");
      if (container && !sortableInstance) {
        sortableInstance = new Sortable(container, {
          animation: 150,
          handle: ".drag-handle",
          draggable: ".portfolio-card",
          onEnd: function (evt) {
            serializePortfoliosFromDOM();
          }
        });
      }
      if (sortableInstance) {
        sortableInstance.option("disabled", !isEditMode);
      }
    }

    // App Initialization
    window.addEventListener("load", () => {
      initTheme();
      updateClock();
      setInterval(updateClock, 1000);
      loadVisitorIP();
      loadPortfolios();
    });
  </script>
</body>
</html>
