<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 현장 일일보고서</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      plugins: [
        function({ addVariant }) {
          addVariant('dark-mode', '.dark-mode &');
        }
      ]
    };
  </script>
  <style>
    /* Custom styles for animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased">
  <div class="max-w-md mx-auto bg-gray-55 min-h-screen pb-10 select-none shadow-lg relative">
    <!-- Main Navigation Tab Bar (Very Top) -->
    <div class="bg-gray-100 border-b border-gray-200 px-3 py-2 flex gap-3 shadow-inner">
      <button id="main-tab-report" class="flex-1 py-2 text-center text-[11px] font-black rounded-lg shadow-sm border border-orange-200 bg-white text-orange-700 transition-all focus:outline-none">
        📝 일일보고서 작성
      </button>
      <button id="main-tab-photo" class="flex-1 py-2 text-center text-[11px] font-bold rounded-lg border border-gray-200 bg-gray-55 text-gray-500 hover:bg-gray-100 transition-all focus:outline-none">
        📸 사진 텍스트넣기
      </button>
    </div>

    <!-- Clock Header Bar -->
    <div id="dr-current-time-bar" class="bg-gray-150 border-b border-gray-200 text-center py-1.5 text-[10px] font-bold text-gray-500 tracking-tight">
      로드 중...
    </div>

    <!-- Top Fixed Header (Mobile Specific) -->
    <div class="sticky top-0 z-40 bg-white shadow-sm border-b border-gray-150 px-4 py-3 flex justify-between items-center">
      <h1 class="text-sm font-black text-gray-950 tracking-tight" id="dr-main-title">📝 현장 일일보고서</h1>
      
      <!-- Screen Toggle Tab Button -->
      <button id="dr-toggle-tab-btn" class="px-2.5 py-1.5 rounded-lg text-[11px] font-bold shadow-sm transition-colors border border-green-200 bg-green-50 hover:bg-green-100 text-green-700">
        📂 지난 내역 보기
      </button>
    </div>

    <div class="p-2 mt-1">
      <!-- Write/Form Container (Tab 1) -->
      <div id="dr-form-container" class="space-y-4">
        <!-- Form Cards are dynamically generated here -->
      </div>

      <!-- Photo Text Container (Tab 2) -->
      <div id="pt-form-container" class="space-y-4 hidden">
        <!-- Form Cards are dynamically generated here -->
      </div>
    </div>
  </div>

  <script>
    function setupDailyReport() {
      const getTodayString = () => {
        const today = new Date();
        const month = today.getMonth() + 1;
        const date = today.getDate();
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const day = days[today.getDay()];
        return `${month}월 ${date}일 ${day}`;
      };

      const createEmptyData = () => ({
        reportDate: getTodayString(),
        siteName: '',
        teams: [
          {
            id: Date.now(),
            name: '',
            headcount: '',
            tasks: [{ id: Date.now() + 1, description: '', status: '', subTasks: [] }]
          }
        ]
      });

      let activeTab = 'new'; // 'new' or 'saved'
      let defaultData = createEmptyData();
      let savedData = null;

      try {
        const local = localStorage.getItem('siteReportSavedData');
        savedData = local ? JSON.parse(local) : createEmptyData();
      } catch (e) {
        savedData = createEmptyData();
      }

      function saveToLocalStorage() {
        localStorage.setItem('siteReportSavedData', JSON.stringify(savedData));
      }

      function updatePreviewText() {
        const data = (activeTab === 'new') ? defaultData : savedData;
        let result = `${data.reportDate || ''}\n${data.siteName || ''}\n\n`;
        
        data.teams.forEach((team, index) => {
          if (!team.name && team.tasks.every(task => !task.description)) return;
          
          let countStr = (team.headcount || '').toString().trim();
          if (countStr && !countStr.endsWith('명')) {
            countStr += '명';
          }
          const header = countStr ? `${team.name} ${countStr}` : team.name;
          result += `${index + 1}. ${header || '미지정 공종'}\n`;
          
          team.tasks.forEach(task => {
            const hasSubTasks = task.subTasks && task.subTasks.length > 0;
            
            if (hasSubTasks) {
              task.subTasks.forEach(subTask => {
                if (subTask.description) {
                  const prefix = task.description ? `${task.description} ` : '';
                  const statusText = subTask.status ? ` (${subTask.status})` : '';
                  result += `- ${prefix}${subTask.description}${statusText}\n`;
                }
              });
            } else if (task.description) {
              const statusText = task.status ? ` (${task.status})` : '';
              result += `- ${task.description}${statusText}\n`;
            }
          });
          result += '\n';
        });
        
        result += '입니다';
        
        const previewBox = document.getElementById("dr-preview-box");
        if (previewBox) {
          previewBox.textContent = result;
        }
      }

      function renderTeams() {
        const data = (activeTab === 'new') ? defaultData : savedData;
        const isAutoSave = (activeTab === 'saved');
        
        const teamListContainer = document.getElementById("dr-team-list");
        if (!teamListContainer) return;
        
        teamListContainer.innerHTML = "";
        
        data.teams.forEach((team, tIndex) => {
          const teamCard = document.createElement("div");
          teamCard.className = "bg-white p-3 rounded-xl border border-gray-200 shadow-sm relative space-y-4";
          
          // Remove Team button
          if (data.teams.length > 1) {
            const removeBtn = document.createElement("button");
            removeBtn.className = "absolute top-2 right-3 text-gray-400 hover:text-red-500 text-xs font-bold";
            removeBtn.textContent = "삭제";
            removeBtn.addEventListener("click", () => {
              data.teams = data.teams.filter(t => t.id !== team.id);
              if (isAutoSave) saveToLocalStorage();
              renderTeams();
              updatePreviewText();
            });
            teamCard.appendChild(removeBtn);
          }
          
          // Team title and headcount
          const headerDiv = document.createElement("div");
          headerDiv.className = "flex items-end gap-3 mb-2 mt-1";
          headerDiv.innerHTML = `
            <div class="w-3/5">
              <label class="block text-[10px] font-bold text-gray-500 mb-1">공종 (예: 목수)</label>
              <input type="text" value="${team.name || ''}" class="dr-team-name-input w-full border-b border-gray-200 pb-1.5 text-sm font-bold focus:outline-none focus:border-blue-500 bg-transparent text-gray-800">
            </div>
            <div class="w-2/5">
              <label class="block text-[10px] font-bold text-gray-500 mb-1">인원 (명)</label>
              <input type="number" value="${team.headcount || ''}" class="dr-team-headcount-input w-full border-b border-gray-200 pb-1.5 text-sm font-bold focus:outline-none focus:border-blue-500 bg-transparent text-gray-800" placeholder="숫자만">
            </div>
          `;
          
          const nameInput = headerDiv.querySelector(".dr-team-name-input");
          const headcountInput = headerDiv.querySelector(".dr-team-headcount-input");
          
          nameInput.addEventListener("input", (e) => {
            team.name = e.target.value;
            if (isAutoSave) saveToLocalStorage();
            updatePreviewText();
          });
          headcountInput.addEventListener("input", (e) => {
            team.headcount = e.target.value;
            if (isAutoSave) saveToLocalStorage();
            updatePreviewText();
          });
          
          teamCard.appendChild(headerDiv);
          
          // Tasks Container
          const tasksContainer = document.createElement("div");
          tasksContainer.className = "space-y-3.5";
          
          team.tasks.forEach((task, taskIndex) => {
            const taskDiv = document.createElement("div");
            taskDiv.className = "bg-gray-50 p-2.5 rounded-lg flex flex-col gap-2 border border-gray-150";
            
            const hasSubTasks = task.subTasks && task.subTasks.length > 0;
            
            const rowDiv = document.createElement("div");
            rowDiv.className = "flex gap-2 items-center";
            rowDiv.innerHTML = `
              <span class="text-gray-400 font-bold">-</span>
              <input type="text" value="${task.description || ''}" class="dr-task-description-input flex-1 bg-transparent border-b border-gray-250 p-0.5 text-xs font-semibold focus:outline-none focus:border-blue-500 text-gray-800" placeholder="${hasSubTasks ? '상위 분류 (예: 트레이닝센터)' : '작업 내용 (엔터 시 추가)'}">
              <button class="dr-btn-add-subtask text-[10px] text-blue-700 bg-blue-100 active:bg-blue-200 px-2 py-1.5 rounded-md shadow-sm whitespace-nowrap font-bold">+하위</button>
              <button class="dr-btn-remove-task text-gray-450 hover:text-red-500 p-1">✕</button>
            `;
            
            const taskDescInput = rowDiv.querySelector(".dr-task-description-input");
            const addSubBtn = rowDiv.querySelector(".dr-btn-add-subtask");
            const removeTaskBtn = rowDiv.querySelector(".dr-btn-remove-task");
            
            taskDescInput.addEventListener("input", (e) => {
              task.description = e.target.value;
              if (isAutoSave) saveToLocalStorage();
              updatePreviewText();
            });
            
            taskDescInput.addEventListener("keydown", (e) => {
              if (e.key === 'Enter') {
                e.preventDefault();
                const isLastTask = (taskIndex === team.tasks.length - 1 && !hasSubTasks);
                if (isLastTask) {
                  team.tasks.push({ id: Date.now(), description: '', status: '', subTasks: [] });
                  if (isAutoSave) saveToLocalStorage();
                  renderTeams();
                  setTimeout(() => {
                    const inputs = teamCard.querySelectorAll(".dr-task-description-input");
                    if (inputs.length > 0) {
                      inputs[inputs.length - 1].focus();
                    }
                  }, 50);
                }
              }
            });
            
            addSubBtn.addEventListener("click", () => {
              if (!task.subTasks) task.subTasks = [];
              task.subTasks.push({ id: Date.now(), description: '', status: '' });
              if (isAutoSave) saveToLocalStorage();
              renderTeams();
              updatePreviewText();
            });
            
            removeTaskBtn.addEventListener("click", () => {
              team.tasks = team.tasks.filter(tk => tk.id !== task.id);
              if (team.tasks.length === 0) {
                team.tasks = [{ id: Date.now(), description: '', status: '', subTasks: [] }];
              }
              if (isAutoSave) saveToLocalStorage();
              renderTeams();
              updatePreviewText();
            });
            
            taskDiv.appendChild(rowDiv);
            
            if (hasSubTasks) {
              const subtasksContainer = document.createElement("div");
              subtasksContainer.className = "ml-1 pl-2.5 border-l-2 border-blue-200 space-y-3 mt-1.5";
              
              task.subTasks.forEach((subTask, subIndex) => {
                const subTaskDiv = document.createElement("div");
                subTaskDiv.className = "flex flex-col gap-2";
                
                const subRow = document.createElement("div");
                subRow.className = "flex gap-2 items-center";
                subRow.innerHTML = `
                  <span class="text-blue-400 text-xs">↳</span>
                  <input type="text" value="${subTask.description || ''}" class="dr-subtask-description-input flex-1 bg-white border border-gray-200 rounded p-1 text-xs focus:outline-none focus:border-blue-500 text-gray-800" placeholder="세부 내용">
                  <button class="dr-btn-remove-subtask text-gray-455 hover:text-red-500 p-1">✕</button>
                `;
                
                const subDescInput = subRow.querySelector(".dr-subtask-description-input");
                const removeSubBtn = subRow.querySelector(".dr-btn-remove-subtask");
                
                subDescInput.addEventListener("input", (e) => {
                  subTask.description = e.target.value;
                  if (isAutoSave) saveToLocalStorage();
                  updatePreviewText();
                });
                
                subDescInput.addEventListener("keydown", (e) => {
                  if (e.key === 'Enter') {
                    e.preventDefault();
                    const isLastSubTask = (subIndex === task.subTasks.length - 1);
                    if (isLastSubTask) {
                      task.subTasks.push({ id: Date.now(), description: '', status: '' });
                      if (isAutoSave) saveToLocalStorage();
                      renderTeams();
                      setTimeout(() => {
                        const inputs = subtasksContainer.querySelectorAll(".dr-subtask-description-input");
                        if (inputs.length > 0) {
                          inputs[inputs.length - 1].focus();
                        }
                      }, 50);
                    }
                  }
                });
                
                removeSubBtn.addEventListener("click", () => {
                  task.subTasks = task.subTasks.filter(st => st.id !== subTask.id);
                  if (isAutoSave) saveToLocalStorage();
                  renderTeams();
                  updatePreviewText();
                });
                
                subTaskDiv.appendChild(subRow);
                
                // Subtask Status Buttons
                const subStatusDiv = document.createElement("div");
                subStatusDiv.className = "flex gap-1.5 pl-4";
                
                const statuses = [
                  { key: '완', label: '완료', colorClass: 'bg-blue-500 text-white' },
                  { key: '작업중', label: '진행중', colorClass: 'bg-orange-500 text-white' },
                  { key: '작업예정', label: '예정', colorClass: 'bg-gray-600 text-white' }
                ];
                
                statuses.forEach(st => {
                  const btn = document.createElement("button");
                  btn.className = `flex-1 py-1.5 text-[11px] font-bold rounded-md transition-colors ${subTask.status === st.key ? st.colorClass + ' shadow-inner font-extrabold' : 'bg-white border border-gray-300 text-gray-500'}`;
                  btn.textContent = st.label;
                  btn.addEventListener("click", () => {
                    subTask.status = (subTask.status === st.key) ? '' : st.key;
                    if (isAutoSave) saveToLocalStorage();
                    renderTeams();
                    updatePreviewText();
                  });
                  subStatusDiv.appendChild(btn);
                });
                
                subTaskDiv.appendChild(subStatusDiv);
                subtasksContainer.appendChild(subTaskDiv);
              });
              
              taskDiv.appendChild(subtasksContainer);
            } else {
              // Task Status Buttons (no subtasks)
              const taskStatusDiv = document.createElement("div");
              taskStatusDiv.className = "flex gap-1.5 pl-3 mt-1";
              
              const statuses = [
                { key: '완', label: '완료', colorClass: 'bg-blue-500 text-white' },
                { key: '작업중', label: '진행중', colorClass: 'bg-orange-500 text-white' },
                { key: '작업예정', label: '예정', colorClass: 'bg-gray-600 text-white' }
              ];
              
              statuses.forEach(st => {
                const btn = document.createElement("button");
                btn.className = `flex-1 py-2 text-[11px] font-bold rounded-md transition-colors ${task.status === st.key ? st.colorClass + ' shadow-inner font-extrabold' : 'bg-white border border-gray-300 text-gray-500'}`;
                btn.textContent = st.label;
                btn.addEventListener("click", () => {
                  task.status = (task.status === st.key) ? '' : st.key;
                  if (isAutoSave) saveToLocalStorage();
                  renderTeams();
                  updatePreviewText();
                });
                taskStatusDiv.appendChild(btn);
              });
              
              taskDiv.appendChild(taskStatusDiv);
            }
            
            tasksContainer.appendChild(taskDiv);
          });
          
          teamCard.appendChild(tasksContainer);
          
          // Add Task to Team button
          const addTaskBtn = document.createElement("button");
          addTaskBtn.className = "w-full py-2.5 text-[11px] text-blue-750 font-bold bg-blue-50 active:bg-blue-100 rounded-lg border border-blue-200 transition-colors";
          addTaskBtn.textContent = "+ 이 공종에 작업 추가";
          addTaskBtn.addEventListener("click", () => {
            team.tasks.push({ id: Date.now(), description: '', status: '', subTasks: [] });
            if (isAutoSave) saveToLocalStorage();
            renderTeams();
            updatePreviewText();
          });
          teamCard.appendChild(addTaskBtn);
          
          teamListContainer.appendChild(teamCard);
        });
      }

      function renderActiveForm() {
        const data = (activeTab === 'new') ? defaultData : savedData;
        const isAutoSave = (activeTab === 'saved');
        
        const formContainer = document.getElementById("dr-form-container");
        if (!formContainer) return;

        formContainer.innerHTML = `
          <div class="p-3 rounded-xl shadow-md border mb-8 ${isAutoSave ? 'border-green-500 bg-green-50/10' : 'border-blue-400 bg-white'}">
            <div class="flex justify-between items-center mb-3 pb-1.5 border-b border-gray-150">
              <h2 class="font-black text-sm flex items-center gap-1.5 ${isAutoSave ? 'text-green-700' : 'text-blue-700'}">
                ${isAutoSave ? '💾 지난 내역 (이어서 작성)' : '📝 새 보고서 작성'}
              </h2>
            </div>

            <div class="space-y-4">
              <!-- Date & Site Name -->
              <div class="flex flex-col gap-3 bg-white p-3 rounded-lg border border-gray-150 shadow-xs">
                <div>
                  <div class="flex justify-between items-center mb-1">
                    <label class="text-[10px] font-bold text-gray-500">날짜</label>
                    ${isAutoSave ? `
                      <button id="dr-btn-refresh-date" class="text-[9px] bg-green-100 text-green-800 px-2 py-0.5 rounded font-bold active:bg-green-200">
                        오늘 날짜로 갱신
                      </button>
                    ` : ''}
                  </div>
                  <input type="text" id="dr-input-date" value="${data.reportDate || ''}" class="w-full border-b border-gray-200 pb-1 text-sm focus:outline-none focus:border-blue-500 bg-transparent text-gray-800 transition-colors">
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-gray-500 mb-1">현장명</label>
                  <input type="text" id="dr-input-sitename" value="${data.siteName || ''}" placeholder="현장명 입력 (예: 미포 뉴미)" class="w-full border-b border-gray-200 pb-1 text-sm font-bold focus:outline-none focus:border-blue-500 bg-transparent text-gray-800 transition-colors">
                </div>
              </div>

              <!-- Teams List Container -->
              <div id="dr-team-list" class="space-y-3.5"></div>

              <button id="dr-btn-add-team" class="w-full py-3 bg-gray-800 active:bg-gray-900 text-white text-xs font-bold rounded-xl shadow-md transition-colors">+ 새로운 공종(팀) 추가</button>

              <!-- Preview & Copy -->
              <div class="pt-5 border-t border-gray-200 mt-3">
                <label class="block text-xs font-bold text-gray-700 mb-2">카카오톡 미리보기</label>
                <pre id="dr-preview-box" class="bg-gray-55 p-3.5 rounded-xl text-xs text-gray-800 whitespace-pre-wrap max-h-48 overflow-y-auto mb-3 border border-gray-200 shadow-inner font-sans"></pre>
                <button id="dr-btn-copy-kakaotalk" class="w-full py-3.5 bg-[#FEE500] hover:bg-[#FADA00] text-[#191919] text-sm font-black rounded-xl shadow-sm active:scale-[0.98] transition-all flex justify-center items-center gap-1.5">
                  <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M12 2C6.48 2 2 5.58 2 10c0 2.84 1.85 5.33 4.6 6.8-.2.7-.72 2.56-.75 2.7-.1.35.15.45.36.32.17-.1 2.37-1.5 3.32-2.16 1.13.25 2.33.39 3.57.39 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/></svg>
                  카톡용 복사하기
                </button>
              </div>

              <!-- Friendly Quick Guide Card -->
              <div class="mt-6 p-4 bg-blue-50 border border-blue-150 rounded-xl text-[11px] text-blue-900 leading-relaxed font-semibold space-y-2.5 shadow-xs">
                <h3 class="font-bold text-[12px] text-blue-850 flex items-center gap-1.5 border-b border-blue-150 pb-1">💡 일일보고서 작성 쉬운 설명서</h3>
                <ul class="list-disc pl-3.5 space-y-2 text-[10.5px]">
                  <li><strong>공종 및 인원</strong>: 공종명(예: 목수)과 인원 숫자를 적어주세요.</li>
                  <li><strong>작업 추가/줄바꿈</strong>: 모바일 키보드에서 <span class="bg-blue-100 text-blue-800 px-1 rounded font-bold">[완료/이동/엔터]</span> 버튼을 누르면 다음 작업 칸이 자동으로 추가됩니다.</li>
                  <li><strong>하위 작업 세분화</strong>: 분류를 나누려면 <span class="bg-blue-100 text-blue-800 px-1 rounded font-bold">+하위</span> 버튼을 누르고 진행 단계(완료/진행중/예정)를 터치해 지정하세요.</li>
                  <li><strong>임시 저장 (자동 저장)</strong>: <span class="bg-yellow-250 text-yellow-900 px-1.5 py-0.5 rounded font-extrabold">카톡용 복사하기</span> 버튼을 누르면 복사와 동시에 작성 내역이 폰에 자동 저장됩니다.</li>
                  <li><strong>이어서 작성하기</strong>: 최근 저장된 내용을 불러오려면 우측 상단의 <span class="bg-green-150 text-green-800 px-1.5 py-0.5 rounded font-extrabold">📂 지난 내역 보기</span>를 누르세요.</li>
                  <li><strong>새로 작성하기</strong>: 새 현장 보고서를 처음부터 다시 쓸 때는 지난 내역 보기 상태에서 우측 위 <span class="bg-blue-150 text-blue-800 px-1.5 py-0.5 rounded font-extrabold">📝 새 양식 작성</span>을 클릭하면 됩니다.</li>
                </ul>
              </div>
            </div>
          </div>
        `;

        const dateInput = document.getElementById("dr-input-date");
        const siteInput = document.getElementById("dr-input-sitename");
        
        dateInput.addEventListener("input", (e) => {
          data.reportDate = e.target.value;
          if (isAutoSave) saveToLocalStorage();
          updatePreviewText();
        });
        siteInput.addEventListener("input", (e) => {
          data.siteName = e.target.value;
          if (isAutoSave) saveToLocalStorage();
          updatePreviewText();
        });

        if (isAutoSave) {
          const refreshDateBtn = document.getElementById("dr-btn-refresh-date");
          if (refreshDateBtn) {
            refreshDateBtn.addEventListener("click", () => {
              const todayStr = getTodayString();
              data.reportDate = todayStr;
              dateInput.value = todayStr;
              saveToLocalStorage();
              updatePreviewText();
            });
          }
        }

        document.getElementById("dr-btn-add-team").addEventListener("click", () => {
          data.teams.push({
            id: Date.now(),
            name: '',
            headcount: '',
            tasks: [{ id: Date.now() + 1, description: '', status: '', subTasks: [] }]
          });
          if (isAutoSave) saveToLocalStorage();
          renderTeams();
          updatePreviewText();
        });

        renderTeams();
        updatePreviewText();

        document.getElementById("dr-btn-copy-kakaotalk").addEventListener("click", () => {
          const previewBox = document.getElementById("dr-preview-box");
          const previewText = previewBox.textContent;
          
          const textArea = document.createElement("textarea");
          textArea.value = previewText;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            alert(`보고서가 복사되었습니다! 카카오톡에 붙여넣기 하세요.`);
            if (!isAutoSave) {
              savedData = JSON.parse(JSON.stringify(defaultData));
              saveToLocalStorage();
              
              activeTab = 'saved';
              const toggleBtn = document.getElementById("dr-toggle-tab-btn");
              toggleBtn.textContent = "📝 새 양식 작성";
              toggleBtn.className = "px-2.5 py-1.5 rounded-lg text-[11px] font-bold shadow-sm transition-colors border border-blue-200 bg-blue-50 hover:bg-blue-100 text-blue-700";
              renderActiveForm();
            }
          } catch (err) {
            alert('복사에 실패했습니다.');
          }
          document.body.removeChild(textArea);
        });
      }

      const toggleBtn = document.getElementById("dr-toggle-tab-btn");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          if (activeTab === 'new') {
            activeTab = 'saved';
            toggleBtn.textContent = "📝 새 양식 작성";
            toggleBtn.className = "px-2.5 py-1.5 rounded-lg text-[11px] font-bold shadow-sm transition-colors border border-blue-200 bg-blue-50 hover:bg-blue-100 text-blue-700";
          } else {
            activeTab = 'new';
            toggleBtn.textContent = "📂 지난 내역 보기";
            toggleBtn.className = "px-2.5 py-1.5 rounded-lg text-[11px] font-bold shadow-sm transition-colors border border-green-200 bg-green-50 hover:bg-green-100 text-green-700";
          }
          renderActiveForm();
        });
      }

      renderActiveForm();
    }

    function setupPhotoText() {
      const container = document.getElementById("pt-form-container");
      if (!container) return;

      container.innerHTML = `
        <div class="p-3 rounded-xl shadow-md border border-orange-200 bg-white mb-8">
          <div class="flex justify-between items-center mb-3 pb-1.5 border-b border-gray-150">
            <h2 class="font-black text-sm flex items-center gap-1.5 text-orange-700">
              📸 사진 하단에 텍스트 넣기
            </h2>
          </div>

          <div class="space-y-4">
            <!-- Site name & Date -->
            <div class="flex flex-col gap-3 bg-gray-55 p-3 rounded-lg border border-gray-150 shadow-xs">
              <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1">날짜 (기본 오늘)</label>
                <input type="text" id="pt-input-date" class="w-full border-b border-gray-200 pb-1.5 text-sm focus:outline-none focus:border-orange-500 bg-transparent text-gray-800 transition-colors">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-gray-500 mb-1">현장명</label>
                <input type="text" id="pt-input-sitename" placeholder="현장명 입력 (예: 미포 뉴미)" class="w-full border-b border-gray-200 pb-1.5 text-sm font-bold focus:outline-none focus:border-orange-500 bg-transparent text-gray-800 transition-colors">
              </div>
            </div>

            <!-- Upload Box -->
            <div class="border-2 border-dashed border-gray-300 hover:border-orange-400 rounded-xl p-6 text-center transition-colors cursor-pointer relative" id="pt-upload-dropzone">
              <input type="file" id="pt-file-input" multiple accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
              <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-xs font-bold text-gray-655">이곳을 터치하여 사진을 선택하세요</p>
                <p class="text-[9px] text-gray-400 mt-1">한 장 또는 여러 장 동시에 업로드 가능</p>
              </div>
            </div>

            <!-- Processed Previews -->
            <div id="pt-preview-section" class="hidden space-y-3 pt-3 border-t border-gray-200">
              <div class="flex justify-between items-center">
                <h3 class="text-xs font-bold text-gray-700">🖼 변환된 사진 목록</h3>
                <button id="pt-btn-download-all" class="text-[10px] bg-orange-600 active:bg-orange-700 text-white px-2.5 py-1.5 rounded-lg font-bold shadow-sm active:scale-[0.98] transition-transform">모두 다운로드</button>
              </div>
              <div id="pt-preview-list" class="space-y-3">
                <!-- Items render here -->
              </div>
            </div>
          </div>
        </div>

        <!-- Photo Guide Card -->
        <div class="mt-2 p-4 bg-orange-50/50 border border-orange-150 rounded-xl text-[11px] text-orange-955 leading-relaxed font-semibold space-y-2 shadow-xs">
          <h3 class="font-bold text-[12px] text-orange-850 flex items-center gap-1.5 border-b border-orange-150 pb-1">💡 사진 텍스트넣기 간단 설명서</h3>
          <ul class="list-disc pl-3.5 space-y-1.5 text-[10.5px]">
            <li><strong>현장명 입력</strong>: 사진 하단에 넣을 현장명을 적어주세요.</li>
            <li><strong>사진 선택</strong>: 업로드 상자를 터치해 갤러리나 카메라로 사진들을 골라주세요.</li>
            <li><strong>자동 생성</strong>: 원본 화질을 그대로 유지하며, 사진 하단에 흰색 바를 덧붙여 <span class="bg-orange-100 text-orange-900 px-1 rounded font-bold">[오늘날짜 - 현장명]</span> 문구를 깔끔하게 그려줍니다.</li>
            <li><strong>개별/전체 다운로드</strong>: 변환이 완료된 사진들을 각각 다운로드하거나 <span class="bg-orange-200 text-orange-900 px-1.5 py-0.5 rounded font-extrabold">모두 다운로드</span> 버튼으로 한 번에 폰에 저장하세요.</li>
          </ul>
        </div>
      `;

      const dateInput = document.getElementById("pt-input-date");
      const siteInput = document.getElementById("pt-input-sitename");
      const fileInput = document.getElementById("pt-file-input");
      const previewSection = document.getElementById("pt-preview-section");
      const previewList = document.getElementById("pt-preview-list");
      const downloadAllBtn = document.getElementById("pt-btn-download-all");

      // Set default date to YYYY.MM.DD
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const defaultDateStr = `${yyyy}.${mm}.${dd}`;
      if (dateInput) dateInput.value = defaultDateStr;

      // Restore values from localStorage
      if (siteInput) siteInput.value = localStorage.getItem("pt_site_name") || "";
      
      if (siteInput) {
        siteInput.addEventListener("input", () => {
          localStorage.setItem("pt_site_name", siteInput.value.trim());
          updateProcessedFilenames();
        });
      }
      if (dateInput) {
        dateInput.addEventListener("input", () => {
          updateProcessedFilenames();
        });
      }

      let uploadedFiles = []; // Array of { id, file, dataUrl, filename, status }

      fileInput.addEventListener("change", async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        for (const file of files) {
          uploadedFiles.push({
            id: Math.random().toString(36).substr(2, 9) + Date.now(),
            file: file,
            dataUrl: null,
            filename: '',
            status: 'processing'
          });
        }
        
        // Reset file input value so same files can be re-selected if removed
        fileInput.value = "";
        
        renderUploadedList();
        await processPendingFiles();
      });

      async function processPendingFiles() {
        const siteName = siteInput.value.trim() || "미지정 현장";
        const dateStr = dateInput.value.trim() || defaultDateStr;

        for (let i = 0; i < uploadedFiles.length; i++) {
          const item = uploadedFiles[i];
          if (item.status === 'processing' || !item.dataUrl) {
            try {
              const result = await processPhoto(item.file, siteName, dateStr);
              item.dataUrl = result.dataUrl;
              item.status = 'done';
            } catch (err) {
              console.error(err);
              item.status = 'error';
            }
          }
        }
        
        // Update all filenames based on their current indices in the array
        uploadedFiles.forEach((item, idx) => {
          if (item.status === 'done') {
            item.filename = `${dateStr}-${siteName}-사진_${idx + 1}.jpg`;
          }
        });
        
        renderUploadedList();
      }

      function renderUploadedList() {
        if (uploadedFiles.length === 0) {
          previewSection.classList.add("hidden");
          previewList.innerHTML = "";
          return;
        }

        previewSection.classList.remove("hidden");
        previewList.innerHTML = "";

        uploadedFiles.forEach((item) => {
          const listItem = document.createElement("div");
          listItem.className = "p-2.5 bg-gray-50 border border-gray-150 rounded-lg flex flex-col gap-2 relative";

          if (item.status === 'processing') {
            listItem.innerHTML = `
              <div class="flex justify-between items-center">
                <span class="text-[11px] font-bold text-gray-500">${item.file.name} 처리 중...</span>
                <button class="pt-btn-remove text-[10px] text-red-500 font-bold px-2 py-1">제거</button>
              </div>
              <div class="h-28 bg-gray-100 rounded flex justify-center items-center">
                <svg class="animate-spin h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </div>
            `;
          } else if (item.status === 'error') {
            listItem.innerHTML = `
              <div class="flex justify-between items-center">
                <span class="text-[11px] font-bold text-red-500">❌ 변환 실패: ${item.file.name}</span>
                <button class="pt-btn-remove text-[10px] text-red-500 font-bold px-2 py-1">제거</button>
              </div>
            `;
          } else {
            // Done state
            listItem.innerHTML = `
              <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-black text-gray-700 truncate w-1/2">${item.filename}</span>
                <div class="flex gap-2">
                  <button class="pt-btn-download text-[10px] bg-orange-100 text-orange-700 px-2 py-1 rounded font-bold hover:bg-orange-200">다운로드</button>
                  <button class="pt-btn-remove text-[10px] bg-red-50 text-red-700 px-2 py-1 rounded font-bold hover:bg-red-100">제거</button>
                </div>
              </div>
              <div class="rounded overflow-hidden border border-gray-200 max-h-40 bg-gray-100 flex justify-center">
                <img src="${item.dataUrl}" class="h-full max-h-40 w-auto object-contain">
              </div>
            `;

            // Bind download button
            listItem.querySelector(".pt-btn-download").addEventListener("click", () => {
              downloadDataURI(item.dataUrl, item.filename);
            });
          }

          // Bind remove button
          listItem.querySelector(".pt-btn-remove").addEventListener("click", () => {
            uploadedFiles = uploadedFiles.filter(x => x.id !== item.id);
            // Re-render and re-process filenames
            const siteName = siteInput.value.trim() || "미지정 현장";
            const dateStr = dateInput.value.trim() || defaultDateStr;
            uploadedFiles.forEach((x, idx) => {
              if (x.status === 'done') {
                x.filename = `${dateStr}-${siteName}-사진_${idx + 1}.jpg`;
              }
            });
            renderUploadedList();
          });

          previewList.appendChild(listItem);
        });
      }

      function updateProcessedFilenames() {
        const siteName = siteInput.value.trim() || "미지정 현장";
        const dateStr = dateInput.value.trim() || defaultDateStr;
        
        // Re-process all images because text overlays have changed!
        uploadedFiles.forEach(item => {
          item.status = 'processing';
          item.dataUrl = null;
        });
        
        renderUploadedList();
        processPendingFiles();
      }

      function downloadDataURI(dataUrl, filename) {
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      downloadAllBtn.addEventListener("click", () => {
        const doneItems = uploadedFiles.filter(x => x.status === 'done');
        if (doneItems.length === 0) return;
        doneItems.forEach(item => {
          downloadDataURI(item.dataUrl, item.filename);
        });
      });

      function processPhoto(file, siteName, dateStr) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              
              const originalWidth = img.width;
              const originalHeight = img.height;
              
              // Bottom bar height is 8% of original height, minimum 50px
              const paddingHeight = Math.max(50, Math.round(originalHeight * 0.08)); 
              
              canvas.width = originalWidth;
              canvas.height = originalHeight + paddingHeight;
              
              // Draw image
              ctx.drawImage(img, 0, 0);
              
              // Draw white bar
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, originalHeight, originalWidth, paddingHeight);
              
              // Draw text
              ctx.fillStyle = '#111827';
              const fontSize = Math.max(14, Math.round(paddingHeight * 0.35));
              ctx.font = `bold ${fontSize}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              
              const textContent = `${dateStr} - ${siteName}`;
              ctx.fillText(textContent, originalWidth / 2, originalHeight + (paddingHeight / 2));
              
              resolve({
                dataUrl: canvas.toDataURL('image/jpeg', 0.92)
              });
            };
            img.onerror = reject;
            img.src = event.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }
    }

    // Initialize once DOM is ready
    window.addEventListener("DOMContentLoaded", () => {
      setupDailyReport();
      setupPhotoText();

      // Main Navigation Tab toggle
      const tabReport = document.getElementById("main-tab-report");
      const tabPhoto = document.getElementById("main-tab-photo");
      const drContainer = document.getElementById("dr-form-container");
      const ptContainer = document.getElementById("pt-form-container");
      const toggleBtn = document.getElementById("dr-toggle-tab-btn");
      const mainTitle = document.getElementById("dr-main-title");

      tabReport.addEventListener("click", () => {
        // Toggle tabs classes
        tabReport.className = "flex-1 py-2.5 text-center text-[11px] font-black rounded-lg shadow-sm border border-orange-200 bg-white text-orange-700 transition-all focus:outline-none";
        tabPhoto.className = "flex-1 py-2.5 text-center text-[11px] font-bold rounded-lg border border-gray-200 bg-gray-55 text-gray-500 hover:bg-gray-100 transition-all focus:outline-none";
        
        // Show/Hide containers
        drContainer.classList.remove("hidden");
        ptContainer.classList.add("hidden");
        toggleBtn.classList.remove("hidden");
        mainTitle.textContent = "📝 현장 일일보고서";
      });

      tabPhoto.addEventListener("click", () => {
        // Toggle tabs classes
        tabPhoto.className = "flex-1 py-2.5 text-center text-[11px] font-black rounded-lg shadow-sm border border-orange-200 bg-white text-orange-700 transition-all focus:outline-none";
        tabReport.className = "flex-1 py-2.5 text-center text-[11px] font-bold rounded-lg border border-gray-200 bg-gray-55 text-gray-500 hover:bg-gray-100 transition-all focus:outline-none";
        
        // Show/Hide containers
        drContainer.classList.add("hidden");
        ptContainer.classList.remove("hidden");
        toggleBtn.classList.add("hidden");
        mainTitle.textContent = "📸 사진 텍스트넣기";
      });

      // Real-time clock update (KST, 24-hour format)
      function updateClock() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = now.getMonth() + 1;
        const dd = now.getDate();
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const timeBar = document.getElementById("dr-current-time-bar");
        if (timeBar) {
          timeBar.textContent = `현재시각: ${yyyy}년 ${mm}월 ${dd}일 ${hh}:${min}:${ss}`;
        }
      }
      setInterval(updateClock, 1000);
      updateClock();
    });
  </script>
