            document.addEventListener("keydown", handleLightboxKeydown);
          }
          
          lightbox.classList.remove("hidden");
          updateLightboxContent();
        };

        window.closeLightbox = function() {
          const lightbox = document.getElementById("screenshot-lightbox");
          if (lightbox) {
            lightbox.classList.add("hidden");
          }
        };

        window.prevLightbox = function() {
          if (currentFilteredFiles.length === 0) return;
          activeIndex = (activeIndex - 1 + currentFilteredFiles.length) % currentFilteredFiles.length;
          updateLightboxContent();
        };

        window.nextLightbox = function() {
          if (currentFilteredFiles.length === 0) return;
          activeIndex = (activeIndex + 1) % currentFilteredFiles.length;
          updateLightboxContent();
        };

        window.zoomInLightbox = function() {
          const imgEl = document.getElementById("lightbox-img");
          if (!imgEl) return;
          zoomScale = Math.min(3.0, zoomScale + 0.1);
          imgEl.style.maxWidth = (zoomScale * 1000) + "px";
          updateZoomIndicator();
        };

        window.zoomOutLightbox = function() {
          const imgEl = document.getElementById("lightbox-img");
          if (!imgEl) return;
          zoomScale = Math.max(0.3, zoomScale - 0.1);
          imgEl.style.maxWidth = (zoomScale * 1000) + "px";
          updateZoomIndicator();
        };

        function updateZoomIndicator() {
          const indicator = document.getElementById("lightbox-zoom-indicator");
          if (indicator) {
            indicator.textContent = `확대/축소: ${Math.round(zoomScale * 100)}%`;
          }
        }

        function updateLightboxContent() {
          const file = currentFilteredFiles[activeIndex];
          if (!file) return;
          
          const folderPath = dirInput.value.trim() || "D:\\rank";
          const imgUrl = isCloudMode
            ? `/api/sync-screenshots?action=view-file&folderPath=${encodeURIComponent(folderPath)}&fileName=${encodeURIComponent(file.fileName)}`
            : getLocalServerUrl(`/api/local-screenshots/view?folderPath=${encodeURIComponent(folderPath)}&fileName=${encodeURIComponent(file.fileName)}`);
          
          const titleEl = document.getElementById("lightbox-title");
          const imgEl = document.getElementById("lightbox-img");
          const imgBox = document.getElementById("lightbox-img-box");
          
          if (titleEl) {
            titleEl.textContent = `📂 [${file.keyword}] - ${file.date} (${activeIndex + 1} / ${currentFilteredFiles.length})`;
          }
          if (imgEl) {
            imgEl.src = imgUrl;
            imgEl.style.maxWidth = (zoomScale * 1000) + "px";
          }
          if (imgBox) {
            imgBox.scrollTop = 0; // 새 이미지 로드 시 스크롤을 맨 위로 초기화
          }
          updateZoomIndicator();
        }

        function handleLightboxKeydown(e) {
          const lightbox = document.getElementById("screenshot-lightbox");
          if (!lightbox || lightbox.classList.contains("hidden")) return;
          
          if (e.key === "ArrowLeft") {
            prevLightbox();
          } else if (e.key === "ArrowRight") {
            nextLightbox();
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            zoomInLightbox();
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            zoomOutLightbox();
          } else if (e.key === "Escape") {
            closeLightbox();
          }
        }
      }

      setupLocalScreenshotViewer();
    }

    function setupBlogPostScreenshot() {
      const blogInput = document.getElementById("bps-blog-id");
      const folderInput = document.getElementById("bps-save-folder");
      const ocrInput = document.getElementById("bps-ocr-keywords");
      const startBtn = document.getElementById("bps-start-btn");
      const pauseBtn = document.getElementById("bps-pause-btn");
      const stopBtn = document.getElementById("bps-stop-btn");
      const progressCard = document.getElementById("bps-progress-card");
      const progressBar = document.getElementById("bps-progress-bar");
      const percentageText = document.getElementById("bps-progress-percentage");
      const totalText = document.getElementById("bps-total-count");
      const processedText = document.getElementById("bps-processed-count");
      const successText = document.getElementById("bps-success-count");
      const errorText = document.getElementById("bps-error-count");
      const consoleLog = document.getElementById("bps-log-console");
      const modeRadios = document.getElementsByName("bps-mode");
      const ocrContainer = document.getElementById("bps-ocr-container");

      if (!startBtn) return;

      // Restore values from localStorage
      if (blogInput) blogInput.value = localStorage.getItem("bps_blog_id") || "";
      if (folderInput) folderInput.value = localStorage.getItem("bps_save_folder") || "D:\\\\blog-post-screenshot";
      if (ocrInput) ocrInput.value = localStorage.getItem("bps_ocr_keywords") || "인디컴퍼니, inde.co.kr";
      
      const savedMode = localStorage.getItem("bps_mode") || "1";
      modeRadios.forEach(radio => {
        if (radio.value === savedMode) {
          radio.checked = true;
        }
      });

      // Show/Hide OCR Keywords container based on mode selection
      function toggleOcrVisibility() {
        const selectedMode = Array.from(modeRadios).find(r => r.checked)?.value || "1";
        if (selectedMode === "3" || selectedMode === "4") {
          ocrContainer.classList.remove("hidden");
        } else {
          ocrContainer.classList.add("hidden");
        }
      }
      
      modeRadios.forEach(radio => {
        radio.addEventListener("change", (e) => {
          localStorage.setItem("bps_mode", e.target.value);
          toggleOcrVisibility();
        });
      });
      toggleOcrVisibility();

      // Input event listeners to save preferences
      if (blogInput) {
        blogInput.addEventListener("input", () => localStorage.setItem("bps_blog_id", blogInput.value.trim()));
      }
      if (folderInput) {
        folderInput.addEventListener("input", () => localStorage.setItem("bps_save_folder", folderInput.value.trim()));
      }
      if (ocrInput) {
        ocrInput.addEventListener("input", () => localStorage.setItem("bps_ocr_keywords", ocrInput.value.trim()));
      }

      let appState = "IDLE"; // "IDLE", "RUNNING", "PAUSED"
      let postsQueue = [];
      let totalCount = 0;
      let processedCount = 0;
      let successCount = 0;
      let errorCount = 0;
      let timerId = null;

      let blogId = "";
      let saveFolder = "";
      let mode = "1";
      let ocrKeywords = [];

      function logConsole(message, color = "") {
        if (!consoleLog) return;
        const div = document.createElement("div");
        div.className = "leading-relaxed break-all";
        if (color === "green") {
          div.className += " text-green-400 font-bold";
        } else if (color === "red") {
          div.className += " text-red-400 font-bold";
        } else if (color === "blue") {
          div.className += " text-blue-400 font-bold";
        }
        
        // Add timestamp
        const now = new Date();
        const timeStr = `[\${String(now.getHours()).padStart(2, '0')}:\${String(now.getMinutes()).padStart(2, '0')}:\${String(now.getSeconds()).padStart(2, '0')}] `;
        div.textContent = timeStr + message;
        
        consoleLog.appendChild(div);
        consoleLog.scrollTop = consoleLog.scrollHeight;
      }

      function updateProgress() {
        if (totalCount === 0) return;
        const percent = Math.round((processedCount / totalCount) * 100);
        if (progressBar) progressBar.style.width = `\${percent}%`;
        if (percentageText) percentageText.textContent = `\${percent}%`;
        if (processedText) processedText.textContent = processedCount;
        if (successText) successText.textContent = successCount;
        if (errorText) errorText.textContent = errorCount;
      }

      function resetButtons() {
        startBtn.disabled = false;
        startBtn.textContent = "🚀 수집 시작";
        startBtn.className = "flex-grow px-4 py-3 bg-orange-500 hover:bg-orange-600 active:scale-[0.98] transition-transform text-white text-xs font-bold rounded-xl shadow-sm";
        
        pauseBtn.disabled = true;
        pauseBtn.textContent = "⏸ 일시정지";
        pauseBtn.className = "px-4 py-3 bg-gray-300 dark-mode:bg-gray-750 text-gray-500 dark-mode:text-gray-400 text-xs font-bold rounded-xl cursor-not-allowed";
        
        stopBtn.disabled = true;
        stopBtn.className = "px-4 py-3 bg-gray-300 dark-mode:bg-gray-750 text-gray-500 dark-mode:text-gray-400 text-xs font-bold rounded-xl cursor-not-allowed";
      }

      async function runLoop() {
        if (appState !== "RUNNING") return;
        if (processedCount >= postsQueue.length) {
          logConsole(`[완료] 블로그 전체 글 수집 작업이 성공적으로 완료되었습니다!`);
          logConsole(`[최종 결과] 성공: \${successCount}개, 실패: \${errorCount}개`);
          resetButtons();
          appState = "IDLE";
          return;
        }

        const post = postsQueue[processedCount];
        logConsole(`[\${processedCount + 1}/\${totalCount}] "\${post.title}" 처리 중...`);

        try {
          const res = await fetch(getLocalServerUrl('/api/blog-posts/process-one'), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              blogId,
              logNo: post.logNo,
              title: post.title,
              mode,
              saveFolder,
              ocrKeywords
            })
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || "서버 통신 실패");
          }

          const data = await res.json();
          if (!data.success) throw new Error(data.error);

          successCount++;
          logConsole(`  ✓ 성공: \${data.savedFiles.join(', ')} 저장 완료 (\${data.absoluteDate})`, "green");
        } catch (e) {
          errorCount++;
          logConsole(`  ✗ 실패: "\${post.title}" 처리 오류: \${e.message}`, "red");
        }

        processedCount++;
        updateProgress();

        // 1번(텍스트) 모드인 경우 300ms ~ 500ms의 짧은 대기
        // 스크린샷이 들어간 모드(2, 3, 4)인 경우 2.5초 ~ 4.0초 사이의 랜덤 대기
        let delay = (mode === "1") ? (300 + Math.random() * 200) : (2500 + Math.random() * 1500);
        
        if (processedCount < postsQueue.length && appState === "RUNNING") {
          logConsole(`  .. 다음 작업 대기 중 (\${Math.round(delay)}ms)`);
          timerId = setTimeout(runLoop, delay);
        } else if (processedCount >= postsQueue.length) {
          runLoop();
        }
      }

      startBtn.addEventListener("click", async () => {
        // Resume if paused
        if (appState === "PAUSED") {
          appState = "RUNNING";
          logConsole(`[정보] 작업을 재개합니다.`, "blue");
          startBtn.disabled = true;
          startBtn.textContent = "수집 진행 중...";
          startBtn.className = "flex-grow px-4 py-3 bg-gray-300 dark-mode:bg-gray-750 text-gray-500 dark-mode:text-gray-400 text-xs font-bold rounded-xl cursor-not-allowed";
          
          pauseBtn.disabled = false;
          pauseBtn.textContent = "⏸ 일시정지";
          pauseBtn.className = "px-4 py-3 bg-yellow-500 hover:bg-yellow-600 text-white text-xs font-bold rounded-xl shadow-sm active:scale-[0.98] transition-transform";
          
          stopBtn.disabled = false;
          stopBtn.className = "px-4 py-3 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded-xl shadow-sm active:scale-[0.98] transition-transform";
          
          runLoop();
          return;
        }

        // Start new run
        blogId = blogInput.value.trim();
        saveFolder = folderInput.value.trim();
        mode = Array.from(modeRadios).find(r => r.checked)?.value || "1";
        const rawOcr = ocrInput.value.trim();
        ocrKeywords = rawOcr.split(/,/).map(k => k.trim()).filter(k => k.length > 0);

        if (!blogId) {
          alert("네이버 블로그 ID를 입력해주세요.");
          blogInput.focus();
          return;
        }
        if (!saveFolder) {
          alert("자동 저장 폴더 경로를 입력해주세요.");
          folderInput.focus();
          return;
        }

        // Reset variables
        postsQueue = [];
        totalCount = 0;
        processedCount = 0;
        successCount = 0;
        errorCount = 0;
        if (timerId) clearTimeout(timerId);

        // UI Setup
        progressCard.classList.remove("hidden");
        if (progressBar) progressBar.style.width = "0%";
        if (percentageText) percentageText.textContent = "0%";
        if (totalText) totalText.textContent = "0";
        if (processedText) processedText.textContent = "0";
        if (successText) successText.textContent = "0";
        if (errorText) errorText.textContent = "0";
        
        if (consoleLog) consoleLog.innerHTML = "";
        logConsole(`[시작] 블로그 ID: "${blogId}", 저장경로: "${saveFolder}", 작업모드: ${mode}번`);
        
        startBtn.disabled = true;
        startBtn.textContent = "목록 추출 중...";
        startBtn.className = "flex-grow px-4 py-3 bg-gray-300 dark-mode:bg-gray-750 text-gray-500 dark-mode:text-gray-400 text-xs font-bold rounded-xl cursor-not-allowed";
        
        pauseBtn.disabled = true;
        stopBtn.disabled = false;
        stopBtn.className = "px-4 py-3 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded-xl shadow-sm active:scale-[0.98] transition-transform";

        try {
          logConsole(`[네트워크] 네이버 블로그 전체 공개 게시글 목록을 수집하는 중...`);
          const res = await fetch(getLocalServerUrl(`/api/blog-posts/list?blogId=${encodeURIComponent(blogId)}`));
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || "글 목록 조회에 실패했습니다.");
          }
          const data = await res.json();
          if (!data.success) throw new Error(data.error);

          postsQueue = data.posts || [];
          totalCount = postsQueue.length;
          
          if (totalText) totalText.textContent = totalCount;
          logConsole(`[조회 완료] 총 ${totalCount}개의 공개 게시글을 발견했습니다. 작업을 시작합니다.`, "blue");

          if (totalCount === 0) {
            logConsole(`[경고] 수집할 게시글이 존재하지 않습니다.`);
            resetButtons();
            return;
          }

          appState = "RUNNING";
          startBtn.textContent = "수집 진행 중...";
          
          pauseBtn.disabled = false;
          pauseBtn.className = "px-4 py-3 bg-yellow-500 hover:bg-yellow-600 text-white text-xs font-bold rounded-xl shadow-sm active:scale-[0.98] transition-transform";
          
          runLoop();
        } catch (e) {
          logConsole(`[에러] 목록 수집 에러: ${e.message}`, "red");
          alert(`블로그 글 목록 수집 중 실패: ${e.message}`);
          resetButtons();
        }
      });

      pauseBtn.addEventListener("click", () => {
        if (appState === "RUNNING") {
          appState = "PAUSED";
          if (timerId) clearTimeout(timerId);
          logConsole(`[일시정지] 사용자가 작업을 일시정지했습니다. 언제든 [수집 시작]을 눌러 이어갈 수 있습니다.`, "blue");
          
          startBtn.disabled = false;
          startBtn.textContent = "🚀 수집 재개";
          startBtn.className = "flex-grow px-4 py-3 bg-orange-500 hover:bg-orange-600 active:scale-[0.98] transition-transform text-white text-xs font-bold rounded-xl shadow-sm";
          
          pauseBtn.disabled = true;
          pauseBtn.className = "px-4 py-3 bg-gray-300 dark-mode:bg-gray-750 text-gray-500 dark-mode:text-gray-400 text-xs font-bold rounded-xl cursor-not-allowed";
        }
      });

      stopBtn.addEventListener("click", () => {
        if (confirm("정말로 전체 수집 작업을 중단하시겠습니까? 현재까지 저장된 파일은 그대로 유지됩니다.")) {
          appState = "IDLE";
          if (timerId) clearTimeout(timerId);
          logConsole(`[작업중단] 사용자에 의해 전체 수집 작업이 강제 중단되었습니다.`, "red");
          resetButtons();
        }
      });
    }

    function setupDailyReport() {
      const getTodayString = () => {
        const today = new Date();
        const month = today.getMonth() + 1;
        const date = today.getDate();
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const day = days[today.getDay()];
        return `${month}월 ${date}일 ${day}`;
      };

      const createEmptyData = () => ({
        reportDate: getTodayString(),
        siteName: '',
        teams: [
          {
            id: Date.now(),
            name: '',
            headcount: '',
            tasks: [{ id: Date.now() + 1, description: '', status: '', subTasks: [] }]
          }
        ]
      });

      let activeTab = 'new'; // 'new' or 'saved'
      let defaultData = createEmptyData();
      let savedData = null;

      try {
        const local = localStorage.getItem('siteReportSavedData');
        savedData = local ? JSON.parse(local) : createEmptyData();
      } catch (e) {
        savedData = createEmptyData();
      }

      function saveToLocalStorage() {
        localStorage.setItem('siteReportSavedData', JSON.stringify(savedData));
      }

      function updatePreviewText() {
        const data = (activeTab === 'new') ? defaultData : savedData;
        let result = `${data.reportDate || ''}\n${data.siteName || ''}\n\n`;
        
        data.teams.forEach((team, index) => {
          if (!team.name && team.tasks.every(task => !task.description)) return;
          
          let countStr = (team.headcount || '').toString().trim();
          if (countStr && !countStr.endsWith('명')) {
            countStr += '명';
          }
          const header = countStr ? `${team.name} ${countStr}` : team.name;
          result += `${index + 1}. ${header || '미지정 공종'}\n`;
          
          team.tasks.forEach(task => {
            const hasSubTasks = task.subTasks && task.subTasks.length > 0;
            
            if (hasSubTasks) {
              task.subTasks.forEach(subTask => {
                if (subTask.description) {
                  const prefix = task.description ? `${task.description} ` : '';
                  const statusText = subTask.status ? ` (${subTask.status})` : '';
                  result += `- ${prefix}${subTask.description}${statusText}\n`;
                }
              });
            } else if (task.description) {
              const statusText = task.status ? ` (${task.status})` : '';
              result += `- ${task.description}${statusText}\n`;
            }
          });
          result += '\n';
        });
        
        result += '입니다';
        
        const previewBox = document.getElementById("dr-preview-box");
        if (previewBox) {
          previewBox.textContent = result;
        }
      }

      function renderTeams() {
        const data = (activeTab === 'new') ? defaultData : savedData;
        const isAutoSave = (activeTab === 'saved');
        
        const teamListContainer = document.getElementById("dr-team-list");
        if (!teamListContainer) return;
        
        teamListContainer.innerHTML = "";
        
        data.teams.forEach((team, tIndex) => {
          const teamCard = document.createElement("div");
          teamCard.className = "bg-white dark-mode:bg-gray-800 p-3 rounded-xl border border-gray-250 dark-mode:border-gray-700 shadow-sm relative space-y-4";
          
          // Remove Team button
          if (data.teams.length > 1) {
            const removeBtn = document.createElement("button");
            removeBtn.className = "absolute top-2 right-3 text-gray-400 hover:text-red-500 text-xs font-bold";
            removeBtn.textContent = "삭제";
            removeBtn.addEventListener("click", () => {
              data.teams = data.teams.filter(t => t.id !== team.id);
              if (isAutoSave) saveToLocalStorage();
              renderTeams();
              updatePreviewText();
            });
            teamCard.appendChild(removeBtn);
          }
          
          // Team title and headcount
          const headerDiv = document.createElement("div");
          headerDiv.className = "flex items-end gap-3 mb-2 mt-1";
          headerDiv.innerHTML = `
            <div class="w-3/5">
              <label class="block text-[10px] font-bold text-gray-550 mb-1">공종 (예: 목수)</label>
              <input type="text" value="${team.name || ''}" class="dr-team-name-input w-full border-b border-gray-200 dark-mode:border-gray-750 pb-1.5 text-sm font-bold focus:outline-none focus:border-blue-500 bg-transparent text-gray-800 dark-mode:text-gray-150">
            </div>
            <div class="w-2/5">
              <label class="block text-[10px] font-bold text-gray-550 mb-1">인원 (명)</label>
              <input type="number" value="${team.headcount || ''}" class="dr-team-headcount-input w-full border-b border-gray-200 dark-mode:border-gray-750 pb-1.5 text-sm font-bold focus:outline-none focus:border-blue-500 bg-transparent text-gray-800 dark-mode:text-gray-150" placeholder="숫자만">
            </div>
          `;
          
          const nameInput = headerDiv.querySelector(".dr-team-name-input");
          const headcountInput = headerDiv.querySelector(".dr-team-headcount-input");
          
          nameInput.addEventListener("input", (e) => {
            team.name = e.target.value;
            if (isAutoSave) saveToLocalStorage();
            updatePreviewText();
          });
          headcountInput.addEventListener("input", (e) => {
            team.headcount = e.target.value;
            if (isAutoSave) saveToLocalStorage();
            updatePreviewText();
          });
          
          teamCard.appendChild(headerDiv);
          
          // Tasks Container
          const tasksContainer = document.createElement("div");
          tasksContainer.className = "space-y-3.5";
          
          team.tasks.forEach((task, taskIndex) => {
            const taskDiv = document.createElement("div");
            taskDiv.className = "bg-gray-50 dark-mode:bg-gray-905 p-2.5 rounded-lg flex flex-col gap-2 border border-gray-150 dark-mode:border-gray-850";
            
            const hasSubTasks = task.subTasks && task.subTasks.length > 0;
            
            const rowDiv = document.createElement("div");
            rowDiv.className = "flex gap-2 items-center";
            rowDiv.innerHTML = `
              <span class="text-gray-400 font-bold">-</span>
              <input type="text" value="${task.description || ''}" class="dr-task-description-input flex-1 bg-transparent border-b border-gray-250 dark-mode:border-gray-750 p-0.5 text-xs font-semibold focus:outline-none focus:border-blue-500 text-gray-800 dark-mode:text-gray-150" placeholder="${hasSubTasks ? '상위 분류 (예: 트레이닝센터)' : '작업 내용 (엔터 시 추가)'}">
              <button class="dr-btn-add-subtask text-[10px] text-blue-700 bg-blue-100 dark-mode:bg-blue-950 dark-mode:text-blue-400 active:bg-blue-200 px-2 py-1.5 rounded-md shadow-sm whitespace-nowrap font-bold">+하위</button>
              <button class="dr-btn-remove-task text-gray-450 hover:text-red-500 p-1">✕</button>
            `;
            
            const taskDescInput = rowDiv.querySelector(".dr-task-description-input");
            const addSubBtn = rowDiv.querySelector(".dr-btn-add-subtask");
            const removeTaskBtn = rowDiv.querySelector(".dr-btn-remove-task");
            
            taskDescInput.addEventListener("input", (e) => {
              task.description = e.target.value;
              if (isAutoSave) saveToLocalStorage();
              updatePreviewText();
            });
            
            taskDescInput.addEventListener("keydown", (e) => {
              if (e.key === 'Enter') {
                e.preventDefault();
                const isLastTask = (taskIndex === team.tasks.length - 1 && !hasSubTasks);
                if (isLastTask) {
                  team.tasks.push({ id: Date.now(), description: '', status: '', subTasks: [] });
                  if (isAutoSave) saveToLocalStorage();
                  renderTeams();
                  setTimeout(() => {
                    const inputs = teamCard.querySelectorAll(".dr-task-description-input");
                    if (inputs.length > 0) {
                      inputs[inputs.length - 1].focus();
                    }
                  }, 50);

    function setupAdDashboard() {
      const startInput = document.getElementById("ad-start-date");
      const endInput = document.getElementById("ad-end-date");
      const downloadBtn = document.getElementById("ad-download-btn");
      
      if (!startInput || !endInput || !downloadBtn) return;
      
      // Setup default dates: yesterday and 7 days prior
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      
      const prevWeek = new Date(yesterday);
      prevWeek.setDate(prevWeek.getDate() - 6);
      
      const formatDateForInput = (d) => {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      };
      
      startInput.value = formatDateForInput(prevWeek);
      endInput.value = formatDateForInput(yesterday);
      
      const keywordCache = {};
      
      async function getKeywordText(kwId, customerId) {
        if (!kwId || kwId === "-") return "";
        if (keywordCache[kwId]) return keywordCache[kwId];
        try {
          const res = await fetch(`/api/proxy?path=/ncc/keywords/${kwId}&customerId=${customerId}`);
          if (res.ok) {
            const kwData = await res.json();
            keywordCache[kwId] = kwData.keyword || kwId;
          } else {
            keywordCache[kwId] = kwId;
          }
        } catch (e) {
          keywordCache[kwId] = kwId;
        }
        return keywordCache[kwId];
      }
      
      async function fetchReportForDate(dateStr, reportTp, customerId) {
        // 1. POST request to create report job
        const res = await fetch(`/api/proxy?path=/stat-reports&customerId=${customerId}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            statDt: dateStr,
            reportTp: reportTp
          })
        });
        
        if (!res.ok) {
          throw new Error(`리포트 생성 실패 (상태코드: ${res.status})`);
        }
        
        const job = await res.json();
        const jobId = job.reportJobId || job.id;
        if (!jobId) {
          throw new Error(`리포트 작업 ID가 반환되지 않았습니다.`);
        }
        
        // 2. Poll status
        let downloadUrl = "";
        for (let attempt = 0; attempt < 25; attempt++) {
          await new Promise(resolve => setTimeout(resolve, 2000));
          const statusRes = await fetch(`/api/proxy?path=/stat-reports/${jobId}&customerId=${customerId}`);
          if (!statusRes.ok) continue;
          
          const statusJob = await statusRes.json();
          const status = statusJob.status;
          
          if (status === "BUILT") {
            downloadUrl = statusJob.downloadUrl;
            break;
          } else if (status === "FAIL" || status === "NONE") {
            return []; // No data or failed means empty
          }
        }
        
        if (!downloadUrl) {
          throw new Error("네이버 리포트 빌드 대기 시간 초과.");
        }
        
        // 3. Download TSV report
        const dlRes = await fetch(`/api/proxy?path=/report-download&downloadUrl=${encodeURIComponent(downloadUrl)}&customerId=${customerId}`);
        if (!dlRes.ok) {
          throw new Error("리포트 다운로드 요청 실패.");
        }
        
        let text = "";
        try {
          const ds = new DecompressionStream("gzip");
          const decompressedStream = dlRes.clone().body.pipeThrough(ds);
          text = await new Response(decompressedStream).text();
        } catch (e) {
          text = await dlRes.text();
        }
        
        const lines = text.split("\n");
        const rows = [];
        for (const line of lines) {
          if (!line.trim()) continue;
          const cols = line.split("\t");
          rows.push(cols);
        }
        return rows;
      }
      
      downloadBtn.onclick = async () => {
        const customerId = document.getElementById("ad-cust-id").value.trim();
        const startDateVal = startInput.value;
        const endDateVal = endInput.value;
        
        const powerlink = document.getElementById("ad-target-powerlink").checked;
        const place = document.getElementById("ad-target-place").checked;
        const powercontent = document.getElementById("ad-target-powercontent").checked;
        const includeQuery = document.getElementById("ad-option-query").checked;
        
        if (!customerId) {
          alert("고객 ID(Customer ID)를 입력해주세요.");
          return;
        }
        if (!startDateVal || !endDateVal) {
          alert("시작일과 종료일을 선택해주세요.");
          return;
        }
        
        const start = new Date(startDateVal);
        const end = new Date(endDateVal);
        
        if (start > end) {
          alert("시작일은 종료일보다 이전 날짜여야 합니다.");
          return;
        }
        
        if (!powerlink && !place && !powercontent) {
          alert("동기화 대상 광고를 최소 하나 이상 선택해주세요.");
          return;
        }
        
        const allowedProducts = [];
        if (powerlink) allowedProducts.push("파워링크");
        if (place) allowedProducts.push("플레이스광고");
        if (powercontent) allowedProducts.push("파워컨텐츠");
        
        // Setup dates array YYYYMMDD
        const dates = [];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, "0");
          const day = String(d.getDate()).padStart(2, "0");
          dates.push(`${y}${m}${day}`);
        }
        
        // Show progress box
        const progressBox = document.getElementById("ad-progress-box");
        const logBox = document.getElementById("ad-progress-logs");
        const statusTxt = document.getElementById("ad-progress-status");
        const percentTxt = document.getElementById("ad-progress-percent");
        const progressBar = document.getElementById("ad-progress-bar");
        
        progressBox.classList.remove("hidden");
        logBox.innerHTML = "";
        downloadBtn.disabled = true;
        downloadBtn.classList.add("opacity-50", "cursor-not-allowed");
        
        const addLog = (msg) => {
          const time = new Date().toLocaleTimeString();
          logBox.innerHTML += `<div class="py-0.5">[${time}] ${msg}</div>`;
          logBox.scrollTop = logBox.scrollHeight;
        };
        
        try {
          addLog("1. 캠페인 및 광고그룹 메타데이터 연동 조회 중...");
          statusTxt.innerText = "캠페인 및 광고그룹 데이터 연동 중...";
          
          const campRes = await fetch(`/api/proxy?path=/ncc/campaigns&customerId=${customerId}`);
          if (!campRes.ok) throw new Error("캠페인 목록 조회 실패.");
          const campaigns = await campRes.json();
          
          const campaignMap = {};
          for (const c of campaigns) {
            campaignMap[c.nccCampaignId] = { name: c.name, type: c.campaignTp };
          }
          addLog(`캠페인 ${campaigns.length}개 연동 완료.`);
          
          const groupRes = await fetch(`/api/proxy?path=/ncc/adgroups&customerId=${customerId}`);
          if (!groupRes.ok) throw new Error("광고그룹 목록 조회 실패.");
          const adgroups = await groupRes.json();
          
          const adgroupMap = {};
          for (const g of adgroups) {
            adgroupMap[g.nccAdgroupId] = g.name;
          }
          addLog(`광고그룹 ${adgroups.length}개 연동 완료.`);
          
          addLog(`2. 일별 통계 보고서 생성 및 다운로드 처리 중 (${dates.length}일간)...`);
          const adReportRows = [];
          const expReportRows = [];
          
          const totalTasks = dates.length * (includeQuery ? 2 : 1);
          let completedTasks = 0;
          
          const updateProgress = () => {
            const pct = Math.round((completedTasks / totalTasks) * 100);
            percentTxt.innerText = `${pct}%`;
            progressBar.style.width = `${pct}%`;
          };
          
          // Process in batches of 3 dates to avoid Naver API rate-limiting
          const batchSize = 3;
          for (let i = 0; i < dates.length; i += batchSize) {
            const batch = dates.slice(i, i + batchSize);
            await Promise.all(batch.map(async (dateStr) => {
              try {
                addLog(`[${dateStr}] 성과 통계 보고서 생성 대기 중...`);
                statusTxt.innerText = `[${dateStr}] 성과 리포트 조회 중...`;
                const rows = await fetchReportForDate(dateStr, "AD", customerId);
                adReportRows.push(...rows);
                completedTasks++;
                updateProgress();
                addLog(`[${dateStr}] 성과 보고서 완료 (${rows.length}행 수집).`);
                
                if (includeQuery) {
                  addLog(`[${dateStr}] 사용자 검색어 보고서 생성 대기 중...`);
                  statusTxt.innerText = `[${dateStr}] 검색어 리포트 조회 중...`;
                  const qrows = await fetchReportForDate(dateStr, "EXPKEYWORD", customerId);
                  expReportRows.push(...qrows);
                  completedTasks++;
                  updateProgress();
                  addLog(`[${dateStr}] 검색어 보고서 완료 (${qrows.length}행 수집).`);
                }
              } catch (e) {
                addLog(`⚠️ [${dateStr}] 데이터 조회 실패: ${e.message}`);
                completedTasks += (includeQuery ? 2 : 1);
                updateProgress();
              }
            }));
          }
          
          // Match and format rows
          addLog("3. 수집 데이터 필터링 및 이름 매핑 처리 중...");
          statusTxt.innerText = "데이터 이름 매핑 진행 중...";
          
          const filteredAdRows = [];
          const kwIds = new Set();
          
          for (const r of adReportRows) {
            if (r.length < 11) continue;
            const c_id = r[2];
            const g_id = r[3];
            const kw_id = r[4];
            const creative_id = r[5];
            const device = r[8] === "P" ? "PC" : "모바일";
            
            const imp = parseInt(r[9]) || 0;
            const clicks = parseInt(r[10]) || 0;
            const cost = parseInt(r[11]) || 0;
            
            if (clicks === 0) continue;
            
            const c_meta = campaignMap[c_id];
            const c_name = c_meta ? c_meta.name : c_id;
            const c_type = c_meta ? c_meta.type : "";
            
            let productName = "기타광고";
            if (c_type === "WEB_SITE") productName = "파워링크";
            else if (c_type === "PLACE") productName = "플레이스광고";
            else if (c_type === "POWER_CONTENTS") productName = "파워컨텐츠";
            
            if (!allowedProducts.includes(productName)) continue;
            
            if (kw_id && kw_id !== "-") {
              kwIds.add(kw_id);
            }
            
            const dateVal = r[0];
            const dateFormatted = `${dateVal.substring(0,4)}-${dateVal.substring(4,6)}-${dateVal.substring(6,8)}`;
            
            filteredAdRows.push({
              date: dateFormatted,
              campaign: c_name,
              adgroup: adgroupMap[g_id] || g_id,
              kwId: kw_id,
              creative: creative_id,
              device: device,
              product: productName,
              imp: imp,
              clicks: clicks,
              cost: cost
            });
          }
          
          // Fetch keyword texts in chunks
          if (kwIds.size > 0) {
            addLog(`신규 키워드 ID (${kwIds.size}개) 매칭 텍스트 실시간 조회 중...`);
            statusTxt.innerText = "키워드 명칭 변환 중...";
            const kwIdList = Array.from(kwIds);
            const kwBatchSize = 5;
            for (let i = 0; i < kwIdList.length; i += kwBatchSize) {
              const chunk = kwIdList.slice(i, i + kwBatchSize);
              await Promise.all(chunk.map(async (id) => {
                await getKeywordText(id, customerId);
              }));
              await new Promise(res => setTimeout(res, 50));
            }
          }
          
          // Map resolved keyword texts back to rows
          for (const r of filteredAdRows) {
            r.keyword = keywordCache[r.kwId] || "";
          }
          
          addLog("키워드 명칭 매핑 성공.");
          
          // Helper to add summary rows (PC Total, Mobile Total, Grand Total) at the bottom
          function addSummaryRows(dataList, labelKey) {
            if (!dataList || dataList.length === 0) return;
            
            let pcImp = 0, pcClicks = 0, pcCost = 0;
            let mobImp = 0, mobClicks = 0, mobCost = 0;
            
            for (const r of dataList) {
              if (r["기기"] === "PC") {
                pcImp += r["노출수"] || 0;
                pcClicks += r["클릭수"] || 0;
                pcCost += r["총 비용 (원)"] || 0;
              } else if (r["기기"] === "모바일") {
                mobImp += r["노출수"] || 0;
                mobClicks += r["클릭수"] || 0;
                mobCost += r["총 비용 (원)"] || 0;
              }
            }
            
            const totalImp = pcImp + mobImp;
            const totalClicks = pcClicks + mobClicks;
            const totalCost = pcCost + mobCost;
            
            const pcCtr = pcImp > 0 ? (pcClicks / pcImp * 100) : 0;
            const pcCpc = pcClicks > 0 ? (pcCost / pcClicks) : 0;
            
            const mobCtr = mobImp > 0 ? (mobClicks / mobImp * 100) : 0;
            const mobCpc = mobClicks > 0 ? (mobCost / mobClicks) : 0;
            
            const totalCtr = totalImp > 0 ? (totalClicks / totalImp * 100) : 0;
            const totalCpc = totalClicks > 0 ? (totalCost / totalClicks) : 0;
            
            const template = dataList[0] || {};
            const createEmptyRow = (label, device, imp, clk, ctr, cost, cpc) => {
              const row = {};
              Object.keys(template).forEach(k => {
                row[k] = "";
              });
              row[labelKey] = label;
              row["기기"] = device;
              row["노출수"] = imp;
              row["클릭수"] = clk;
              row["클릭률 (CTR %)"] = parseFloat(ctr.toFixed(2));
              row["총 비용 (원)"] = cost;
              row["평균 CPC (원)"] = Math.round(cpc);
              return row;
            };
            
            dataList.push(createEmptyRow("PC 합계", "PC", pcImp, pcClicks, pcCtr, pcCost, pcCpc));
            dataList.push(createEmptyRow("모바일 합계", "모바일", mobImp, mobClicks, mobCtr, mobCost, mobCpc));
            dataList.push(createEmptyRow("전체 총합계", "전체", totalImp, totalClicks, totalCtr, totalCost, totalCpc));
          }

          // Build Sheet 1: 파워링크 성과
          const sheet1Data = [];
          
          if (includeQuery && expReportRows.length > 0) {
            // Use search query report as primary source to show actual keywords and avoid duplication
            for (const r of expReportRows) {
              if (r.length < 10) continue;
              const dateVal = r[0];
              const dateFormatted = `${dateVal.substring(0,4)}-${dateVal.substring(4,6)}-${dateVal.substring(6,8)}`;
              const c_id = r[2];
              const g_id = r[3];
              const sq = r[4];
              const device = r[6] === "P" ? "PC" : "모바일";
              
              const clicks = parseInt(r[9]) || 0;
              const imp = parseInt(r[8]) || 0;
              const cost = parseInt(r[10]) || 0;
              
              if (clicks === 0) continue;
              
              const c_meta = campaignMap[c_id];
              const c_name = c_meta ? c_meta.name : c_id;
              const c_type = c_meta ? c_meta.type : "";
              
              let productName = "기타광고";
              if (c_type === "WEB_SITE") productName = "파워링크";
              else if (c_type === "PLACE") productName = "플레이스광고";
              else if (c_type === "POWER_CONTENTS") productName = "파워컨텐츠";
              
              if (productName !== "파워링크") continue;
              if (!allowedProducts.includes("파워링크")) continue;
              
              const ctr = imp > 0 ? (clicks / imp * 100) : 0;
              const cpc = clicks > 0 ? (cost / clicks) : 0;
              
              sheet1Data.push({
                "날짜": dateFormatted,
                "캠페인": c_name,
                "광고그룹": adgroupMap[g_id] || g_id,
                "키워드": sq,
                "기기": device,
                "노출수": imp,
                "클릭수": clicks,
                "클릭률 (CTR %)": parseFloat(ctr.toFixed(2)),
                "총 비용 (원)": cost,
                "평균 CPC (원)": Math.round(cpc)
              });
            }
          } else {
            // Fallback to AD report keywords if search queries are not requested
            for (const r of filteredAdRows) {
              if (r.product === "파워링크" && r.clicks > 0) {
                const ctr = r.imp > 0 ? (r.clicks / r.imp * 100) : 0;
                const cpc = r.clicks > 0 ? (r.cost / r.clicks) : 0;
                sheet1Data.push({
                  "날짜": r.date,
                  "캠페인": r.campaign,
                  "광고그룹": r.adgroup,
                  "키워드": r.keyword || "-",
                  "기기": r.device,
                  "노출수": r.imp,
                  "클릭수": r.clicks,
                  "클릭률 (CTR %)": parseFloat(ctr.toFixed(2)),
                  "총 비용 (원)": r.cost,
                  "평균 CPC (원)": Math.round(cpc)
                });
              }
            }
          }
          
          sheet1Data.sort((a, b) => b["날짜"].localeCompare(a["날짜"]) || b["클릭수"] - a["클릭수"]);
          addSummaryRows(sheet1Data, "키워드");
          
          // Build Sheet 2: 파워컨텐츠 성과 (Only Power Content, clicks > 0)
          const sheet2Data = filteredAdRows
            .filter(r => r.product === "파워컨텐츠" && r.clicks > 0)
            .map(r => {
              const ctr = r.imp > 0 ? (r.clicks / r.imp * 100) : 0;
              const cpc = r.clicks > 0 ? (r.cost / r.clicks) : 0;
              return {
                "날짜": r.date,
                "캠페인": r.campaign,
                "광고그룹": r.adgroup,
                "키워드/소재": r.keyword || r.creative || "소재없음",
                "기기": r.device,
                "노출수": r.imp,
                "클릭수": r.clicks,
                "클릭률 (CTR %)": parseFloat(ctr.toFixed(2)),
                "총 비용 (원)": r.cost,
                "평균 CPC (원)": Math.round(cpc)
              };
            });
          sheet2Data.sort((a, b) => b["날짜"].localeCompare(a["날짜"]) || b["클릭수"] - a["클릭수"]);
          addSummaryRows(sheet2Data, "키워드/소재");
          
          // Build Sheet 3: 플레이스 성과 (Only Place, clicks > 0)
          const sheet3Data = filteredAdRows
            .filter(r => r.product === "플레이스광고" && r.clicks > 0)
            .map(r => {
              const ctr = r.imp > 0 ? (r.clicks / r.imp * 100) : 0;
              const cpc = r.clicks > 0 ? (r.cost / r.clicks) : 0;
              return {
                "날짜": r.date,
                "캠페인": r.campaign,
                "광고그룹": r.adgroup,
                "키워드": "-",
                "기기": r.device,
                "노출수": r.imp,
                "클릭수": r.clicks,
                "클릭률 (CTR %)": parseFloat(ctr.toFixed(2)),
                "총 비용 (원)": r.cost,
                "평균 CPC (원)": Math.round(cpc)
              };
            });
          sheet3Data.sort((a, b) => b["날짜"].localeCompare(a["날짜"]) || b["클릭수"] - a["클릭수"]);
          addSummaryRows(sheet3Data, "키워드");
          
          // Create Excel Workbook
          addLog("4. 엑셀 워크북 빌드 및 변환 작업 중...");
          statusTxt.innerText = "엑셀 변환 진행 중...";
          
          const wb = XLSX.utils.book_new();
          
          const ws1 = XLSX.utils.json_to_sheet(sheet1Data);
          XLSX.utils.book_append_sheet(wb, ws1, "파워링크");
          
          const ws2 = XLSX.utils.json_to_sheet(sheet2Data);
          XLSX.utils.book_append_sheet(wb, ws2, "파워컨텐츠");
          
          const ws3 = XLSX.utils.json_to_sheet(sheet3Data);
          XLSX.utils.book_append_sheet(wb, ws3, "플레이스");
          
          const fileStart = startDateVal.replace(/-/g, "");
          const fileEnd = endDateVal.replace(/-/g, "");
          XLSX.writeFile(wb, `네이버검색광고_성과분석보고서_${fileStart}_${fileEnd}.xlsx`);
          
          statusTxt.innerText = "✅ 엑셀 다운로드 완료!";
          addLog("🎉 다운로드 성공! 브라우저 다운로드 폴더를 확인해 주세요.");
          
        } catch (error) {
          addLog(`❌ 오류 발생: ${error.message}`);
          statusTxt.innerText = "동기화 오류 발생";
        } finally {
          downloadBtn.disabled = false;
          downloadBtn.classList.remove("opacity-50", "cursor-not-allowed");
        }
      };
    }

                <label class="block text-xs font-bold text-orange-600 dark-mode:text-orange-400 mb-1.5">🎯 글로벌 탐색 지정 단어 설정 (콤마 ',' 구분)</label>
                <div class="flex items-center gap-2">
                  <input type="text" id="competitor-words-input" class="flex-1 px-4 py-2.5 border border-gray-300 dark-mode:border-gray-600 rounded-xl bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="예: 인디컴퍼니, 인테리어, 창업">
                  <button id="competitor-words-save-btn" class="px-5 py-2.5 bg-gray-800 hover:bg-gray-900 dark-mode:bg-gray-700 dark-mode:hover:bg-gray-600 text-white rounded-xl text-xs font-bold shadow-sm transition-all whitespace-nowrap">
                    💾 단어 저장
                  </button>
                </div>
                <!-- Dynamic designated words tags container -->
                <div id="competitor-words-tags" class="flex flex-wrap gap-2 pt-2.5">
                  <!-- Active designated word badges will render here -->
                </div>
              </div>
            </div>
          </div>

          <!-- Blog Addition Card -->
          <div class="bg-white dark-mode:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark-mode:border-gray-700 space-y-4">
            <h3 class="text-sm font-bold text-gray-800 dark-mode:text-gray-100">➕ 탐색 블로그 추가</h3>
            <div class="flex items-center gap-2">
              <input type="text" id="competitor-url-input" class="flex-1 px-4 py-2.5 border border-gray-300 dark-mode:border-gray-600 rounded-xl bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="네이버 블로그 주소(URL) 또는 블로그 아이디 입력">
              <button id="competitor-add-btn" class="px-5 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-xl text-xs font-bold shadow-sm transition-all whitespace-nowrap">
                블로그 등록
              </button>
            </div>
          </div>

          <!-- Control Actions Row -->
          <div class="flex items-center justify-between bg-white dark-mode:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-200 dark-mode:border-gray-700">
            <span class="text-xs font-black text-gray-500">포스팅 목록 펼침 제어</span>
            <div class="flex gap-2">
              <button id="competitor-expand-all-btn" class="px-3.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 dark-mode:bg-gray-750 dark-mode:hover:bg-gray-700 dark-mode:text-gray-250 rounded-lg text-xs font-bold shadow-sm transition-all flex items-center gap-1">
                📂 전체펼침
              </button>
              <button id="competitor-collapse-all-btn" class="px-3.5 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 dark-mode:bg-gray-750 dark-mode:hover:bg-gray-700 dark-mode:text-gray-250 rounded-lg text-xs font-bold shadow-sm transition-all flex items-center gap-1">
                📁 전체접기
              </button>
            </div>
          </div>

          <!-- Scraped Blogs Container -->
          <div id="competitor-blogs-container" class="space-y-6">
            <!-- Dynamic blog cards go here -->
          </div>
        </div>
      `;
    }

    function setupCompetitorBlog() {
      const wordsInput = document.getElementById("competitor-words-input");
      const wordsSaveBtn = document.getElementById("competitor-words-save-btn");
      const urlInput = document.getElementById("competitor-url-input");
      const addBtn = document.getElementById("competitor-add-btn");
      const container = document.getElementById("competitor-blogs-container");

      if (!wordsInput || !wordsSaveBtn || !urlInput || !addBtn || !container) return;

      let competitorConfig = {
        blogs: [],
        designatedWords: [],
        scrapedData: []
      };

      loadConfig();

      wordsSaveBtn.addEventListener("click", saveDesignatedWords);
      addBtn.addEventListener("click", addCompetitorBlog);

      // Expand/Collapse All buttons
      const expandAllBtn = document.getElementById("competitor-expand-all-btn");
      const collapseAllBtn = document.getElementById("competitor-collapse-all-btn");

      if (expandAllBtn) {
        expandAllBtn.addEventListener("click", () => {
          container.querySelectorAll("details").forEach(details => details.open = true);
        });
      }
      if (collapseAllBtn) {
        collapseAllBtn.addEventListener("click", () => {
          container.querySelectorAll("details").forEach(details => details.open = false);
        });
      }

      async function getNaverBlogStatsFromCloud(blogId) {
        try {
          const res = await fetch(`/api/naver-blog?action=info&blogId=${encodeURIComponent(blogId)}`);
          if (res.ok) {
            const data = await res.json();
            if (data.success && data.info) {
              return {
                blogName: data.info.blogName || '네이버 블로그',
                buddyCount: data.info.subscribers || 0,
                totalPostCount: data.info.totalPosts || 0,
                todayVisitors: data.info.todayVisitors || 0,
                totalVisitors: data.info.totalVisitors || 0
              };
            }
          }
        } catch (e) {
          console.error("Cloud stats fetch failed:", e);
        }
        return null;
      }

      async function loadConfig() {
        container.innerHTML = '<div class="py-10 text-center text-xs text-gray-500 font-semibold">데이터 동기화 중...</div>';
        try {
          const res = await fetch("/api/competitor-blog");
          if (res.ok) {
            const data = await res.json();
            competitorConfig = {
              blogs: data.blogs || [],
              designatedWords: data.designatedWords || [],
              scrapedData: data.scrapedData || []
            };
          } else {
            throw new Error("KV 로드 실패");
          }
        } catch (e) {
          console.warn("KV 로드 실패, 로컬 백업 로드:", e);
          const local = localStorage.getItem("competitor_blog_data");
          if (local) {
            try {
              competitorConfig = JSON.parse(local);
            } catch (err) {}
          }
        }
        
        wordsInput.value = (competitorConfig.designatedWords || []).join(", ");
        renderDesignatedWordsTags();
        renderBlogs();

        // Auto-heal failed/missing stats via Cloud API
        for (const blog of competitorConfig.blogs) {
          const blogId = blog.blogId;
          const scrape = competitorConfig.scrapedData.find(s => s.blogId === blogId);
          if (!scrape || !scrape.stats || scrape.stats.blogName === '조회 실패' || scrape.stats.buddyCount === 0) {
            getNaverBlogStatsFromCloud(blogId).then(async (cloud) => {
              if (cloud) {
                if (scrape) {
                  scrape.stats = cloud;
                } else {
                  competitorConfig.scrapedData.push({
                    blogId,
                    stats: cloud,
                    posts: [],
                    lastScraped: new Date().toISOString()
                  });
                }
                await saveConfigToServer();
                renderBlogs();
              }
            });
          }
        }
      }

      function renderDesignatedWordsTags() {
        const tagsContainer = document.getElementById("competitor-words-tags");
        if (!tagsContainer) return;
        tagsContainer.innerHTML = "";
        
        const words = competitorConfig.designatedWords || [];
        if (words.length === 0) {
          tagsContainer.innerHTML = `<span class="text-xs text-gray-400 italic">등록된 탐색 지정 단어가 없습니다.</span>`;
          return;
        }
        
        words.forEach(word => {
          const tag = document.createElement("span");
          tag.className = "inline-flex items-center gap-1 px-2.5 py-1 bg-orange-50 text-orange-600 dark-mode:bg-orange-950/20 dark-mode:text-orange-400 rounded-lg text-xs font-bold border border-orange-100 dark-mode:border-orange-900/50 transition-all select-none";
          tag.innerHTML = `
            <span># ${word}</span>
            <button class="hover:text-red-500 font-bold focus:outline-none ml-0.5" title="삭제">&times;</button>
          `;
          tag.querySelector("button").addEventListener("click", async () => {
            competitorConfig.designatedWords = competitorConfig.designatedWords.filter(w => w !== word);
            wordsInput.value = competitorConfig.designatedWords.join(", ");
            await saveConfigToServer();
            renderDesignatedWordsTags();
            renderBlogs();
          });
          tagsContainer.appendChild(tag);
        });
      }

      async function saveConfigToServer() {
        localStorage.setItem("competitor_blog_data", JSON.stringify(competitorConfig));
        try {
          await fetch("/api/competitor-blog", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(competitorConfig)
          });
        } catch (e) {
          console.error("KV 저장 실패:", e);
        }
      }

      async function saveDesignatedWords() {
        const words = wordsInput.value.split(",").map(w => w.trim()).filter(w => w.length > 0);
        competitorConfig.designatedWords = words;
        await saveConfigToServer();
        renderDesignatedWordsTags();
        alert("🎯 글로벌 탐색 지정 단어가 저장되었습니다!");
        renderBlogs();
      }

      function parseNaverBlogId(input) {
        let val = input.trim();
        val = val.replace(/\/$/, "");
        const match = val.match(/blog\.naver\.com\/([a-zA-Z0-9_-]+)/i);
        if (match) return match[1];
        return val;
      }

      async function addCompetitorBlog() {
        const inputVal = urlInput.value.trim();
        if (!inputVal) return;
        const blogId = parseNaverBlogId(inputVal);

        if (competitorConfig.blogs.some(b => b.blogId === blogId)) {
          alert("이미 등록된 블로그입니다.");
          return;
        }

        urlInput.value = "";
        competitorConfig.blogs.push({ blogId });
        await saveConfigToServer();
        
        await scrapeBlogOnDemand(blogId);
      }

      async function scrapeBlogOnDemand(blogId) {
        const cardEl = document.getElementById(`blog-card-${blogId}`);
        if (cardEl) {
          cardEl.style.opacity = "0.6";
        }
        
        try {
          const res = await fetch(getLocalServerUrl('/api/competitor-blog/scrape-all'), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              blogs: [{ blogId }],
              designatedWords: competitorConfig.designatedWords
            })
          });

          if (!res.ok) throw new Error("로컬 백서버 응답 실패");
          const data = await res.json();
          if (data.success && data.scrapedData && data.scrapedData.length > 0) {
            const fresh = data.scrapedData[0];
            
            // If local server returned failed stats, fallback to Cloud API
            if (!fresh.stats || fresh.stats.blogName === '조회 실패' || fresh.stats.buddyCount === 0) {
              const cloud = await getNaverBlogStatsFromCloud(blogId);
              if (cloud) {
                fresh.stats = cloud;
              }
            }

            const idx = competitorConfig.scrapedData.findIndex(s => s.blogId === blogId);
            if (idx !== -1) {
              competitorConfig.scrapedData[idx] = fresh;
            } else {
              competitorConfig.scrapedData.push(fresh);
            }
            await saveConfigToServer();
          }
        } catch (e) {
          console.error(`수집 요청 실패 (${blogId}):`, e);
          
          // Network failure or offline local server - try to fallback to cloud stats entirely!
          const cloud = await getNaverBlogStatsFromCloud(blogId);
          if (cloud) {
            const idx = competitorConfig.scrapedData.findIndex(s => s.blogId === blogId);
            const fresh = {
              blogId,
              stats: cloud,
              posts: (idx !== -1 ? competitorConfig.scrapedData[idx].posts : []) || [],
              lastScraped: new Date().toISOString()
            };
            if (idx !== -1) {
              competitorConfig.scrapedData[idx] = fresh;
            } else {
              competitorConfig.scrapedData.push(fresh);
            }
            await saveConfigToServer();
          } else {
            alert(`경쟁 블로그 수집을 위해서는 로컬 캡처 서버(${getLocalServerUrl('/')})가 가동 중이어야 합니다.`);
          }
        } finally {
          renderBlogs();
        }
      }

      async function saveNewBlogOrder() {
        const sortedIds = Array.from(container.children)
          .map(card => card.id.replace("blog-card-", ""))
          .filter(id => id);
        
        const newBlogs = [];
        sortedIds.forEach(id => {
          const blog = competitorConfig.blogs.find(b => b.blogId === id);
          if (blog) {
            newBlogs.push(blog);
          }
        });
        
        competitorConfig.blogs = newBlogs;
        await saveConfigToServer();
      }

      async function deleteBlog(blogId) {
        if (!confirm("정말 이 블로그를 삭제하시겠습니까?")) return;
        competitorConfig.blogs = competitorConfig.blogs.filter(b => b.blogId !== blogId);
        competitorConfig.scrapedData = competitorConfig.scrapedData.filter(s => s.blogId !== blogId);
        await saveConfigToServer();
        renderBlogs();
      }

      function renderBlogs() {
        container.innerHTML = "";
        if (competitorConfig.blogs.length === 0) {
          container.innerHTML = '<div class="py-20 text-center text-xs text-gray-400 font-bold bg-white dark-mode:bg-gray-800 rounded-xl border border-gray-200 dark-mode:border-gray-700 shadow-sm">등록된 경쟁 블로그가 없습니다.</div>';
          return;
        }

        competitorConfig.blogs.forEach(blog => {
          const blogId = blog.blogId;
          const scrape = competitorConfig.scrapedData.find(s => s.blogId === blogId) || {
            stats: { blogName: '로딩 대기 중', buddyCount: '-', totalPostCount: '-', todayVisitors: '-', totalVisitors: '-' },
            posts: []
          };
          const stats = scrape.stats || {};
          const posts = scrape.posts || [];
          
          const card = document.createElement("div");
          card.id = `blog-card-${blogId}`;
          card.className = "bg-white dark-mode:bg-gray-800 rounded-xl p-6 shadow-sm border border-gray-200 dark-mode:border-gray-700 space-y-4 cursor-default transition-all duration-200";
          card.setAttribute("draggable", "true");

          // Drag and drop event listeners
          card.addEventListener("dragstart", (e) => {
            e.dataTransfer.setData("text/plain", blogId);
            card.classList.add("opacity-40", "border-orange-500", "scale-[0.98]");
          });
          
          card.addEventListener("dragend", () => {
            card.classList.remove("opacity-40", "border-orange-500", "scale-[0.98]");
            saveNewBlogOrder();
          });
          
          card.addEventListener("dragover", (e) => {
            e.preventDefault();
            const draggingCard = container.querySelector(".opacity-40");
            if (draggingCard && draggingCard !== card) {
              const rect = card.getBoundingClientRect();
              const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
              container.insertBefore(draggingCard, next ? card.nextSibling : card);
            }
          });
          
          const timeStr = scrape.lastScraped ? new Date(scrape.lastScraped).toLocaleString("ko-KR") : "미수집";
          
          let postsHtml = "";
          if (posts.length === 0) {
            postsHtml = '<div class="text-center py-6 text-xs text-gray-400 font-semibold">이번 달에 등록된 게시글이 없습니다.</div>';
          } else {
            postsHtml = `
              <div class="overflow-x-auto pt-2">
                <table class="w-full text-left border-collapse text-xs">
                  <thead>
                    <tr class="border-b border-gray-150 dark-mode:border-gray-700 text-gray-500 font-bold">
                      <th class="py-2.5 px-3 w-12 text-center">번호</th>
                      <th class="py-2.5 px-3">게시글 제목</th>
                      <th class="py-2.5 px-3 w-28 text-center">발행 날짜</th>
                      <th class="py-2.5 px-3 w-24 text-center">원문 링크</th>
                      <th class="py-2.5 px-3 w-24 text-center">지정단어</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-100 dark-mode:divide-gray-750">
            `;
            
            posts.forEach((post, index) => {
              const num = posts.length - index;
              const hasMatches = Array.isArray(post.matchedWords) && post.matchedWords.length > 0;
              const btnClass = hasMatches 
                ? "bg-red-500 hover:bg-red-650 text-white font-extrabold cursor-help scale-[1.02]" 
                : "bg-green-600 hover:bg-green-700 text-white font-bold";
              const tooltip = hasMatches 
                ? `지정단어 포함됨: ${post.matchedWords.join(", ")}` 
                : "지정단어 포함되지 않음";
                
              postsHtml += `
                <tr class="hover:bg-gray-50/50 dark-mode:hover:bg-gray-750/30">
                  <td class="py-3 px-3 text-center font-mono font-bold text-gray-450">${num}</td>
                  <td class="py-3 px-3 font-semibold text-gray-800 dark-mode:text-gray-100">${post.title}</td>
                  <td class="py-3 px-3 text-center text-gray-500 font-medium font-mono">${post.addDate}</td>
                  <td class="py-3 px-3 text-center">
                    <a href="${post.link}" target="_blank" class="px-2.5 py-1 bg-gray-100 hover:bg-gray-200 text-gray-700 dark-mode:bg-gray-750 dark-mode:hover:bg-gray-700 dark-mode:text-gray-250 rounded-lg font-bold text-[11px] transition-all inline-block">바로가기</a>
                  </td>
                  <td class="py-3 px-3 text-center">
                    <button onclick="window.open('${post.link}')" class="px-2.5 py-1 rounded-lg text-[11px] shadow-sm transition-all inline-block ${btnClass}" title="${tooltip}">
                      ${hasMatches ? '포함됨' : '확인'}
                    </button>
                  </td>
                </tr>
              `;
            });
            
            postsHtml += `
                  </tbody>
                </table>
              </div>
            `;
          }

          card.innerHTML = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-150 dark-mode:border-gray-700 pb-4 gap-4">
              <div class="flex items-center gap-3">
                <!-- Drag Handle -->
                <div class="text-gray-300 hover:text-gray-500 dark-mode:text-gray-600 dark-mode:hover:text-gray-400 select-none text-base cursor-grab active:cursor-grabbing flex items-center" title="드래그하여 순서 변경">
                  ☰
                </div>
                <div>
                  <h4 class="text-base font-black text-gray-900 dark-mode:text-white flex items-center gap-1.5">
                    📁 ${stats.blogName || '네이버 블로그'}
                    <span class="text-xs font-mono font-bold text-gray-400 bg-gray-100 dark-mode:bg-gray-700 px-2 py-0.5 rounded">${blogId}</span>
                  </h4>
                  <p class="text-[10px] text-gray-400 font-bold mt-1">마지막 수집 시각: ${timeStr}</p>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button id="refresh-btn-${blogId}" class="px-3 py-1.5 border border-gray-200 hover:bg-gray-50 dark-mode:border-gray-700 dark-mode:hover:bg-gray-750 rounded-xl text-xs font-bold text-gray-700 dark-mode:text-gray-200 shadow-sm transition-colors">
                  🔄 수집 재요청
                </button>
                <button id="delete-btn-${blogId}" class="px-3 py-1.5 border border-red-200 hover:bg-red-50 dark-mode:border-red-950/20 rounded-xl text-xs font-bold text-red-500 transition-colors">
                  ❌ 삭제
                </button>
              </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 pt-1">
              <div class="bg-gray-50 dark-mode:bg-gray-750 border border-gray-150 dark-mode:border-gray-700 rounded-xl p-3 text-center">
                <span class="text-[9px] text-gray-505 font-bold block uppercase tracking-wider">총 등록 글 수</span>
                <span class="text-sm font-black text-gray-800 dark-mode:text-white font-mono">${stats.totalPostCount}</span>
              </div>
              <div class="bg-gray-50 dark-mode:bg-gray-750 border border-gray-150 dark-mode:border-gray-700 rounded-xl p-3 text-center">
                <span class="text-[9px] text-gray-550 font-bold block uppercase tracking-wider">이웃 수</span>
                <span class="text-sm font-black text-gray-800 dark-mode:text-white font-mono">${stats.buddyCount}</span>
              </div>
              <div class="bg-amber-50/50 dark-mode:bg-amber-950/10 border border-amber-100/50 dark-mode:border-amber-900/30 rounded-xl p-3 text-center">
                <span class="text-[9px] text-amber-700 block uppercase tracking-wider">오늘 방문자</span>
                <span class="text-sm font-black text-amber-600 font-mono">${stats.todayVisitors}</span>
              </div>
              <div class="bg-indigo-50/50 dark-mode:bg-indigo-950/10 border border-indigo-100/50 dark-mode:border-indigo-900/30 rounded-xl p-3 text-center col-span-2 md:col-span-1">
                <span class="text-[9px] text-indigo-700 block uppercase tracking-wider">누적 방문자</span>
                <span class="text-sm font-black text-indigo-600 font-mono">${stats.totalVisitors}</span>
              </div>
              <div class="bg-green-50/50 dark-mode:bg-green-950/10 border border-green-100/50 dark-mode:border-green-900/30 rounded-xl p-3 text-center col-span-2 md:col-span-1">
                <span class="text-[9px] text-green-700 block uppercase tracking-wider">이번달 새 글</span>
                <span class="text-sm font-black text-green-600 font-mono">${posts.length} 개</span>
              </div>
            </div>

            <details class="bg-gray-50/40 dark-mode:bg-gray-900/20 border border-gray-150 dark-mode:border-gray-700 rounded-xl p-4 transition-all">
              <summary class="text-xs font-bold text-gray-700 dark-mode:text-gray-300 cursor-pointer select-none focus:outline-none flex items-center justify-between">
                <span>이번 달 게시글 목록 (펼쳐보기)</span>
                <span class="px-2 py-0.5 bg-gray-200 dark-mode:bg-gray-700 rounded-md text-[9px] font-extrabold text-gray-600 dark-mode:text-gray-300 font-mono">${posts.length}</span>
              </summary>
              <div class="mt-4 border-t border-gray-150 dark-mode:border-gray-700 pt-3">
                ${postsHtml}
              </div>
            </details>
          `;

          container.appendChild(card);

          document.getElementById(`refresh-btn-${blogId}`).addEventListener("click", () => scrapeBlogOnDemand(blogId));
          document.getElementById(`delete-btn-${blogId}`).addEventListener("click", () => deleteBlog(blogId));
        });
      }
    }

    window.addEventListener("load", initApp);
  </script>
</body>
</html>
