<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>개인 포트폴리오</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body.dark-mode { @apply bg-gray-900 text-white; }
    .menu-item { cursor: grab; }
    .menu-item:active { cursor: grabbing; }
    .menu-item.dragging { opacity: 0.5; }
    .editable { cursor: text; padding: 2px 4px; border-radius: 4px; }
    .editable:hover { background-color: rgba(255,255,255,0.1); }
  </style>
</head>
<body class="text-gray-800 font-sans min-h-screen">
  <div class="min-h-screen grid grid-cols-1 md:grid-cols-[220px_1fr]">
    <!-- LEFT SIDEBAR -->
    <aside id="sidebar" style="background-color: #dd5828;" class="text-white p-4 md:p-6 overflow-y-auto flex flex-col max-h-screen">
      <div class="text-2xl font-bold mb-8 cursor-pointer editable" id="brand-name" contenteditable="true">Portfolio</div>
      <nav id="menu-container" class="space-y-2 flex-1"></nav>
      <div class="border-t border-white pt-4 mt-6 space-y-2">
        <button id="add-menu-btn" class="w-full px-3 py-2 rounded-lg text-xs font-semibold bg-white bg-opacity-20 hover:bg-opacity-30">➕ 메뉴 추가</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="p-4 md:p-8 overflow-y-auto relative">
      <div class="absolute top-4 right-4">
        <button id="theme-toggle-btn" class="px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 hover:bg-gray-300 text-gray-800 dark-mode:bg-gray-700 dark-mode:text-white dark-mode:hover:bg-gray-600 transition-colors">🌙 다크모드</button>
      </div>
    </main>
  </div>

  <!-- PASSWORD MODAL -->
  <div id="password-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-8 shadow-2xl max-w-sm w-full mx-4">
      <h2 class="text-2xl font-bold mb-2 text-gray-800">접근 제한</h2>
      <p class="text-gray-600 mb-6">비밀번호를 입력하세요.</p>
      <input type="password" id="password-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none" placeholder="비밀번호">
      <button id="password-submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold">확인</button>
    </div>
  </div>

  <!-- ADD MENU MODAL -->
  <div id="menu-edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-8 shadow-2xl max-w-sm w-full mx-4">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">메뉴 추가</h2>
      <input type="text" id="new-menu-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none" placeholder="메뉴명">
      <div class="flex gap-2">
        <button id="menu-edit-cancel" class="flex-1 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg font-semibold">취소</button>
        <button id="menu-edit-save" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold">추가</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // 시스템 설정
    // ============================================
    const PASSWORD = "1";
    const defaultMenus = [
      { id: "webp", name: "webP변환", protected: true },
      { id: "stats", name: "방문자통계", protected: true },
      { id: "marketing", name: "주간 마케팅 비용", protected: true },
      { id: "home", name: "홈", protected: false },
      { id: "about", name: "소개", protected: false }
    ];

    let currentMenus = [];
    let isDarkMode = false;
    let isAuthenticated = false;

    // ============================================
    // 로컬스토리지 관리
    // ============================================
    function loadMenuOrder() { return JSON.parse(localStorage.getItem("menuOrder") || JSON.stringify(defaultMenus)); }
    function saveMenuOrder() { localStorage.setItem("menuOrder", JSON.stringify(currentMenus)); }
    function loadDarkMode() { return localStorage.getItem("darkMode") === "true"; }
    function saveDarkMode() { localStorage.setItem("darkMode", isDarkMode); }
    function loadAuthStatus() { return localStorage.getItem("authenticated") === "true"; }
    function saveAuthStatus() { localStorage.setItem("authenticated", isAuthenticated); }
    function saveBrandName(name) { localStorage.setItem("brandName", name); }
    function loadBrandName() { return localStorage.getItem("brandName") || "Portfolio"; }

    // ============================================
    // 테마 관리
    // ============================================
    function applyTheme() {
      if (isDarkMode) {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle-btn").textContent = "☀️ 라이트모드";
      } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle-btn").textContent = "🌙 다크모드";
      }
      saveDarkMode();
    }

    document.getElementById("theme-toggle-btn").addEventListener("click", () => {
      isDarkMode = !isDarkMode;
      applyTheme();
    });

    // Portfolio 텍스트 수정
    document.getElementById("brand-name").addEventListener("blur", (e) => {
      const newName = e.target.textContent.trim() || "Portfolio";
      e.target.textContent = newName;
      saveBrandName(newName);
    });

    document.getElementById("brand-name").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        e.target.blur();
      }
    });

    // ============================================
    // 메뉴 관리
    // ============================================
    function renderMenus() {
      const container = document.getElementById("menu-container");
      container.innerHTML = "";
      currentMenus.forEach((menu, index) => {
        const btn = document.createElement("button");
        btn.className = "menu-item block w-full text-left px-4 py-3 rounded-xl text-white hover:bg-white hover:text-orange-700 text-sm font-semibold group relative";
        btn.draggable = true;
        btn.dataset.menuId = menu.id;
        btn.dataset.index = index;

        let html = `<span>${menu.name}</span>`;
        if (menu.protected) html += " 🔒";
        html += `<div class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 space-x-1 flex">
          <button class="menu-edit-btn px-2 py-1 bg-white bg-opacity-20 rounded text-xs">✏️</button>
        </div>`;
        btn.innerHTML = html;

        btn.addEventListener("click", (e) => {
          if (!e.target.classList.contains("menu-edit-btn")) {
            selectMenu(menu);
          }
        });

        btn.querySelector(".menu-edit-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          const newName = prompt("새로운 메뉴명:", menu.name);
          if (newName && newName.trim() && menu.id.startsWith("custom-")) {
            currentMenus[index].name = newName.trim();
            saveMenuOrder();
            renderMenus();
            renderPanels();
          } else if (!menu.id.startsWith("custom-")) {
            alert("기본 메뉴는 이름 수정이 불가능합니다.");
          }
        });

        btn.addEventListener("dragstart", (e) => {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("dragIndex", index);
        });

        btn.addEventListener("drop", (e) => {
          e.preventDefault();
          const dragIndex = parseInt(e.dataTransfer.getData("dragIndex"));
          if (dragIndex !== index) {
            [currentMenus[dragIndex], currentMenus[index]] = [currentMenus[index], currentMenus[dragIndex]];
            saveMenuOrder();
            renderMenus();
          }
        });

        btn.addEventListener("dragover", (e) => e.preventDefault());
        container.appendChild(btn);
      });
    }

    function selectMenu(menu) {
      if (!isAuthenticated && menu.protected) {
        showPasswordModal(menu);
        return;
      }
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      const panel = document.getElementById(menu.id);
      if (panel) panel.classList.remove("hidden");
    }

    function showPasswordModal(menu) {
      const modal = document.getElementById("password-modal");
      const input = document.getElementById("password-input");
      input.value = "";
      input.focus();

      document.getElementById("password-submit").onclick = () => {
        if (input.value === PASSWORD) {
          isAuthenticated = true;
          saveAuthStatus();
          modal.classList.add("hidden");
          selectMenu(menu);
        } else {
          alert("비밀번호가 올바르지 않습니다.");
          input.value = "";
          input.focus();
        }
      };

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById("password-submit").click();
      });

      modal.classList.remove("hidden");
    }

    document.getElementById("add-menu-btn").addEventListener("click", () => {
      document.getElementById("menu-edit-modal").classList.remove("hidden");
      document.getElementById("new-menu-name").focus();
    });

    document.getElementById("menu-edit-cancel").addEventListener("click", () => {
      document.getElementById("menu-edit-modal").classList.add("hidden");
    });

    document.getElementById("menu-edit-save").addEventListener("click", () => {
      const name = document.getElementById("new-menu-name").value.trim();
      if (name) {
        currentMenus.push({ id: "custom-" + Date.now(), name, protected: false });
        saveMenuOrder();
        renderMenus();
        renderPanels();
        document.getElementById("menu-edit-modal").classList.add("hidden");
      }
    });

    // ============================================
    // 패널 렌더링
    // ============================================
    function renderPanels() {
      const main = document.getElementById("main-content");
      const themeBtn = main.querySelector("#theme-toggle-btn");
      main.innerHTML = `<div class="absolute top-4 right-4">
        <button id="theme-toggle-btn" class="px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 hover:bg-gray-300 text-gray-800 dark-mode:bg-gray-700 dark-mode:text-white dark-mode:hover:bg-gray-600 transition-colors">${isDarkMode ? "☀️ 라이트모드" : "🌙 다크모드"}</button>
      </div>`;

      document.getElementById("theme-toggle-btn").addEventListener("click", () => {
        isDarkMode = !isDarkMode;
        applyTheme();
      });

      currentMenus.forEach(menu => {
        const section = document.createElement("section");
        section.id = menu.id;
        section.className = "panel hidden";
        section.innerHTML = getPanelHTML(menu.id, menu.name);
        main.appendChild(section);
      });

      // 초기: 홈 표시
      const home = document.getElementById("home");
      if (home) home.classList.remove("hidden");
    }

    function getPanelHTML(id, name) {
      if (id === "webp") return getWebPHTML();
      if (id === "stats") return getStatsHTML();
      if (id === "marketing") return getMarketingHTML();
      if (id === "home") return `<div class="max-w-4xl mx-auto bg-white dark-mode:bg-gray-800 rounded-xl p-8 shadow-lg"><h2 class="text-3xl font-bold mb-4">홈</h2><p class="text-gray-600 dark-mode:text-gray-300 editable" contenteditable="true" id="home-content">여기에 홈 페이지 내용을 입력하세요.</p></div>`;
      if (id === "about") return `<div class="max-w-4xl mx-auto bg-white dark-mode:bg-gray-800 rounded-xl p-8 shadow-lg"><h2 class="text-3xl font-bold mb-4">소개</h2><p class="text-gray-600 dark-mode:text-gray-300 editable" contenteditable="true" id="about-content">여기에 소개 페이지 내용을 입력하세요.</p></div>`;
      return `<div class="max-w-4xl mx-auto bg-white dark-mode:bg-gray-800 rounded-xl p-8"><h2 class="text-3xl font-bold mb-4">${name}</h2></div>`;
    }

    // ============================================
    // webP 변환 메뉴 (제공된 코드 그대로)
    // ============================================
    function getWebPHTML() {
      return `<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-10"><h1 class="text-3xl font-bold text-center text-gray-900 mb-2">통합 웹 이미지 최적화 도구</h1><p class="text-center text-gray-500 mb-8">업로드 목적에 맞는 구역에 사진을 드래그하세요. (자동 분류 및 최적화)</p><div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-8 flex items-start gap-3"><svg class="w-6 h-6 text-indigo-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg><div><h3 class="text-sm font-bold text-indigo-900 mb-1">공통 적용: [유사 문서 회피용] 1px 미세 크롭 AI 회피 기술 탑재</h3><p class="text-xs text-indigo-700 leading-relaxed">업로드되는 모든 사진은 상하좌우 1픽셀(px)이 자동으로 미세하게 잘려 나갑니다. 육안으로는 차이가 없지만, 네이버/구글 검색엔진 비전 AI(Vision AI)의 픽셀 스캔을 교란하여 <strong>타 채널 중복 업로드 시 '유사 이미지'로 묶이는 패널티를 방지</strong>하는 강력한 마케팅 방어 시스템입니다.</p></div></div><div class="mb-12"><div class="flex items-center gap-3 mb-4"><span class="bg-gray-800 text-white text-sm font-bold px-3 py-1 rounded-full">1번 기능</span><h2 class="text-2xl font-bold text-gray-800">공식 홈페이지용 <span class="text-lg font-medium text-gray-500">(초고속 로딩 최적화)</span></h2></div><div class="bg-gray-50 p-5 rounded-xl border border-gray-200 mb-6"><ul class="text-sm text-gray-700 list-disc list-inside space-y-1"><li><span class="font-bold text-gray-900">가로/세로 자동 리사이징:</span> 가로 사진은 <span class="font-bold">폭 1920px</span>, 세로 사진은 <span class="font-bold">폭 1080px</span> 한도 내에서 비율이 유지되며 축소됩니다.</li><li><span class="font-bold text-gray-900">포맷 및 품질:</span> WEBP / 최상급 품질 <span class="font-bold text-blue-600">95%</span> (용량은 대폭 줄이면서 무손실급 화질 유지)</li></ul></div><div id="drop-zone-hq" class="border-2 border-dashed border-green-300 rounded-xl p-10 text-center cursor-pointer transition-colors hover:bg-green-50 group bg-white"><div class="text-green-400 mb-4 group-hover:text-green-500 transition-colors flex justify-center gap-2"><svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg><svg class="h-12 w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg></div><h3 class="text-xl font-bold text-green-800 mb-2">홈페이지용 사진 일괄 업로드</h3><p class="text-sm text-green-600 font-medium mb-1">방향 상관없이 드래그 (1920/1080px 기준 리사이징)</p><input type="file" id="file-hq" multiple accept=".jpg, .jpeg, .png" class="hidden"></div></div><div class="mb-8"><div class="flex items-center gap-3 mb-4"><span class="bg-blue-600 text-white text-sm font-bold px-3 py-1 rounded-full">2번 기능</span><h2 class="text-2xl font-bold text-gray-800">네이버 블로그용 <span class="text-lg font-medium text-gray-500">(고화질 원본 보존 / 20MB 제한)</span></h2></div><div class="bg-blue-50 p-5 rounded-xl border border-blue-100 mb-6"><ul class="text-sm text-blue-800 list-disc list-inside space-y-1"><li><span class="font-bold text-blue-900">원본 해상도 보존 (미세 크롭만 진행):</span> 사용자가 확대해도 텍스트가 깨지지 않도록 이미지 사이즈(폭/높이)를 강제로 줄이지 않습니다. (가장자리 1px 크롭만 적용)</li><li><span class="font-bold text-blue-900">새로운 파일 생성 (SEO):</span> 시각적 퀄리티는 유지하되, WEBP (95%) 확장자로 변환하여 검색엔진이 '새로운 파일'로 인식하게 만듭니다.</li><li><span class="font-bold text-blue-900">20MB 업로드 방어선:</span> 변환 용량이 블로그 제한 20MB를 넘길 경우, <span class="font-bold">19.9MB에 맞춰질 때까지만</span> 해상도를 미세하게 축소하여 업로드 불가 현상을 차단합니다.</li></ul></div><div id="drop-zone-blog" class="border-2 border-dashed border-blue-300 rounded-xl p-10 text-center cursor-pointer transition-colors hover:bg-blue-50 group bg-white"><div class="text-blue-400 mb-4 group-hover:text-blue-500 transition-colors flex justify-center gap-2"><svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg><svg class="h-12 w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg></div><h3 class="text-xl font-bold text-blue-800 mb-2">블로그용 사진 일괄 업로드</h3><p class="text-sm text-blue-600 font-medium mb-1">방향 상관없이 드래그 (해상도 원본 유지 + WEBP 변환)</p><input type="file" id="file-blog" multiple accept=".jpg, .jpeg, .png" class="hidden"></div></div><div id="progress-container" class="hidden mb-8"><div class="flex justify-between text-sm font-medium text-gray-700 mb-1"><span id="progress-status-text">이미지 처리 중...</span><span id="progress-text">0 / 0</span></div><div class="w-full bg-gray-200 rounded-full h-2.5"><div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div></div><div id="result-section" class="hidden"><div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-4 border-t pt-6"><h2 class="text-xl font-bold text-gray-800">변환 결과 (<span id="result-count">0</span>개)</h2><div class="flex gap-2 w-full sm:w-auto"><button id="clear-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors font-medium text-sm">목록 초기화</button><button id="download-zip-btn" class="flex-1 sm:flex-none px-6 py-2 bg-gray-800 text-white rounded-lg hover:bg-black transition-colors font-medium shadow-sm flex items-center justify-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>전체 ZIP 다운로드</button></div></div><div class="overflow-x-auto rounded-lg border border-gray-200"><table class="w-full text-sm text-left text-gray-500"><thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b"><tr><th scope="col" class="px-4 py-3">자동 분류</th><th scope="col" class="px-4 py-3">미리보기</th><th scope="col" class="px-4 py-3">최적화된 파일명</th><th scope="col" class="px-4 py-3">용량 및 해상도 변화</th><th scope="col" class="px-4 py-3">다운로드</th></tr></thead><tbody id="result-list"></tbody></table></div></div></div>`;
    }

    // ============================================
    // 통계 메뉴 UI
    // ============================================
    function getStatsHTML() {

    // ============================================
    // webP 처리 함수 (제공된 코드 그대로 사용)
    // ============================================
    const results = [];

    function processWebpResizedAuto(file, quality, targetLandWidth, targetPortWidth) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const isLandscape = img.width >= img.height;
            const targetWidth = isLandscape ? targetLandWidth : targetPortWidth;
            const scale = targetWidth / Math.max(img.width, img.height);
            const scaledWidth = Math.round(img.width * scale);
            const scaledHeight = Math.round(img.height * scale);

            const canvas = document.createElement('canvas');
            canvas.width = scaledWidth;
            canvas.height = scaledHeight;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, scaledWidth, scaledHeight);

            canvas.toBlob(blob => {
              const newName = file.name.split('.')[0] + '_' + scaledWidth + 'x' + scaledHeight + (isLandscape ? '_landscape' : '_portrait') + '.webp';
              const originalSize = file.size;
              const newSize = blob.size;
              const reduction = ((1 - newSize / originalSize) * 100).toFixed(1);

              results.push({
                file: new File([blob], newName, { type: 'image/webp' }),
                originalName: file.name,
                newName: newName,
                originalSize: originalSize,
                newSize: newSize,
                reduction: reduction,
                width: scaledWidth,
                height: scaledHeight,
                mode: 'homepage',
                blob: blob
              });
              resolve();
            }, 'image/webp', quality / 100);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function processWebpBlogOriginal(file, quality) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let width = img.width - 2;
            let height = img.height - 2;

            const compressImage = (w, h) => {
              return new Promise(res => {
                const canvas = document.createElement('canvas');
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 1, 1, w, h, 0, 0, w, h);

                canvas.toBlob(blob => {
                  res(blob);
                }, 'image/webp', quality / 100);
              });
            };

            const tryCompress = async () => {
              let blob = await compressImage(width, height);
              while (blob.size > 19.9 * 1024 * 1024 && width > 100 && height > 100) {
                width = Math.round(width * 0.95);
                height = Math.round(height * 0.95);
                blob = await compressImage(width, height);
              }

              const newName = file.name.split('.')[0] + '_' + width + 'x' + height + '_blog.webp';
              results.push({
                file: new File([blob], newName, { type: 'image/webp' }),
                originalName: file.name,
                newName: newName,
                originalSize: file.size,
                newSize: blob.size,
                reduction: ((1 - blob.size / file.size) * 100).toFixed(1),
                width: width,
                height: height,
                mode: 'blog',
                blob: blob
              });
              resolve();
            };

            tryCompress();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function setupDropZones() {
      const setupZone = (zoneId, isHQ) => {
        const zone = document.getElementById(zoneId);
        if (!zone) return;

        zone.addEventListener('dragover', e => {
          e.preventDefault();
          zone.style.backgroundColor = isHQ ? '#dcfce7' : '#dbeafe';
        });
        zone.addEventListener('dragleave', () => {
          zone.style.backgroundColor = 'white';
        });
        zone.addEventListener('drop', e => {
          e.preventDefault();
          zone.style.backgroundColor = 'white';
          const files = Array.from(e.dataTransfer.files);
          handleFiles(files, isHQ);
        });

        zone.addEventListener('click', () => document.getElementById(isHQ ? 'file-hq' : 'file-blog').click());
        document.getElementById(isHQ ? 'file-hq' : 'file-blog').addEventListener('change', e => {
          handleFiles(Array.from(e.target.files), isHQ);
        });
      };

      setupZone('drop-zone-hq', true);
      setupZone('drop-zone-blog', false);
    }

    async function handleFiles(files, isHQ) {
      document.getElementById('progress-container').classList.remove('hidden');
      document.getElementById('result-section').classList.add('hidden');
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (!file.type.startsWith('image/')) continue;

        progressText.textContent = `${i + 1} / ${files.length}`;
        progressBar.style.width = ((i + 1) / files.length * 100) + '%';

        if (isHQ) {
          await processWebpResizedAuto(file, 95, 1920, 1080);
        } else {
          await processWebpBlogOriginal(file, 95);
        }
      }

      displayResults();
    }

    function displayResults() {
      document.getElementById('progress-container').classList.add('hidden');
      document.getElementById('result-section').classList.remove('hidden');
      document.getElementById('result-count').textContent = results.length;

      const list = document.getElementById('result-list');
      list.innerHTML = '';

      results.forEach((result, idx) => {
        const row = document.createElement('tr');
        row.className = idx % 2 === 0 ? 'border-b border-gray-100' : 'bg-gray-50 border-b border-gray-100';

        const sizeReductionColor = result.reduction > 50 ? '#10b981' : result.reduction > 30 ? '#f59e0b' : '#ef4444';

        row.innerHTML = `
          <td class="px-4 py-3 text-xs"><span style="background-color: ${result.mode === 'homepage' ? '#dcfce7' : '#dbeafe'};" class="px-2 py-1 rounded">${result.mode === 'homepage' ? '🏠 홈페이지' : '📝 블로그'}</span></td>
          <td class="px-4 py-3"><div class="w-12 h-12 rounded bg-gray-100 flex items-center justify-center overflow-hidden"><img src="${URL.createObjectURL(result.blob)}" style="width:100%; height:100%; object-fit: cover;"></div></td>
          <td class="px-4 py-3 text-xs"><code class="bg-gray-100 px-2 py-1 rounded text-xs">${result.newName}</code></td>
          <td class="px-4 py-3 text-xs"><span class="block text-gray-600">${(result.originalSize/1024/1024).toFixed(2)}MB → ${(result.newSize/1024/1024).toFixed(2)}MB</span><span style="color: ${sizeReductionColor};" class="font-bold">${result.reduction}% 감소</span><br><span class="text-gray-500">${result.width}x${result.height}px</span></td>
          <td class="px-4 py-3"><a href="${URL.createObjectURL(result.blob)}" download="${result.newName}" class="px-3 py-1 text-xs font-semibold text-white rounded bg-blue-600 hover:bg-blue-700 inline-block">⬇️ 다운</a></td>
        `;
        list.appendChild(row);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const main = document.getElementById('main-content');
      if (main && main.querySelector('#drop-zone-hq')) {
        setupDropZones();

        document.getElementById('clear-btn').addEventListener('click', () => {
          results.length = 0;
          document.getElementById('progress-container').classList.add('hidden');
          document.getElementById('result-section').classList.add('hidden');
        });

        document.getElementById('download-zip-btn').addEventListener('click', async () => {
          const zip = new JSZip();
          results.forEach(result => {
            zip.file(result.newName, result.blob);
          });
          const blob = await zip.generateAsync({ type: 'blob' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'converted_images.zip';
          link.click();
        });
      }
    });

    function renderMonthlyTable() {
      const tbody = document.getElementById('monthly-body');
      if (!tbody) return;
      tbody.innerHTML = '';

      monthlyData.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-300 dark-mode:border-gray-600 hover:bg-gray-50 dark-mode:hover:bg-gray-700';
        let html = `<td class="py-2 px-2 font-bold text-center border-r border-gray-200 dark-mode:border-gray-600 bg-gray-50 dark-mode:bg-gray-700">${row.year}</td>`;

        row.data.forEach(val => {
          html += `<td class="py-2 px-1 text-center border-r border-gray-200 dark-mode:border-gray-600 text-gray-700 dark-mode:text-gray-200">${val}</td>`;
        });

        const avg = Math.round(row.data.reduce((a, b) => a + b, 0) / row.data.length);
        html += `<td class="py-2 px-2 text-center font-bold bg-gray-100 dark-mode:bg-gray-600 text-gray-800 dark-mode:text-gray-100">${avg}</td>`;
        tr.innerHTML = html;
        tbody.appendChild(tr);
      });
    }

    function renderDailyTable() {
      const tbody = document.getElementById('daily-body');
      if (!tbody) return;
      tbody.innerHTML = '';

      dailyData.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-300 dark-mode:border-gray-600 hover:bg-gray-50 dark-mode:hover:bg-gray-700';
        let html = `<td class="py-2 px-2 font-bold text-center border-r border-gray-200 dark-mode:border-gray-600 bg-gray-50 dark-mode:bg-gray-700">${row.year}</td>`;

        row.data.forEach(val => {
          html += `<td class="py-2 px-1 text-center border-r border-gray-200 dark-mode:border-gray-600 text-gray-700 dark-mode:text-gray-200">${val}</td>`;
        });

        const avg = Math.round(row.data.reduce((a, b) => a + b, 0) / row.data.length);
        html += `<td class="py-2 px-2 text-center font-bold bg-gray-100 dark-mode:bg-gray-600 text-gray-800 dark-mode:text-gray-100">${avg}</td>`;
        tr.innerHTML = html;
        tbody.appendChild(tr);
      });
    }

    // 초기 샘플 데이터
    monthlyData = [
      { year: '2026', data: [703, 1012, 2065, 1543, 2143, 1876, 2341, 2098, 1654, 1987, 2234, 1876] }
    ];

    dailyData = [
      { year: '2026', data: [23, 32, 68, 51, 71, 62, 77, 69, 55, 66, 74, 62] }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      renderMonthlyTable();
      renderDailyTable();

      const editBtn = document.getElementById('edit-stats-btn');
      const editPanel = document.getElementById('edit-panel');
      const closeBtn = document.getElementById('close-edit-btn');
      const importBtn = document.getElementById('import-btn');

      if (editBtn) {
        editBtn.addEventListener('click', () => {
          editPanel.classList.toggle('hidden');
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          editPanel.classList.add('hidden');
        });
      }

      if (importBtn) {
        importBtn.addEventListener('click', () => {
          const monthlyText = document.getElementById('data-import').value;
          const dailyText = document.getElementById('daily-import').value;

          if (monthlyText) {
            const lines = monthlyText.trim().split('\\n');
            monthlyData = lines.map(line => {
              const parts = line.trim().split(/\\s+/);
              return {
                year: parts[0],
                data: parts.slice(1).map(Number)
              };
            });
          }

          if (dailyText) {
            const lines = dailyText.trim().split('\\n');
            dailyData = lines.map(line => {
              const parts = line.trim().split(/\\s+/);
              return {
                year: parts[0],
                data: parts.slice(1).map(Number)
              };
            });
          }

          renderMonthlyTable();
          renderDailyTable();
          editPanel.classList.add('hidden');
          alert('데이터가 적용되었습니다.');
        });
      }
    });
