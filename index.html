    function setupCadConversion() {
      const dropzone = document.getElementById("cad-dropzone");
      const fileInput = document.getElementById("cad-file-input");
      const workspace = document.getElementById("cad-workspace");
      const canvas = document.getElementById("cad-canvas");
      const thresholdSlider = document.getElementById("cad-threshold-slider");
      const thresholdVal = document.getElementById("cad-threshold-val");
      const textListContainer = document.getElementById("cad-text-list");
      const autoDetectBtn = document.getElementById("cad-auto-detect-btn");
      const ocrBtn = document.getElementById("cad-ocr-btn");
      const toolLine = document.getElementById("cad-tool-line");
      const toolErase = document.getElementById("cad-tool-erase");
      const clearBtn = document.getElementById("cad-clear-btn");
      const exportBtn = document.getElementById("cad-export-dxf");

      if (!dropzone) return;

      let ctx = canvas.getContext("2d");
      let originalImage = null;
      let ocrTexts = [];      // [{text, x, y, w, h, angle}]
      let userLines = [];     // [{x1, y1, x2, y2}]
      let activeTool = "line"; // "line", "erase"
      let isDrawing = false;
      let startX = 0;
      let startY = 0;

      // Dropzone events
      dropzone.addEventListener("click", () => fileInput.click());
      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("border-orange-500", "bg-opacity-10");
      });
      dropzone.addEventListener("dragleave", () => {
        dropzone.classList.remove("border-orange-500", "bg-opacity-10");
      });
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("border-orange-500", "bg-opacity-10");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
          processImageFile(file);
        }
      });
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) processImageFile(file);
      });

      function processImageFile(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          const img = new Image();
          img.onload = function() {
            originalImage = img;
            
            // Set canvas size (keep Aspect Ratio, limit max width to 800)
            const maxW = 800;
            let w = img.width;
            let h = img.height;
            if (w > maxW) {
              h = Math.round((maxW * h) / w);
              w = maxW;
            }
            canvas.width = w;
            canvas.height = h;

            userLines = [];
            ocrTexts = [];
            workspace.classList.remove("hidden");
            
            // Apply initial binarization filter
            applyBinarization();
            
            // Run auto line detection immediately on upload!
            detectLines();
            
            // Request vision OCR
            const base64Str = evt.target.result.split(",")[1];
            fetchOcrData(base64Str);
          };
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Perform binarization filter on canvas
      function applyBinarization() {
        if (!originalImage) return;
        
        // Draw original scaled image
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        
        // Extract pixel data
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const threshold = parseInt(thresholdSlider.value, 10);
        
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i+1];
          const b = data[i+2];
          // Grayscale luminance
          const gray = 0.299 * r + 0.587 * g + 0.114 * b;
          // Apply threshold
          const val = gray >= threshold ? 255 : 0;
          data[i] = val;
          data[i+1] = val;
          data[i+2] = val;
        }
        ctx.putImageData(imgData, 0, 0);

        // Draw overlays (user custom lines & OCR textboxes)
        drawOverlays();
      }

      function drawOverlays() {
        // Draw user drawn/detected lines
        ctx.strokeStyle = "#F97316";
        ctx.lineWidth = 2;
        userLines.forEach(line => {
          ctx.beginPath();
          ctx.moveTo(line.x1, line.y1);
          ctx.lineTo(line.x2, line.y2);
          ctx.stroke();
        });

        // Draw OCR text bounding boxes (with rotation support)
        ctx.font = "bold 10px monospace";
        
        ocrTexts.forEach(item => {
          ctx.save();
          // Translate to bounding box center
          const midX = item.x + item.w / 2;
          const midY = item.y + item.h / 2;
          ctx.translate(midX, midY);
          // Rotate canvas context
          ctx.rotate((item.angle || 0) * Math.PI / 180);
          
          // Draw rect centered
          ctx.strokeStyle = "rgba(59, 130, 246, 0.6)";
          ctx.lineWidth = 1;
          ctx.fillStyle = "rgba(59, 130, 246, 0.1)";
          ctx.fillRect(-item.w / 2, -item.h / 2, item.w, item.h);
          ctx.strokeRect(-item.w / 2, -item.h / 2, item.w, item.h);
          
          // Draw text centered above box
          ctx.fillStyle = "#F97316";
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";
          ctx.fillText(item.text, 0, -item.h / 2 - 2);
          
          ctx.restore();
        });
      }

      // Slider listener
      thresholdSlider.addEventListener("input", (e) => {
        thresholdVal.textContent = e.target.value;
        applyBinarization();
      });

      // Helper for perpendicular distance from point to line (for RDP algorithm)
      function getPerpendicularDistance(pt, lineStart, lineEnd) {
        const dx = lineEnd.x - lineStart.x;
        const dy = lineEnd.y - lineStart.y;
        if (dx === 0 && dy === 0) {
          return Math.hypot(pt.x - lineStart.x, pt.y - lineStart.y);
        }
        const num = Math.abs(dy * pt.x - dx * pt.y + lineEnd.x * lineStart.y - lineEnd.y * lineStart.x);
        const den = Math.hypot(dx, dy);
        return num / den;
      }

      // Ramer-Douglas-Peucker path simplification
      function ramerDouglasPeucker(points, epsilon) {
        if (points.length <= 2) return points;
        let maxDistance = 0;
        let index = 0;
        const end = points.length - 1;
        for (let i = 1; i < end; i++) {
          const dist = getPerpendicularDistance(points[i], points[0], points[end]);
          if (dist > maxDistance) {
            maxDistance = dist;
            index = i;
          }
        }
        if (maxDistance > epsilon) {
          const results1 = ramerDouglasPeucker(points.slice(0, index + 1), epsilon);
          const results2 = ramerDouglasPeucker(points.slice(index), epsilon);
          return results1.slice(0, results1.length - 1).concat(results2);
        } else {
          return [points[0], points[end]];
        }
      }

      // 8-connected neighbor line path tracer
      function tracePath(startX, startY, w, h, data, visited, threshold) {
        const path = [{ x: startX, y: startY }];
        visited[startY * w + startX] = 1;
        let cx = startX;
        let cy = startY;
        let tracing = true;

        function isBlackAndUnvisited(x, y) {
          if (x < 0 || x >= w || y < 0 || y >= h) return false;
          if (visited[y * w + x]) return false;
          const idx = (y * w + x) * 4;
          const gray = 0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2];
          return gray < threshold;
        }

        while (tracing) {
          let foundNext = false;
          const dirs = [
            { dx: 1, dy: 0 }, { dx: 1, dy: 1 }, { dx: 0, dy: 1 }, { dx: -1, dy: 1 },
            { dx: -1, dy: 0 }, { dx: -1, dy: -1 }, { dx: 0, dy: -1 }, { dx: 1, dy: -1 }
          ];
          for (let i = 0; i < dirs.length; i++) {
            const nx = cx + dirs[i].dx;
            const ny = cy + dirs[i].dy;
            if (isBlackAndUnvisited(nx, ny)) {
              cx = nx;
              cy = ny;
              path.push({ x: cx, y: cy });
              visited[cy * w + cx] = 1;
              foundNext = true;
              break;
            }
          }
          // Jump small 2px gaps (noise/sketch gaps)
          if (!foundNext) {
            const outerDirs = [
              { dx: 2, dy: 0 }, { dx: 2, dy: 1 }, { dx: 2, dy: 2 }, { dx: 1, dy: 2 },
              { dx: 0, dy: 2 }, { dx: -1, dy: 2 }, { dx: -2, dy: 2 }, { dx: -2, dy: 1 },
              { dx: -2, dy: 0 }, { dx: -2, dy: -1 }, { dx: -2, dy: -2 }, { dx: -1, dy: -2 },
              { dx: 0, dy: -2 }, { dx: 1, dy: -2 }, { dx: 2, dy: -2 }, { dx: 2, dy: -1 }
            ];
            for (let i = 0; i < outerDirs.length; i++) {
              const nx = cx + outerDirs[i].dx;
              const ny = cy + outerDirs[i].dy;
              if (isBlackAndUnvisited(nx, ny)) {
                const mx = Math.round((cx + nx) / 2);
                const my = Math.round((cy + ny) / 2);
                visited[my * w + mx] = 1;
                cx = nx;
                cy = ny;
                path.push({ x: cx, y: cy });
                visited[cy * w + cx] = 1;
                foundNext = true;
                break;
              }
            }
          }
          if (!foundNext) {
            tracing = false;
          }
        }
        return path;
      }

      // Automatic Raster-to-Vector Line detection
      function detectLines() {
        if (!originalImage) return;

        // Draw image clean onto temporary canvas to get raw thresholded pixels
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        
        // Draw white rectangles over all OCR text boxes to mask them out from line detection!
        tempCtx.fillStyle = "#FFFFFF";
        const padding = 6;
        ocrTexts.forEach(box => {
          tempCtx.fillRect(box.x - padding, box.y - padding, box.w + padding * 2, box.h + padding * 2);
        });
        
        const imgData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const w = canvas.width;
        const h = canvas.height;
        const threshold = parseInt(thresholdSlider.value, 10);

        const visited = new Uint8Array(w * h);
        const detectedLines = [];

        function isBlack(x, y) {
          if (x < 0 || x >= w || y < 0 || y >= h) return false;
          const idx = (y * w + x) * 4;
          const gray = 0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2];
          return gray < threshold;
        }

        // Trace paths across the grid
        for (let y = 0; y < h; y += 3) {
          for (let x = 0; x < w; x += 3) {
            if (isBlack(x, y) && !visited[y * w + x]) {
              const path = tracePath(x, y, w, h, data, visited, threshold);
              
              // Only keep paths with a minimum length (ignores small strokes like digits)
              if (path.length >= 35) {
                // Simplify path using Ramer-Douglas-Peucker algorithm
                const simplified = ramerDouglasPeucker(path, 3.5);
                
                // Convert simplified path vertices into line segments
                for (let i = 0; i < simplified.length - 1; i++) {
                  detectedLines.push({
                    x1: simplified[i].x,
                    y1: simplified[i].y,
                    x2: simplified[i+1].x,
                    y2: simplified[i+1].y
                  });
                }
              }
            }
          }
        }

        // 1. Separate and straighten lines (adaptive angle snapping)
        const straightenedLines = detectedLines.map(line => {
          let x1 = line.x1;
          let y1 = line.y1;
          let x2 = line.x2;
          let y2 = line.y2;

          const dx = x2 - x1;
          const dy = y2 - y1;
          const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI); // Range: [0, 180]

          const isH = (angle < 12 || angle > 168);
          const isV = (Math.abs(angle - 90) < 12);

          if (isH) {
            const avgY = (y1 + y2) / 2;
            y1 = avgY;
            y2 = avgY; // Force perfectly horizontal
          } else if (isV) {
            const avgX = (x1 + x2) / 2;
            x1 = avgX;
            x2 = avgX; // Force perfectly vertical
          }

          return { x1, y1, x2, y2, isHorizontal: isH, isVertical: isV };
        });

        // 2. Snap close endpoints of horizontal & vertical lines to form exact corners
        const tolerance = 15;
        const close = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y) <= tolerance;

        // Separate the groups
        const horizontal = straightenedLines.filter(l => l.isHorizontal);
        const vertical = straightenedLines.filter(l => l.isVertical);
        const other = straightenedLines.filter(l => !l.isHorizontal && !l.isVertical);

        // Snap H <-> V intersections (e.g. wall corners)
        horizontal.forEach(hLine => {
          vertical.forEach(vLine => {
            const hStart = { x: hLine.x1, y: hLine.y1 };
            const hEnd = { x: hLine.x2, y: hLine.y2 };
            const vStart = { x: vLine.x1, y: vLine.y1 };
            const vEnd = { x: vLine.x2, y: vLine.y2 };

            if (close(hStart, vStart)) {
              hLine.x1 = vLine.x1;
              vLine.y1 = hLine.y1;
            } else if (close(hStart, vEnd)) {
              hLine.x1 = vLine.x1;
              vLine.y2 = hLine.y1;
            } else if (close(hEnd, vStart)) {
              hLine.x2 = vLine.x1;
              vLine.y1 = hLine.y2;
            } else if (close(hEnd, vEnd)) {
              hLine.x2 = vLine.x1;
              vLine.y2 = hLine.y2;
            }
          });
        });

        // Snap H <-> H end-to-end
        for (let i = 0; i < horizontal.length; i++) {
          for (let j = i + 1; j < horizontal.length; j++) {
            const h1 = horizontal[i];
            const h2 = horizontal[j];
            if (Math.hypot(h1.x2 - h2.x1, h1.y2 - h2.y1) <= tolerance) {
              const avgY = (h1.y2 + h2.y1) / 2;
              h1.y1 = h1.y2 = avgY;
              h2.y1 = h2.y2 = avgY;
              h1.x2 = h2.x1 = (h1.x2 + h2.x1) / 2;
            } else if (Math.hypot(h1.x1 - h2.x2, h1.y1 - h2.y2) <= tolerance) {
              const avgY = (h1.y1 + h2.y2) / 2;
              h1.y1 = h1.y2 = avgY;
              h2.y1 = h2.y2 = avgY;
              h1.x1 = h2.x2 = (h1.x1 + h2.x2) / 2;
            }
          }
        }

        // Snap V <-> V end-to-end
        for (let i = 0; i < vertical.length; i++) {
          for (let j = i + 1; j < vertical.length; j++) {
            const v1 = vertical[i];
            const v2 = vertical[j];
            if (Math.hypot(v1.x2 - v2.x1, v1.y2 - v2.y1) <= tolerance) {
              const avgX = (v1.x2 + v2.x1) / 2;
              v1.x1 = v1.x2 = avgX;
              v2.x1 = v2.x2 = avgX;
              v1.y2 = v2.y1 = (v1.y2 + v2.y1) / 2;
            } else if (Math.hypot(v1.x1 - v2.x2, v1.y1 - v2.y2) <= tolerance) {
              const avgX = (v1.x1 + v2.x2) / 2;
              v1.x1 = v1.x2 = avgX;
              v2.x1 = v2.x2 = avgX;
              v1.y1 = v2.y2 = (v1.y1 + v2.y2) / 2;
            }
          }
        }

        const snappedLines = [...horizontal, ...vertical, ...other];

        // Filter out zero-length lines and isolated short lines (which are usually noise or digit strokes)
        const validLines = snappedLines.filter(line => {
          return !(line.x1 === line.x2 && line.y1 === line.y2);
        });

        userLines = validLines.filter((l1, idx1) => {
          // Keep if the line is long enough (meaning it is a real wall even if isolated)
          const length = Math.hypot(l1.x2 - l1.x1, l1.y2 - l1.y1);
          if (length >= 80) return true;

          // Otherwise, check if it connects to at least one other line
          let hasConnection = false;
          const tol = 18; // connection distance threshold
          for (let idx2 = 0; idx2 < validLines.length; idx2++) {
            if (idx1 === idx2) continue;
            const l2 = validLines[idx2];
            
            const d11 = Math.hypot(l1.x1 - l2.x1, l1.y1 - l2.y1);
            const d12 = Math.hypot(l1.x1 - l2.x2, l1.y1 - l2.y2);
            const d21 = Math.hypot(l1.x2 - l2.x1, l1.y2 - l2.y1);
            const d22 = Math.hypot(l1.x2 - l2.x2, l1.y2 - l2.y2);

            if (d11 <= tol || d12 <= tol || d21 <= tol || d22 <= tol) {
              hasConnection = true;
              break;
            }
          }
          return hasConnection;
        });

        applyBinarization();
      }

      // Auto detect button listener
      if (autoDetectBtn) {
        autoDetectBtn.addEventListener("click", detectLines);
      }

      // AI OCR detection button listener (extracts from the current binarized canvas)
      if (ocrBtn) {
        ocrBtn.addEventListener("click", () => {
          if (!originalImage) return;
          // Capture current canvas image state (applies current binarization threshold)
          const base64Str = canvas.toDataURL("image/png").split(",")[1];
          fetchOcrData(base64Str);
        });
      }

      // API OCR fetcher
      async function fetchOcrData(base64) {
        textListContainer.innerHTML = `<div class="text-center text-gray-400 py-12 flex justify-center items-center gap-1">
          <svg class="animate-spin h-4 w-4 text-orange-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>AI OCR 치수 검출 중...</span>
        </div>`;

        try {
          const res = await fetch("/api/vision-ocr", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: base64 })
          });

          let resJson;
          try {
            resJson = await res.json();
          } catch(e) {
            throw new Error(`서버 응답 오류 (상태 코드: ${res.status})`);
          }
          if (!res.ok || !resJson.success) {
            throw new Error(resJson.error || `서버 에러 (상태 코드: ${res.status})`);
          }

          const fullText = resJson.data.responses[0]?.fullTextAnnotation;
          const annotations = resJson.data.responses[0]?.textAnnotations || [];
          let wordsList = [];

          // Parse at Word-token level from fullTextAnnotation to avoid merging adjacent dimensions
          if (fullText && fullText.pages) {
            fullText.pages.forEach(page => {
              page.blocks.forEach(block => {
                block.paragraphs.forEach(paragraph => {
                  paragraph.words.forEach(word => {
                    const text = word.symbols.map(s => s.text).join("");
                    const cleanText = text.trim();
                    // Extract text that contains at least one Korean character, English letter, or number
                    if (/[a-zA-Z0-9가-힣]+/.test(cleanText)) {
                      const vertices = word.boundingBox.vertices;
                      const v = vertices.map(vertex => ({
                        x: vertex.x || 0,
                        y: vertex.y || 0
                      }));

                      const xs = v.map(pt => pt.x);
                      const ys = v.map(pt => pt.y);
                      const minX = Math.min(...xs);
                      const maxX = Math.max(...xs);
                      const minY = Math.min(...ys);
                      const maxY = Math.max(...ys);

                      const scaleX = canvas.width / originalImage.width;
                      const scaleY = canvas.height / originalImage.height;

                      let angle = 0;
                      if (v.length >= 2) {
                        const dx = v[1].x - v[0].x;
                        const dy = v[1].y - v[0].y;
                        angle = Math.atan2(dy, dx) * 180 / Math.PI;
                      }

                      wordsList.push({
                        text: cleanText,
                        x: Math.round(minX * scaleX),
                        y: Math.round(minY * scaleY),
                        w: Math.max(Math.round((maxX - minX) * scaleX), 10),
                        h: Math.max(Math.round((maxY - minY) * scaleY), 10),
                        angle: angle
                      });
                    }
                  });
                });
              });
            });
          }

          // Fallback to textAnnotations if fullText is empty
          if (wordsList.length === 0 && annotations.length > 1) {
            const words = annotations.slice(1);
            wordsList = words
              .filter(w => /[a-zA-Z0-9가-힣]+/.test(w.description.trim()))
              .map(w => {
                const vertices = w.boundingPoly.vertices;
                const xs = vertices.map(v => v.x || 0);
                const ys = vertices.map(v => v.y || 0);
                const minX = Math.min(...xs);
                const maxX = Math.max(...xs);
                const minY = Math.min(...ys);
                const maxY = Math.max(...ys);
                const scaleX = canvas.width / originalImage.width;
                const scaleY = canvas.height / originalImage.height;

                return {
                  text: w.description.trim().replace(/,/g, ""),
                  x: Math.round(minX * scaleX),
                  y: Math.round(minY * scaleY),
                  w: Math.max(Math.round((maxX - minX) * scaleX), 10),
                  h: Math.max(Math.round((maxY - minY) * scaleY), 10),
                  angle: 0
                };
              });
          }

          ocrTexts = wordsList;
          renderTextList();
          applyBinarization();

        } catch (e) {
          textListContainer.innerHTML = `<div class="text-center text-red-500 py-12 font-semibold">OCR 수집 실패: ${e.message}</div>`;
        }
      }

      function renderTextList() {
        textListContainer.innerHTML = "";
        if (ocrTexts.length === 0) {
          textListContainer.innerHTML = `<div class="text-center text-gray-400 py-12">검출된 수치 텍스트가 없습니다.</div>`;
          return;
        }

        ocrTexts.forEach((item, idx) => {
          const row = document.createElement("div");
          row.className = "flex justify-between items-center p-2 border border-gray-150 dark-mode:border-gray-700 rounded-lg hover:bg-gray-50 dark-mode:hover:bg-gray-750/30 transition-colors";
          row.innerHTML = `
            <span class="font-mono text-gray-400">#${idx+1}</span>
            <input type="text" value="${item.text}" class="w-24 px-2 py-0.5 border border-gray-300 dark-mode:border-gray-600 rounded bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 text-center font-bold font-mono focus:outline-none focus:ring-1 focus:ring-orange-500" data-idx="${idx}">
            <span class="text-[10px] text-gray-400 font-semibold font-mono">(${item.x}, ${item.y})</span>
          `;
          row.querySelector("input").addEventListener("input", (e) => {
            ocrTexts[idx].text = e.target.value.trim();
            applyBinarization();
          });
          textListContainer.appendChild(row);
        });
      }

      // Drawing Tools
      toolLine.addEventListener("click", () => {
        activeTool = "line";
        toolLine.className = "px-2 py-1 bg-orange-500 text-white rounded text-xs font-bold shadow-sm";
        toolErase.className = "px-2 py-1 bg-gray-200 dark-mode:bg-gray-700 text-gray-700 dark-mode:text-gray-300 rounded text-xs font-bold hover:bg-gray-300 transition-all";
      });

      toolErase.addEventListener("click", () => {
        activeTool = "erase";
        toolErase.className = "px-2 py-1 bg-orange-500 text-white rounded text-xs font-bold shadow-sm";
        toolLine.className = "px-2 py-1 bg-gray-200 dark-mode:bg-gray-700 text-gray-700 dark-mode:text-gray-300 rounded text-xs font-bold hover:bg-gray-300 transition-all";
      });

      clearBtn.addEventListener("click", () => {
        if (confirm("정말로 그린 선들과 OCR 목록을 전부 지우시겠습니까?")) {
          userLines = [];
          ocrTexts = [];
          renderTextList();
          applyBinarization();
        }
      });

      // Canvas Interactive Drawing
      canvas.addEventListener("mousedown", (e) => {
        if (!originalImage) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        startX = (e.clientX - rect.left) * scaleX;
        startY = (e.clientY - rect.top) * scaleY;
        isDrawing = true;
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!isDrawing) return;
        
        applyBinarization();
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const currX = (e.clientX - rect.left) * scaleX;
        const currY = (e.clientY - rect.top) * scaleY;
        
        ctx.strokeStyle = activeTool === "erase" ? "rgba(239, 68, 68, 0.7)" : "rgba(249, 115, 22, 0.7)";
        ctx.lineWidth = activeTool === "erase" ? 6 : 2;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(currX, currY);
        ctx.stroke();
      });

      canvas.addEventListener("mouseup", (e) => {
        if (!isDrawing) return;
        isDrawing = false;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const endX = (e.clientX - rect.left) * scaleX;
        const endY = (e.clientY - rect.top) * scaleY;

        if (activeTool === "line") {
          const dist = Math.hypot(endX - startX, endY - startY);
          if (dist > 3) {
            let sx = startX;
            let sy = startY;
            let ex = endX;
            let ey = endY;

            const dx = ex - sx;
            const dy = ey - sy;
            const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI); // Range: [0, 180]

            if (angle < 12 || angle > 168) {
              ey = sy; // Force perfectly horizontal
            } else if (Math.abs(angle - 90) < 12) {
              ex = sx; // Force perfectly vertical
            }

            userLines.push({ x1: sx, y1: sy, x2: ex, y2: ey });
          }
        } else if (activeTool === "erase") {
          userLines = userLines.filter(line => {
            const midX = (line.x1 + line.x2) / 2;
            const midY = (line.y1 + line.y2) / 2;
            const dist = Math.hypot(midX - endX, midY - endY);
            return dist > 20;
          });
        }
        applyBinarization();
      });

      // OCR box click events
      canvas.addEventListener("click", (e) => {
        if (isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;

        const clickedIdx = ocrTexts.findIndex(item => {
          return clickX >= item.x && clickX <= item.x + item.w &&
                 clickY >= item.y && clickY <= item.y + item.h;
        });

        if (clickedIdx !== -1) {
          const newText = prompt("검출된 치수 수정:", ocrTexts[clickedIdx].text);
          if (newText !== null) {
            ocrTexts[clickedIdx].text = newText.trim();
            renderTextList();
            applyBinarization();
          }
        }
      });

      // DXF Exporter (Now exports both detected/drawn walls and rotated dimensions)
      exportBtn.addEventListener("click", () => {
        if (!originalImage) return;

        // Create standard minimal DXF structure
        let dxf = `0\nSECTION\n2\nHEADER\n0\nENDSEC\n`;
        dxf += `0\nSECTION\n2\nTABLES\n0\nENDSEC\n`;
        dxf += `0\nSECTION\n2\nBLOCKS\n0\nENDSEC\n`;
        dxf += `0\nSECTION\n2\nENTITIES\n`;

        // Export Lines (detected/drawn wall vectors)
        userLines.forEach(line => {
          const y1 = canvas.height - line.y1;
          const y2 = canvas.height - line.y2;
          
          dxf += `0\nLINE\n8\nSketchLines\n`;
          dxf += `10\n${line.x1.toFixed(3)}\n20\n${y1.toFixed(3)}\n30\n0.0\n`; // Point 1
          dxf += `11\n${line.x2.toFixed(3)}\n21\n${y2.toFixed(3)}\n31\n0.0\n`; // Point 2
        });

        // Export Texts (correctly rotated and positioned at bounding box center)
        ocrTexts.forEach(item => {
          const midX = item.x + item.w / 2;
          const midY = canvas.height - (item.y + item.h / 2); // Flip Y of the center point
          const dxfAngle = -(item.angle || 0.0); // Invert screen Y rotation for Cartesian space
          
          // Scale down text height to look proportional (just like in the original sketch)
          const textHeight = Math.max(item.h * 0.22, 2.8);
          
          dxf += `0\nTEXT\n8\nSketchDimensions\n`;
          dxf += `10\n${midX.toFixed(3)}\n20\n${midY.toFixed(3)}\n30\n0.0\n`; // Location (base point)
          dxf += `40\n${textHeight.toFixed(3)}\n`; // Dynamic text height
          dxf += `1\n${item.text}\n`; // Text value
          dxf += `50\n${dxfAngle.toFixed(3)}\n`; // Rotation angle in degrees
          dxf += `72\n4\n`; // Middle-center horizontal alignment
          dxf += `73\n2\n`; // Middle vertical alignment
          dxf += `11\n${midX.toFixed(3)}\n21\n${midY.toFixed(3)}\n31\n0.0\n`; // Alignment point (required for MC)
        });

        dxf += `0\nENDSEC\n0\nEOF\n`;

        // Download Blob
        const blob = new Blob([dxf], { type: "application/dxf" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `converted_sketch.dxf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }

    function setupHomepageSeo() {
      const domInput = document.getElementById("seo-domain");
      const nameInput = document.getElementById("seo-site-name");
      const descInput = document.getElementById("seo-desc");
      const phoneInput = document.getElementById("seo-phone");
      const logoInput = document.getElementById("seo-logo");
      const addrInput = document.getElementById("seo-address");
      
      const latInput = document.getElementById("seo-latitude");
      const lngInput = document.getElementById("seo-longitude");
      const hoursInput = document.getElementById("seo-hours");
      const blogUrlInput = document.getElementById("seo-blog-url");
      const instaUrlInput = document.getElementById("seo-instagram-url");
      const ytUrlInput = document.getElementById("seo-youtube-url");

      const metaOut = document.getElementById("seo-output-meta");
      const schemaOut = document.getElementById("seo-output-schema");
      const cpyMeta = document.getElementById("seo-copy-meta");
      const cpySchema = document.getElementById("seo-copy-schema");

      if (!domInput) return;

      function generateCodes() {
        const dom = domInput.value.trim() || "https://example.com";
        const name = nameInput.value.trim() || "상호명";
        const desc = descInput.value.trim() || "사이트 설명";
        const phone = phoneInput.value.trim();
        const logo = logoInput.value.trim();
        const addr = addrInput.value.trim();
        
        const lat = latInput.value.trim();
        const lng = lngInput.value.trim();
        const hours = hoursInput.value.trim();
        const blogUrl = blogUrlInput.value.trim();
        const instaUrl = instaUrlInput.value.trim();
        const ytUrl = ytUrlInput.value.trim();

        // 1. Meta / OG HTML code
        let metaHtml = `<!-- 기본 메타 태그 -->\n`;
        metaHtml += `<title>${name}</title>\n`;
        metaHtml += `<meta name="description" content="${desc}">\n\n`;
        metaHtml += `<!-- 네이버 & 구글 오픈 그래프 (Open Graph) 태그 -->\n`;
        metaHtml += `<meta property="og:type" content="website">\n`;
        metaHtml += `<meta property="og:title" content="${name}">\n`;
        metaHtml += `<meta property="og:description" content="${desc}">\n`;
        metaHtml += `<meta property="og:url" content="${dom}">\n`;
        if (logo) {
          metaHtml += `<meta property="og:image" content="${logo}">\n`;
        }
        metaHtml += `<link rel="canonical" href="${dom}">\n`;
        
        metaOut.value = metaHtml;

        // 2. Premium Linked Graph Schema
        const socialProfiles = [blogUrl, instaUrl, ytUrl].filter(Boolean);

        const schemaGraph = {
          "@context": "https://schema.org",
          "@graph": [
            // Organization Schema
            {
              "@type": "Organization",
              "@id": `${dom}/#organization`,
              "name": name,
              "url": dom,
              "logo": logo || undefined,
              "sameAs": socialProfiles.length > 0 ? socialProfiles : undefined
            },
            // WebSite Schema
            {
              "@type": "WebSite",
              "@id": `${dom}/#website`,
              "url": dom,
              "name": name,
              "description": desc,
              "publisher": {
                "@id": `${dom}/#organization`
              },
              "potentialAction": [{
                "@type": "SearchAction",
                "target": {
                  "@type": "EntryPoint",
                  "urlTemplate": `${dom}/?s={search_term_string}`
                },
                "query-input": "required name=search_term_string"
              }]
            },
            // WebPage Schema
            {
              "@type": "WebPage",
              "@id": `${dom}/#webpage`,
              "url": dom,
              "name": name,
              "description": desc,
              "isPartOf": {
                "@id": `${dom}/#website`
              },
              "about": {
                "@id": `${dom}/#organization`
              }
            }
          ]
        };

        // LocalBusiness Schema
        if (addr || phone || lat || lng || hours) {
          const localBusinessObj = {
            "@type": "LocalBusiness",
            "@id": `${dom}/#localbusiness`,
            "name": name,
            "url": dom,
            "telephone": phone || undefined,
            "priceRange": "$$",
            "image": logo || undefined,
            "address": addr ? {
              "@type": "PostalAddress",
              "streetAddress": addr,
              "addressLocality": "Busan",
              "addressCountry": "KR"
            } : undefined,
            "geo": (lat && lng) ? {
              "@type": "GeoCoordinates",
              "latitude": parseFloat(lat),
              "longitude": parseFloat(lng)
            } : undefined,
            "openingHoursSpecification": hours ? [{
              "@type": "OpeningHoursSpecification",
              "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
              "opens": hours.split(" ")[1]?.split("-")[0] || "09:00",
              "closes": hours.split(" ")[1]?.split("-")[1] || "18:00"
            }] : undefined,
            "sameAs": socialProfiles.length > 0 ? socialProfiles : undefined
          };

          schemaGraph["@graph"].push(localBusinessObj);
          
          // Connect Page to LocalBusiness
          schemaGraph["@graph"][2]["about"] = {
            "@id": `${dom}/#localbusiness`
          };
        }

        // Remove undefined fields
        const cleanObj = JSON.parse(JSON.stringify(schemaGraph));

        schemaOut.value = `<script type="application/ld+json">\n${JSON.stringify(cleanObj, null, 2)}\n<\/script>`;
      }

      // Input listeners
      [
        domInput, nameInput, descInput, phoneInput, logoInput, addrInput,
        latInput, lngInput, hoursInput, blogUrlInput, instaUrlInput, ytUrlInput
      ].forEach(inp => {
        inp.addEventListener("input", generateCodes);
      });

      // Initial gen
      generateCodes();

      // Copy helpers
      cpyMeta.addEventListener("click", () => {
        navigator.clipboard.writeText(metaOut.value).then(() => {
          cpyMeta.textContent = "복사 완료!";
          setTimeout(() => cpyMeta.textContent = "📋 복사", 1200);
        });
      });
      cpySchema.addEventListener("click", () => {
        navigator.clipboard.writeText(schemaOut.value).then(() => {
          cpySchema.textContent = "복사 완료!";
          setTimeout(() => cpySchema.textContent = "📋 복사", 1200);
        });
      });
    }

    function setupBacklinkCheck() {
      const domInput = document.getElementById("backlink-domain");
      const searchBtn = document.getElementById("backlink-search-btn");
      const resultBody = document.getElementById("backlink-result-body");
      const summary = document.getElementById("backlink-summary");
      const googleDirect = document.getElementById("backlink-google-direct");
      const naverDirect = document.getElementById("backlink-naver-direct");

      if (!domInput) return;

      // Update direct links dynamically
      domInput.addEventListener("input", (e) => {
        const val = e.target.value.trim().replace(/^(https?:\/\/)?(www\.)?/, "").split("/")[0].toLowerCase();
        if (val) {
          googleDirect.href = `https://www.google.com/search?q=%22${encodeURIComponent(val)}%22`;
          naverDirect.href = `https://search.naver.com/search.naver?query=site%3A${encodeURIComponent(val)}`;
        } else {
          googleDirect.href = "#";
          naverDirect.href = "#";
        }
      });

      searchBtn.addEventListener("click", async () => {
        const domain = domInput.value.trim();
        if (!domain) {
          alert("도메인 주소를 입력해 주세요.");
          return;
        }

        const cleanDomain = domain.replace(/^(https?:\/\/)?(www\.)?/, "").split("/")[0].toLowerCase();

        searchBtn.disabled = true;
        searchBtn.textContent = "추출 중...";
        summary.textContent = "백링크 데이터 수집 중...";
        resultBody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-8 text-center text-gray-550 dark-mode:text-gray-455 font-semibold">
              <div class="flex items-center justify-center gap-2">
                <svg class="animate-spin h-5 w-5 text-orange-500" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>검색 API를 통해 외부 백링크 목록을 추출하고 있습니다...</span>
              </div>
            </td>
          </tr>
        `;

        try {
          const res = await fetch(`/api/backlink?domain=${encodeURIComponent(cleanDomain)}`);
          if (!res.ok) throw new Error("API 통신 오류");
          
          const data = await res.json();
          if (!data.success) throw new Error(data.error || "수집 실패");

          resultBody.innerHTML = "";
          const links = data.links || [];

          if (links.length === 0) {
            resultBody.innerHTML = `
              <tr>
                <td colspan="5" class="px-6 py-8 text-center text-gray-500 font-semibold">
                  검색된 외부 백링크가 없습니다. 입력 도메인을 제외한 외부 언급 사이트만 수집됩니다.
                </td>
              </tr>
            `;
            summary.textContent = `총 0건 수집 완료`;
            return;
          }

          links.forEach((item, idx) => {
            const tr = document.createElement("tr");
            tr.className = "hover:bg-gray-50 dark-mode:hover:bg-gray-855 transition-colors";
            tr.innerHTML = `
              <td class="px-6 py-3.5 text-gray-400 dark-mode:text-gray-500 font-bold">${idx + 1}</td>
              <td class="px-6 py-3.5 font-bold text-gray-850 dark-mode:text-gray-200 font-mono select-all">${item.domain}</td>
              <td class="px-6 py-3.5 text-gray-600 dark-mode:text-gray-400 font-semibold truncate max-w-xs break-all select-all font-mono">${item.url}</td>
              <td class="px-6 py-3.5">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold ${item.source === 'Google' ? 'bg-blue-50 text-blue-600 dark-mode:bg-blue-950/20 dark-mode:text-blue-400 border border-blue-200 dark-mode:border-blue-900' : 'bg-green-50 text-green-600 dark-mode:bg-green-950/20 dark-mode:text-green-400 border border-green-200 dark-mode:border-green-900'}">${item.source}</span>
              </td>
              <td class="px-6 py-3.5">
                <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-0.5 px-2 py-1 text-[11px] font-bold text-orange-600 hover:text-orange-700 dark-mode:text-orange-400 dark-mode:hover:text-orange-355 border border-orange-200 dark-mode:border-orange-900 rounded bg-orange-50 dark-mode:bg-orange-950/20 active:scale-[0.95] transition-all">이동 ↗</a>
              </td>
            `;
            resultBody.appendChild(tr);
          });

          summary.textContent = `총 ${links.length}건 수집 완료`;

        } catch (e) {
          console.error(e);
          resultBody.innerHTML = `
            <tr>
              <td colspan="5" class="px-6 py-8 text-center text-red-500 font-bold">
                백링크 조회 실패: ${e.message}
              </td>
            </tr>
          `;
          summary.textContent = "에러 발생";
        } finally {
          searchBtn.disabled = false;
          searchBtn.textContent = "백링크 추출 시작";
        }
      });
    }

    function setupKeywordScreenshot() {
      const startBtn = document.getElementById("screenshot-start-btn");
      const naverArea = document.getElementById("screenshot-keywords-naver");
      const googleArea = document.getElementById("screenshot-keywords-google");
      const ocrArea = document.getElementById("screenshot-ocr-keywords");
      const statusText = document.getElementById("screenshot-server-status");
      const resultCard = document.getElementById("screenshot-result-card");
      const progressList = document.getElementById("screenshot-progress-list");
      const summary = document.getElementById("screenshot-summary");
      const folderPath = document.getElementById("screenshot-folder-path");
      const warningBanner = document.getElementById("https-warning-banner");

      const scheduleSaveBtn = document.getElementById("schedule-save-btn");
      const addScheduleBtn = document.getElementById("add-schedule-btn");

      if (!startBtn) return;

      // Show Mixed Content warning banner if accessing via HTTPS
      if (window.location.protocol === 'https:' && warningBanner) {
        warningBanner.classList.remove("hidden");
      }

      // Persist immediate capture inputs in localStorage
      if (naverArea) {
        naverArea.value = localStorage.getItem("ss_immediate_naver") || "";
        naverArea.addEventListener("input", () => {
          localStorage.setItem("ss_immediate_naver", naverArea.value);
        });
      }
      if (googleArea) {
        googleArea.value = localStorage.getItem("ss_immediate_google") || "";
        googleArea.addEventListener("input", () => {
          localStorage.setItem("ss_immediate_google", googleArea.value);
        });
      }
      if (ocrArea) {
        ocrArea.value = localStorage.getItem("ss_immediate_ocr") || "";
        ocrArea.addEventListener("input", () => {
          localStorage.setItem("ss_immediate_ocr", ocrArea.value);
        });
      }

      // Periodically check local backend helper status
      let serverOnline = false;
      let hasLoadedConfig = false;

      function addScheduleTaskUI(data) {
        const container = document.getElementById("schedule-tasks-container");
        if (!container) return;

        const id = data.id || Date.now().toString() + Math.random().toString(36).substr(2, 9);
        const enabled = !!data.enabled;
        const time = data.time || "09:00";
        const naverKeywords = Array.isArray(data.naverKeywords) ? data.naverKeywords : [];
        const googleKeywords = Array.isArray(data.googleKeywords) ? data.googleKeywords : [];
        const ocrKeywords = Array.isArray(data.ocrKeywords) ? data.ocrKeywords : [];
        const saveFolder = data.saveFolder || "D:\\\\search-rank";

        const taskHTML = `
          <div class="schedule-task-item p-4 border border-gray-200 dark-mode:border-gray-700 rounded-xl bg-gray-50/30 dark-mode:bg-gray-850/30 space-y-3 relative pt-8" data-id="${id}">
            <button class="remove-task-btn absolute top-3 right-3 text-red-500 hover:text-red-700 transition-colors focus:outline-none" title="삭제">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
            <div class="flex flex-wrap items-center gap-3">
              <label class="flex items-center gap-2 text-xs font-bold text-gray-700 dark-mode:text-gray-300 cursor-pointer">
                <input type="checkbox" class="task-enabled w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-500" ${enabled ? 'checked' : ''}>
                <span>이 예약 자동 수집 활성화</span>
              </label>
              <div class="flex items-center gap-1.5 ml-auto">
                <span class="text-xs font-bold text-gray-700 dark-mode:text-gray-300">수집 시각:</span>
                <input type="time" class="task-time px-2 py-1 border border-gray-300 dark-mode:border-gray-600 rounded-lg text-xs font-bold bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 focus:outline-none focus:ring-1 focus:ring-orange-500" value="${time}">
              </div>
            </div>
            
            <div>
              <label class="block text-[11px] font-bold text-gray-600 dark-mode:text-gray-400 mb-1">💾 저장할 폴더 경로</label>
              <input type="text" class="task-save-folder w-full px-3 py-1.5 border border-gray-300 dark-mode:border-gray-600 rounded-lg bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-orange-500" value="${saveFolder}" placeholder="예: D:\\\\search-rank">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <div>
                <label class="block text-[11px] font-bold text-green-600 dark-mode:text-green-400 mb-1">📋 네이버 키워드 (줄바꿈/쉼표 구분)</label>
                <textarea class="task-keywords-naver w-full px-3 py-2 border border-gray-300 dark-mode:border-gray-600 rounded-lg bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 text-[11px] font-semibold focus:outline-none focus:ring-1 focus:ring-orange-500 font-mono" rows="3" placeholder="예:\\n부산인테리어\\n부산학원인테리어">${naverKeywords.join('\n')}</textarea>
              </div>
              <div>
                <label class="block text-[11px] font-bold text-blue-600 dark-mode:text-blue-400 mb-1">📋 구글 키워드 (줄바꿈/쉼표 구분)</label>
                <textarea class="task-keywords-google w-full px-3 py-2 border border-gray-300 dark-mode:border-gray-600 rounded-lg bg-white dark-mode:bg-gray-700 text-gray-800 dark-mode:text-gray-100 text-[11px] font-semibold focus:outline-none focus:ring-1 focus:ring-orange-500 font-mono" rows="3" placeholder="예:\\n부산인테리어 디자인\\n부산학원인테리어 견적">${googleKeywords.join('\n')}</textarea>
              </div>
            </div>

            <div>
              <label class="block text-[11px] font-bold text-orange-600 dark-mode:text-orange-400 mb-1">🎯 OCR 체크 단어 (선택사항, 쉼표 구분)</label>
              <input type="text" class="task-ocr-keywords w-full px-3 py-1.5 border border-gray-300 dark-mode:border-gray-600 rounded-lg bg-white dark-mode:bg-gray-700 text-gray-805 dark-mode:text-gray-100 text-[11px] font-semibold focus:outline-none focus:ring-1 focus:ring-orange-500" value="${ocrKeywords.join(', ')}" placeholder="예시: 인디컴퍼니, inde.co.kr">
            </div>
          </div>
        `;

        const wrapper = document.createElement("div");
        wrapper.className = "py-4 first:pt-0 last:pb-0";
        wrapper.innerHTML = taskHTML;
        const itemNode = wrapper.firstElementChild;

        // Handle delete button click
        const removeBtn = itemNode.querySelector(".remove-task-btn");
        removeBtn.addEventListener("click", () => {
          if (confirm("이 자동 수집 예약 설정을 삭제하시겠습니까?")) {
            wrapper.remove();
          }
        });

        container.appendChild(wrapper);
      }

      async function loadScheduleConfig() {
        try {
          const res = await fetch(getLocalServerUrl('/api/config'));
          if (res.ok) {
            const data = await res.json();
            if (data.success && data.config) {
              localStorage.setItem("cachedScheduleConfig", JSON.stringify(data.config));
              renderSchedules(data.config.schedules || []);
              return;
            }
          }
        } catch (e) {
          console.error("예약 설정 로드 실패:", e);
        }

        // Fallback to local cache
        const cached = localStorage.getItem("cachedScheduleConfig");
        if (cached) {
          try {
            const config = JSON.parse(cached);
            renderSchedules(config.schedules || []);
            return;
          } catch (err) {}
        }

        // Default empty schedule task if no cache
        renderSchedules([]);
      }

      let allSchedules = [];

      function renderSchedules(schedules) {
        allSchedules = schedules || [];
        const container = document.getElementById("schedule-tasks-container");
        if (!container) return;
        container.innerHTML = "";

        const visibleSchedules = allSchedules.filter(s => s.saveFolder !== "D:\\clinic");

        if (visibleSchedules.length === 0) {
          addScheduleTaskUI({
            id: Date.now().toString(),
            enabled: false,
            time: "09:00",
            naverKeywords: [],
            googleKeywords: [],
            ocrKeywords: [],
            saveFolder: "D:\\\\search-rank"
          });
        } else {
          visibleSchedules.forEach(schedule => {
            addScheduleTaskUI(schedule);
          });
        }
      }

      // Add schedule task button click handler
      if (addScheduleBtn) {
        addScheduleBtn.addEventListener("click", () => {
          addScheduleTaskUI({
            id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
            enabled: true,
            time: "09:00",
            naverKeywords: [],
            googleKeywords: [],
            ocrKeywords: [],
            saveFolder: "D:\\\\search-rank"
          });
        });
      }

      async function checkServerStatus() {
        try {
          await fetch(getLocalServerUrl('/api/screenshot'), { method: "OPTIONS" });
          serverOnline = true;
          statusText.innerHTML = `
            <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
            <span class="text-green-600 dark-mode:text-green-400 font-bold">로컬 캡처 백서버 연결됨</span>
          `;
          startBtn.disabled = false;

          // Auto-load config once online
          if (!hasLoadedConfig) {
            hasLoadedConfig = true;
            loadScheduleConfig();
          }
        } catch (e) {
          serverOnline = false;
          const isHttps = window.location.protocol === 'https:';
          statusText.innerHTML = `
            <span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
            <span class="text-red-500 font-bold">로컬 백서버 미연결 \${isHttps ? '(HTTPS 보안 차단 주의)' : ''}</span>
          `;
        }
      }

      loadScheduleConfig();
      checkServerStatus();
      const statusInterval = setInterval(checkServerStatus, 5000);

      // Clean up interval on tab switch (if elements disappear)
      const observer = new MutationObserver(() => {
        if (!document.getElementById("screenshot-start-btn")) {
          clearInterval(statusInterval);
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Save schedule configurations
      if (scheduleSaveBtn) {
        scheduleSaveBtn.addEventListener("click", async () => {
          if (!serverOnline) {
            alert("로컬 백서버가 연결되어 있지 않습니다. 서버를 가동해 주세요.");
            return;
          }

          const taskItems = document.querySelectorAll(".schedule-task-item");
          const schedules = [];

          for (const item of taskItems) {
            const id = item.dataset.id;
            const enabled = item.querySelector(".task-enabled").checked;
            const time = item.querySelector(".task-time").value;
            const saveFolder = item.querySelector(".task-save-folder").value.trim();
            const rawNaver = item.querySelector(".task-keywords-naver").value.trim();
            const rawGoogle = item.querySelector(".task-keywords-google").value.trim();
            const rawOcr = item.querySelector(".task-ocr-keywords").value.trim();

            if (!saveFolder) {
              alert("저장할 폴더 경로를 입력해 주세요.");
              item.querySelector(".task-save-folder").focus();
              return;
            }

            const naverKeywords = rawNaver.split(/[\n,]/).map(k => k.trim()).filter(k => k.length > 0);
            const googleKeywords = rawGoogle.split(/[\n,]/).map(k => k.trim()).filter(k => k.length > 0);
            const ocrKeywords = rawOcr.split(/,/).map(k => k.trim()).filter(k => k.length > 0);

            schedules.push({
              id,
              enabled,
              time,
              saveFolder,
              naverKeywords,
              googleKeywords,
              ocrKeywords
            });
          }

          // Preserve hidden clinic schedules during save
          const hiddenSchedules = allSchedules.filter(s => s.saveFolder === "D:\\clinic");
          schedules.push(...hiddenSchedules);

          try {
            const res = await fetch(getLocalServerUrl('/api/config'), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ schedules })
            });

            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              throw new Error(err.error || "예약 설정 저장에 실패했습니다.");
            }

      // --- 로컬 스크린샷 뷰어 연동 로직 ---
      function setupLocalScreenshotViewer() {
        const loadBtn = document.getElementById("local-screenshot-load-btn");
        const dirInput = document.getElementById("local-screenshot-dir-input");
        const keywordsContainer = document.getElementById("local-screenshot-keywords-container");
        const imagesContainer = document.getElementById("local-screenshot-images-container");
        
        if (!loadBtn || !dirInput || !keywordsContainer || !imagesContainer) return;
        
        let localFiles = [];
        let activeIndex = -1;
        let currentFilteredFiles = [];
        let isCloudMode = false;
        let selectedKeyword = "부산사무실인테리어";
        
        // 초기 가동 시 기본 D:\rank에서 자동 불러오기 시도
        loadLocalScreenshots();
        
        loadBtn.addEventListener("click", loadLocalScreenshots);
        
        async function loadLocalScreenshots() {
          const folderPath = dirInput.value.trim() || "D:\\rank";
          keywordsContainer.innerHTML = '<span class="text-xs text-gray-500 font-semibold">불러오는 중...</span>';
          imagesContainer.innerHTML = '';
          isCloudMode = false;
          
          try {
            const res = await fetch(getLocalServerUrl(`/api/local-screenshots?folderPath=${encodeURIComponent(folderPath)}`));
            if (!res.ok) throw new Error("서버 응답 오류");
            const data = await res.json();
            if (data.success) {
              localFiles = data.files || [];
              renderKeywordButtons();
              
              // Trigger client-side background cloud sync
              syncLocalScreenshotsFromClient(folderPath, localFiles);
            } else {
              keywordsContainer.innerHTML = `<span class="text-xs text-red-500 font-semibold">오류: ${data.error}</span>`;
            }
          } catch (err) {
            console.warn("Local server offline, trying cloud fallback...", err);
            try {
              const res = await fetch(`/api/sync-screenshots?action=list&folderPath=${encodeURIComponent(folderPath)}`);
              if (res.ok) {
                const data = await res.json();
                if (data.success) {
                  localFiles = data.files || [];
                  isCloudMode = true;
                  renderKeywordButtons();
                  return;
                }
              }
            } catch (cloudErr) {
              console.error("Cloud fallback failed too:", cloudErr);
            }
            keywordsContainer.innerHTML = `<span class="text-xs text-red-500 font-semibold">로컬 백서버(${getLocalServerUrl('/')})가 실행 중인지 확인해 주세요.</span>`;
          }
        }

        async function syncLocalScreenshotsFromClient(folderPath, files) {
          try {
            const res = await fetch('/api/sync-screenshots?action=sync-list', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ folderPath, files })
            });
            if (!res.ok) return;

            const data = await res.json();
            const missing = data.missingFiles || [];
            if (missing.length === 0) return;

            console.log(`[클라우드 동기화] ${missing.length}개 이미지 업로드 중...`);

            for (const fileName of missing) {
              try {
                const imgUrl = getLocalServerUrl(`/api/local-screenshots/view?folderPath=${encodeURIComponent(folderPath)}&fileName=${encodeURIComponent(fileName)}`);
                const imgRes = await fetch(imgUrl);
                if (!imgRes.ok) continue;

                const blob = await imgRes.blob();

                const reader = new FileReader();
                reader.readAsDataURL(blob);
                await new Promise((resolve, reject) => {
                  reader.onloadend = async () => {
                    try {
                      const base64Data = reader.result.split(',')[1];
                      const mimeType = blob.type || 'image/png';

                      await fetch('/api/sync-screenshots?action=upload-file', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ folderPath, fileName, mimeType, base64Data })
                      });
                      resolve();
                    } catch (e) {
                      reject(e);
                    }
                  };
                  reader.onerror = reject;
                });
              } catch (err) {
                console.warn(`[클라우드 업로드 실패] ${fileName}:`, err);
              }
            }
            console.log('[클라우드 동기화 완료]');
          } catch (e) {
            console.error("클라우드 동기화 실패:", e);
          }
        }
        
        function getKeywordCategoryMapping() {
          let mapping = {};
          const stored = localStorage.getItem("local_viewer_keyword_categories");
          if (stored) {
            try {
              mapping = JSON.parse(stored);
            } catch (e) {}
          }
          return mapping;
        }

        function saveKeywordCategoryMapping(mapping) {
          localStorage.setItem("local_viewer_keyword_categories", JSON.stringify(mapping));
        }

        function getKeywordCategory(keyword) {
          const mapping = getKeywordCategoryMapping();
          if (mapping[keyword]) {
            return mapping[keyword];
          }
          
          const k = keyword.toLowerCase();
          let cat = "기타";
          if (k.includes("병원") || k.includes("치과") || k.includes("내과") || 
              k.includes("외과") || k.includes("성형외과") || k.includes("피부과") || 
              k.includes("산부인과") || k.includes("정형외과") || k.includes("안과") || 
              k.includes("의원") || k.includes("클리닉") || k.includes("하지정맥") || 
              k.includes("피지낭종") || k.includes("탈장") || k.includes("복강경") || 
              k.includes("맹장염") || k.includes("지방종") || k.includes("낭종")) {
            cat = "병원";
          } else if (k.includes("사무실") || k.includes("사옥") || k.includes("오피스") || 
                     k.includes("bifc") || k.includes("bifc2") || k.includes("지식산업센터") || k.includes("아이비플래닛")) {
            cat = "사무실";
          } else if (k.includes("학원") || k.includes("수학") || k.includes("영어") || 
                     k.includes("국어") || k.includes("음악") || k.includes("교육") || k.includes("미술")) {
            cat = "학원";
          }
          
          mapping[keyword] = cat;
          saveKeywordCategoryMapping(mapping);
          return cat;
        }

        function renderKeywordButtons() {
          if (localFiles.length === 0) {
            keywordsContainer.innerHTML = '<span class="text-xs text-gray-400 font-semibold">지정 경로에 이미지 파일이 없습니다.</span>';
            return;
          }
          
          const keywords = Array.from(new Set(localFiles.map(f => f.keyword))).filter(k => k.length > 0);
          
          keywordsContainer.innerHTML = `
            <div class="space-y-3.5 w-full">
              <!-- Category: 병원 -->
              <div class="category-zone p-3 bg-red-50/50 dark-mode:bg-red-950/10 rounded-xl border border-red-100/40 dark-mode:border-red-900/20 space-y-2 transition-all" data-category="병원">
                <div class="text-[10px] font-black text-red-650 dark-mode:text-red-400 flex items-center gap-1 select-none">
                  <span>🏥 병원 관련 키워드 (치과, 내과, 성형외과 등)</span>
                </div>
                <div class="flex flex-wrap gap-1.5 min-h-[32px] p-1 rounded-lg bg-white/20 dark-mode:bg-black/10" id="keywords-zone-병원"></div>
              </div>
              <!-- Category: 사무실 -->
              <div class="category-zone p-3 bg-blue-50/50 dark-mode:bg-blue-950/10 rounded-xl border border-blue-100/40 dark-mode:border-blue-900/20 space-y-2 transition-all" data-category="사무실">
                <div class="text-[10px] font-black text-blue-650 dark-mode:text-blue-400 flex items-center gap-1 select-none">
                  <span>🖥️ 사무실 관련 키워드 (오피스, 사옥, 지산 등)</span>
                </div>
                <div class="flex flex-wrap gap-1.5 min-h-[32px] p-1 rounded-lg bg-white/20 dark-mode:bg-black/10" id="keywords-zone-사무실"></div>
              </div>
              <!-- Category: 학원 -->
              <div class="category-zone p-3 bg-green-50/50 dark-mode:bg-green-950/10 rounded-xl border border-green-100/40 dark-mode:border-green-900/20 space-y-2 transition-all" data-category="학원">
                <div class="text-[10px] font-black text-green-650 dark-mode:text-green-400 flex items-center gap-1 select-none">
                  <span>✏️ 학원 관련 키워드 (어학원, 수학, 국어 등)</span>
                </div>
                <div class="flex flex-wrap gap-1.5 min-h-[32px] p-1 rounded-lg bg-white/20 dark-mode:bg-black/10" id="keywords-zone-학원"></div>
              </div>
              <!-- Category: 기타 -->
              <div class="category-zone p-3 bg-gray-50 dark-mode:bg-gray-800 rounded-xl border border-gray-150 dark-mode:border-gray-700 space-y-2 transition-all" data-category="기타">
                <div class="text-[10px] font-black text-gray-600 dark-mode:text-gray-400 flex items-center gap-1 select-none">
                  <span>☕ 기타 키워드 (상가, 호텔, 카페 등)</span>
                </div>
                <div class="flex flex-wrap gap-1.5 min-h-[32px] p-1 rounded-lg bg-white/20 dark-mode:bg-black/10" id="keywords-zone-기타"></div>
              </div>
            </div>
          `;

          if (!keywords.includes(selectedKeyword)) {
            if (keywords.includes("부산사무실인테리어")) {
              selectedKeyword = "부산사무실인테리어";
            } else if (keywords.length > 0) {
              selectedKeyword = keywords[0];
            }
          }

          keywords.forEach(kw => {
            const kwFiles = localFiles.filter(f => f.keyword === kw);
            const cat = getKeywordCategory(kw);
            const zone = document.getElementById(`keywords-zone-${cat}`);
            
            if (zone) {
              const btn = document.createElement("button");
              btn.draggable = true;
              btn.dataset.keyword = kw;
              btn.textContent = `${kw} (${kwFiles.length})`;
              
              if (selectedKeyword === kw) {
                btn.className = "px-3 py-1.5 bg-orange-500 text-white rounded-lg text-xs font-bold shadow-sm transition-all cursor-grab active:cursor-grabbing select-none scale-[1.03] ring-2 ring-orange-400/50";
              } else {
                btn.className = "px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-750 dark-mode:bg-gray-750 dark-mode:hover:bg-gray-700 dark-mode:text-gray-250 rounded-lg text-xs font-bold shadow-sm transition-all cursor-grab active:cursor-grabbing select-none";
              }

              btn.addEventListener("click", () => {
                selectedKeyword = kw;
                renderKeywordButtons();
              });

              btn.addEventListener("dragstart", (e) => {
                e.dataTransfer.setData("text/plain", kw);
                btn.classList.add("opacity-40");
              });

              btn.addEventListener("dragend", () => {
                btn.classList.remove("opacity-40");
              });

              zone.appendChild(btn);
            }
          });

          // Bind Drag and Drop events to category zone panels
          const zones = keywordsContainer.querySelectorAll(".category-zone");
          zones.forEach(zone => {
            zone.addEventListener("dragover", (e) => {
              e.preventDefault();
              zone.classList.add("border-orange-500", "ring-2", "ring-orange-400/50", "scale-[1.01]");
            });

            zone.addEventListener("dragleave", () => {
              zone.classList.remove("border-orange-500", "ring-2", "ring-orange-400/50", "scale-[1.01]");
            });

            zone.addEventListener("drop", (e) => {
              e.preventDefault();
              zone.classList.remove("border-orange-500", "ring-2", "ring-orange-400/50", "scale-[1.01]");
              const kw = e.dataTransfer.getData("text/plain");
              const targetCategory = zone.dataset.category;

              if (kw && targetCategory) {
                const mapping = getKeywordCategoryMapping();
                mapping[kw] = targetCategory;
                saveKeywordCategoryMapping(mapping);
                renderKeywordButtons();
              }
            });
          });

          const filtered = localFiles.filter(f => f.keyword === selectedKeyword);
          renderImages(filtered);
        }

        let zoomScale = 1.0;
