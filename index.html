<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>개인 포트폴리오</title>
  <!-- OG Meta Tags -->
  <meta property="og:title" content="개인 포트폴리오" />
  <meta property="og:description" content="webP 이미지 최적화, 키워드 조합기, 방문자 통계 등 다양한 도구를 제공합니다." />
  <meta property="og:image" content="https://blog.naver.com/babolang/223006653417?photoView=3" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="개인 포트폴리오" />
  <meta name="twitter:description" content="webP 이미지 최적화, 키워드 조합기, 방문자 통계 등 다양한 도구를 제공합니다." />
  <meta name="twitter:image" content="https://blog.naver.com/babolang/223006653417?photoView=3" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body.dark-mode { @apply bg-gray-900 text-white; }
    .menu-item { cursor: grab; }
    .menu-item:active { cursor: grabbing; }
    .menu-item.dragging { opacity: 0.5; }
    .editable { cursor: text; padding: 2px 4px; border-radius: 4px; }
    .editable:hover { background-color: rgba(255,255,255,0.1); }
    /* 드래그 앤 드롭 활성화 스타일 */
    .drag-over-hq { border-color: #10b981 !important; background-color: #ecfdf5 !important; }
    .drag-over-blog { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
  </style>
</head>
<body class="text-gray-800 font-sans min-h-screen">
  <div class="min-h-screen grid grid-cols-1 md:grid-cols-[220px_1fr]">
    <!-- LEFT SIDEBAR -->
    <aside id="sidebar" style="background-color: #dd5828;" class="text-white p-4 md:p-6 overflow-y-auto flex flex-col max-h-screen">
      <div class="text-2xl font-bold mb-8 cursor-pointer editable" id="brand-name" contenteditable="true">Portfolio</div>
      <nav id="menu-container" class="space-y-2 flex-1"></nav>
      <div class="border-t border-white pt-4 mt-6 space-y-2">
        <button id="add-menu-btn" class="w-full px-3 py-2 rounded-lg text-xs font-semibold bg-white bg-opacity-20 hover:bg-opacity-30">➕ 메뉴 추가</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="p-4 md:p-8 overflow-y-auto relative">
      <div class="absolute top-4 right-4">
        <button id="theme-toggle-btn" class="px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 hover:bg-gray-300 text-gray-800 dark-mode:bg-gray-700 dark-mode:text-white dark-mode:hover:bg-gray-600 transition-colors">🌙 다크모드</button>
      </div>
    </main>
  </div>

  <!-- PASSWORD MODAL -->
  <div id="password-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-8 shadow-2xl max-w-sm w-full mx-4">
      <h2 class="text-2xl font-bold mb-2 text-gray-800">접근 제한</h2>
      <p class="text-gray-600 mb-6">비밀번호를 입력하세요.</p>
      <input type="password" id="password-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none" placeholder="비밀번호">
      <button id="password-submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold">확인</button>
    </div>
  </div>

  <!-- ADD MENU MODAL -->
  <div id="menu-edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-8 shadow-2xl max-w-sm w-full mx-4">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">메뉴 추가</h2>
      <input type="text" id="new-menu-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none" placeholder="메뉴명">
      <div class="flex gap-2">
        <button id="menu-edit-cancel" class="flex-1 px-4 py-2 bg-gray-300 text-gray-800 rounded-lg font-semibold">취소</button>
        <button id="menu-edit-save" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold">추가</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // 시스템 설정
    // ============================================
    const PASSWORD = "1";
    const defaultMenus = [
      { id: "webp", name: "webP변환", protected: true },
      { id: "stats", name: "방문자통계", protected: true },
      { id: "marketing", name: "주간 마케팅 비용", protected: true },
      { id: "keyword", name: "키워드조합기", protected: true },
      { id: "home", name: "홈", protected: false },
      { id: "about", name: "소개", protected: false }
    ];

    let currentMenus = [];
    let isDarkMode = false;
    let isAuthenticated = false;

    // ============================================
    // 로컬스토리지 관리
    // ============================================
    function loadMenuOrder() { return JSON.parse(localStorage.getItem("menuOrder") || JSON.stringify(defaultMenus)); }
    function saveMenuOrder() { localStorage.setItem("menuOrder", JSON.stringify(currentMenus)); }
    function loadDarkMode() { return localStorage.getItem("darkMode") === "true"; }
    function saveDarkMode() { localStorage.setItem("darkMode", isDarkMode); }
    function loadAuthStatus() { return localStorage.getItem("authenticated") === "true"; }
    function saveAuthStatus() { localStorage.setItem("authenticated", isAuthenticated); }
    function saveBrandName(name) { localStorage.setItem("brandName", name); }
    function loadBrandName() { return localStorage.getItem("brandName") || "Portfolio"; }

    // ============================================
    // 테마 관리
    // ============================================
    function applyTheme() {
      if (isDarkMode) {
        document.body.classList.add("dark-mode");
        document.getElementById("theme-toggle-btn").textContent = "☀️ 라이트모드";
      } else {
        document.body.classList.remove("dark-mode");
        document.getElementById("theme-toggle-btn").textContent = "🌙 다크모드";
      }
      saveDarkMode();
    }

    document.getElementById("theme-toggle-btn").addEventListener("click", () => {
      isDarkMode = !isDarkMode;
      applyTheme();
    });

    // Portfolio 텍스트 수정
    document.getElementById("brand-name").addEventListener("blur", (e) => {
      const newName = e.target.textContent.trim() || "Portfolio";
      e.target.textContent = newName;
      saveBrandName(newName);
    });

    document.getElementById("brand-name").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        e.target.blur();
      }
    });

    // ============================================
    // 메뉴 관리
    // ============================================
    function renderMenus() {
      const container = document.getElementById("menu-container");
      container.innerHTML = "";
      currentMenus.forEach((menu, index) => {
        const btn = document.createElement("button");
        btn.className = "menu-item block w-full text-left px-4 py-3 rounded-xl text-white hover:bg-white hover:text-orange-700 text-sm font-semibold group relative";
        btn.draggable = true;
        btn.dataset.menuId = menu.id;
        btn.dataset.index = index;

        let html = `<span>${menu.name}</span>`;
        if (menu.protected) html += " 🔒";
        html += `<div class="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 space-x-1 flex">
          <button class="menu-edit-btn px-2 py-1 bg-white bg-opacity-20 rounded text-xs">✏️</button>
        </div>`;
        btn.innerHTML = html;

        btn.addEventListener("click", (e) => {
          if (!e.target.classList.contains("menu-edit-btn")) {
            selectMenu(menu);
          }
        });

        btn.querySelector(".menu-edit-btn").addEventListener("click", (e) => {
          e.stopPropagation();
          const newName = prompt("새로운 메뉴명:", menu.name);
          if (newName && newName.trim() && menu.id.startsWith("custom-")) {
            currentMenus[index].name = newName.trim();
            saveMenuOrder();
            renderMenus();
            renderPanels();
          } else if (!menu.id.startsWith("custom-")) {
            alert("기본 메뉴는 이름 수정이 불가능합니다.");
          }
        });

        btn.addEventListener("dragstart", (e) => {
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("dragIndex", index);
        });

        btn.addEventListener("drop", (e) => {
          e.preventDefault();
          const dragIndex = parseInt(e.dataTransfer.getData("dragIndex"));
          if (dragIndex !== index) {
            [currentMenus[dragIndex], currentMenus[index]] = [currentMenus[index], currentMenus[dragIndex]];
            saveMenuOrder();
            renderMenus();
          }
        });

        btn.addEventListener("dragover", (e) => e.preventDefault());
        container.appendChild(btn);
      });
    }

    function selectMenu(menu) {
      if (!isAuthenticated && menu.protected) {
        showPasswordModal(menu);
        return;
      }
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      const panel = document.getElementById(menu.id);
      if (panel) panel.classList.remove("hidden");
    }

    function showPasswordModal(menu) {
      const modal = document.getElementById("password-modal");
      const input = document.getElementById("password-input");
      input.value = "";
      input.focus();

      document.getElementById("password-submit").onclick = () => {
        if (input.value === PASSWORD) {
          isAuthenticated = true;
          saveAuthStatus();
          modal.classList.add("hidden");
          selectMenu(menu);
        } else {
          alert("비밀번호가 올바르지 않습니다.");
          input.value = "";
          input.focus();
        }
      };

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") document.getElementById("password-submit").click();
      });

      modal.classList.remove("hidden");
    }

    document.getElementById("add-menu-btn").addEventListener("click", () => {
      document.getElementById("menu-edit-modal").classList.remove("hidden");
      document.getElementById("new-menu-name").focus();
    });

    document.getElementById("menu-edit-cancel").addEventListener("click", () => {
      document.getElementById("menu-edit-modal").classList.add("hidden");
    });

    document.getElementById("menu-edit-save").addEventListener("click", () => {
      const name = document.getElementById("new-menu-name").value.trim();
      if (name) {
        currentMenus.push({ id: "custom-" + Date.now(), name, protected: false });
        saveMenuOrder();
        renderMenus();
        renderPanels();
        document.getElementById("menu-edit-modal").classList.add("hidden");
      }
    });

    // ============================================
    // 패널 렌더링
    // ============================================
    function renderPanels() {
      const main = document.getElementById("main-content");
      const themeBtn = main.querySelector("#theme-toggle-btn");
      main.innerHTML = `<div class="absolute top-4 right-4">
        <button id="theme-toggle-btn" class="px-4 py-2 rounded-lg text-sm font-semibold bg-gray-200 hover:bg-gray-300 text-gray-800 dark-mode:bg-gray-700 dark-mode:text-white dark-mode:hover:bg-gray-600 transition-colors">${isDarkMode ? "☀️ 라이트모드" : "🌙 다크모드"}</button>
      </div>`;

      document.getElementById("theme-toggle-btn").addEventListener("click", () => {
        isDarkMode = !isDarkMode;
        applyTheme();
      });

      currentMenus.forEach(menu => {
        const section = document.createElement("section");
        section.id = menu.id;
        section.className = "panel hidden";
        section.innerHTML = getPanelHTML(menu.id, menu.name);
        main.appendChild(section);
      });

      // 초기: 홈 표시
      const home = document.getElementById("home");
      if (home) home.classList.remove("hidden");

      // 각 기능 이벤트 설정 및 초기화
      setTimeout(() => {
        setupKeywordCombiner();
        setupWebP();
        renderMonthlyTable();
        renderDailyTable();
      }, 100);
    }

    function getPanelHTML(id, name) {
      if (id === "webp") return getWebPHTML();
      if (id === "stats") return getStatsHTML();
      if (id === "marketing") return getMarketingHTML();
      if (id === "keyword") return getKeywordHTML();
      if (id === "home") {
        const savedHome = localStorage.getItem("homeContent") || "여기에 홈 페이지 내용을 입력하세요.";
        return `<div class="max-w-4xl mx-auto bg-white dark-mode:bg-gray-800 rounded-xl p-8 shadow-lg"><h2 class="text-3xl font-bold mb-4">홈</h2><p class="text-gray-600 dark-mode:text-gray-300 editable" contenteditable="true" id="home-content">${savedHome}</p></div>`;
      }
      if (id === "about") {
        const savedAbout = localStorage.getItem("aboutContent") || "여기에 소개 페이지 내용을 입력하세요.";
        return `<div class="max-w-4xl mx-auto bg-white dark-mode:bg-gray-800 rounded-xl p-8 shadow-lg"><h2 class="text-3xl font-bold mb-4">소개</h2><p class="text-gray-600 dark-mode:text-gray-300 editable" contenteditable="true" id="about-content">${savedAbout}</p></div>`;
      }
      return `<div class="max-w-4xl mx-auto bg-white dark-mode:bg-gray-800 rounded-xl p-8"><h2 class="text-3xl font-bold mb-4">${name}</h2></div>`;
    }

    // ============================================
    // webP 변환 메뉴 (제공된 코드 그대로)
    // ============================================
    function getWebPHTML() {
      return `<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-10"><h1 class="text-3xl font-bold text-center text-gray-900 mb-2">통합 웹 이미지 최적화 도구</h1><p class="text-center text-gray-500 mb-8">업로드 목적에 맞는 구역에 사진을 드래그하세요. (자동 분류 및 최적화)</p><div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-8 flex items-start gap-3"><svg class="w-6 h-6 text-indigo-600 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg><div><h3 class="text-sm font-bold text-indigo-900 mb-1">공통 적용: [유사 문서 회피용] 1px 미세 크롭 AI 회피 기술 탑재</h3><p class="text-xs text-indigo-700 leading-relaxed">업로드되는 모든 사진은 상하좌우 1픽셀(px)이 자동으로 미세하게 잘려 나갑니다. 육안으로는 차이가 없지만, 네이버/구글 검색엔진 비전 AI(Vision AI)의 픽셀 스캔을 교란하여 <strong>타 채널 중복 업로드 시 '유사 이미지'로 묶이는 패널티를 방지</strong>하는 강력한 마케팅 방어 시스템입니다.</p></div></div><div class="mb-12"><div class="flex items-center gap-3 mb-4"><span class="bg-gray-800 text-white text-sm font-bold px-3 py-1 rounded-full">1번 기능</span><h2 class="text-2xl font-bold text-gray-800">공식 홈페이지용 <span class="text-lg font-medium text-gray-500">(초고속 로딩 최적화)</span></h2></div><div class="bg-gray-50 p-5 rounded-xl border border-gray-200 mb-6"><ul class="text-sm text-gray-700 list-disc list-inside space-y-1"><li><span class="font-bold text-gray-900">가로/세로 자동 리사이징:</span> 가로 사진은 <span class="font-bold">폭 1920px</span>, 세로 사진은 <span class="font-bold">폭 1080px</span> 한도 내에서 비율이 유지되며 축소됩니다.</li><li><span class="font-bold text-gray-900">포맷 및 품질:</span> WEBP / 최상급 품질 <span class="font-bold text-blue-600">95%</span> (용량은 대폭 줄이면서 무손실급 화질 유지)</li></ul></div><div id="drop-zone-hq" class="border-2 border-dashed border-green-300 rounded-xl p-10 text-center cursor-pointer transition-colors hover:bg-green-50 group bg-white"><div class="text-green-400 mb-4 group-hover:text-green-500 transition-colors flex justify-center gap-2"><svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg><svg class="h-12 w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg></div><h3 class="text-xl font-bold text-green-800 mb-2">홈페이지용 사진 일괄 업로드</h3><p class="text-sm text-green-600 font-medium mb-1">방향 상관없이 드래그 (1920/1080px 기준 리사이징)</p><input type="file" id="file-hq" multiple accept=".jpg, .jpeg, .png" class="hidden"></div></div><div class="mb-8"><div class="flex items-center gap-3 mb-4"><span class="bg-blue-600 text-white text-sm font-bold px-3 py-1 rounded-full">2번 기능</span><h2 class="text-2xl font-bold text-gray-800">네이버 블로그용 <span class="text-lg font-medium text-gray-500">(고화질 원본 보존 / 20MB 제한)</span></h2></div><div class="bg-blue-50 p-5 rounded-xl border border-blue-100 mb-6"><ul class="text-sm text-blue-800 list-disc list-inside space-y-1"><li><span class="font-bold text-blue-900">원본 해상도 보존 (미세 크롭만 진행):</span> 사용자가 확대해도 텍스트가 깨지지 않도록 이미지 사이즈(폭/높이)를 강제로 줄이지 않습니다. (가장자리 1px 크롭만 적용)</li><li><span class="font-bold text-blue-900">새로운 파일 생성 (SEO):</span> 시각적 퀄리티는 유지하되, WEBP (95%) 확장자로 변환하여 검색엔진이 '새로운 파일'로 인식하게 만듭니다.</li><li><span class="font-bold text-blue-900">20MB 업로드 방어선:</span> 변환 용량이 블로그 제한 20MB를 넘길 경우, <span class="font-bold">19.9MB에 맞춰질 때까지만</span> 해상도를 미세하게 축소하여 업로드 불가 현상을 차단합니다.</li></ul></div><div id="drop-zone-blog" class="border-2 border-dashed border-blue-300 rounded-xl p-10 text-center cursor-pointer transition-colors hover:bg-blue-50 group bg-white"><div class="text-blue-400 mb-4 group-hover:text-blue-500 transition-colors flex justify-center gap-2"><svg class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColo     let convertedFiles = [];

    // [1번 기능] 홈페이지용: 1px 크롭 + 자동 리사이징
    function processWebpResizedAuto(file, quality, targetLandWidth, targetPortWidth) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const objectUrl = URL.createObjectURL(file);
            img.onload = () => {
                const originalWidth = img.width;
                const originalHeight = img.height;
                
                // 핵심 기술: 유사 문서 회피를 위해 1px씩 사방을 잘라냄 (크롭 영역 설정)
                let cropX = 0, cropY = 0, cropW = originalWidth, cropH = originalHeight;
                if (originalWidth > 2 && originalHeight > 2) {
                    cropX = 1; 
                    cropY = 1;
                    cropW = originalWidth - 2; 
                    cropH = originalHeight - 2;
                }

                // 잘려나간 후의 크기(cropW, cropH)를 기준으로 방향 판독
                const orientation = (cropW > cropH) ? 'landscape' : 'portrait';
                const targetWidthLimit = (orientation === 'landscape') ? targetLandWidth : targetPortWidth;

                let targetW = cropW;
                let targetH = cropH;

                // 폭(Width) 기준 리사이징
                if (cropW > targetWidthLimit) {
                    targetW = targetWidthLimit;
                    targetH = Math.round((cropH * targetWidthLimit) / cropW);
                }

                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                
                // 다단계 축소
                if (cropW / 2 > targetW) {
                    let curW = Math.floor(cropW * 0.5);
                    let curH = Math.floor(cropH * 0.5);
                    canvas.width = curW; canvas.height = curH;
                    
                    // 최초 그리기 시 1px 크롭 적용 (drawImage의 소스 좌표 활용)
                    ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, curW, curH);
                    
                    while (curW / 2 > targetW) {
                        let nextW = Math.floor(curW * 0.5);
                        let nextH = Math.floor(curH * 0.5);
                        let tempCanvas = document.createElement('canvas');
                        tempCanvas.width = nextW; tempCanvas.height = nextH;
                        let tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(canvas, 0, 0, curW, curH, 0, 0, nextW, nextH);
                        canvas = tempCanvas; curW = nextW; curH = nextH;
                    }
                    
                    let finalCanvas = document.createElement('canvas');
                    finalCanvas.width = targetW; finalCanvas.height = targetH;
                    let finalCtx = finalCanvas.getContext('2d');
                    finalCtx.imageSmoothingEnabled = true; finalCtx.imageSmoothingQuality = 'high';
                    finalCtx.drawImage(canvas, 0, 0, curW, curH, 0, 0, targetW, targetH);
                    canvas = finalCanvas;
                } else {
                    canvas.width = targetW; canvas.height = targetH;
                    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                    // 크기가 작아 바로 그릴 때도 1px 크롭 적용
                    ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, targetW, targetH);
                }
                
                canvas.toBlob((blob) => {
                    URL.revokeObjectURL(objectUrl);
                    if (blob) resolve({ blob, width: targetW, height: targetH, originalWidth, originalHeight, orientation });
                    else reject(new Error('변환 실패'));
                }, 'image/webp', quality);
            };
            img.onerror = (e) => { URL.revokeObjectURL(objectUrl); reject(e); };
            img.src = objectUrl;
        });
    }

    // [2번 기능] 블로그용: 1px 크롭 + 원본 보존 (20MB 제한 방어)
    function processWebpBlogOriginal(file, quality) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const objectUrl = URL.createObjectURL(file);
            
            img.onload = async () => {
                const originalWidth = img.width;
                const originalHeight = img.height;
                
                // 1px 크롭 설정
                let cropX = 0, cropY = 0, cropW = originalWidth, cropH = originalHeight;
                if (originalWidth > 2 && originalHeight > 2) {
                    cropX = 1; 
                    cropY = 1;
                    cropW = originalWidth - 2; 
                    cropH = originalHeight - 2;
                }

                const orientation = (cropW > cropH) ? 'landscape' : 'portrait';
                const MAX_SAFE_SIZE = 19.9 * 1024 * 1024; 

                // 캔버스에 이미지를 1px 크롭하여 그리고 Blob을 추출하는 함수
                const generateBlobAtScale = (scaleRatio) => {
                    return new Promise((res) => {
                        const targetW = Math.round(cropW * scaleRatio);
                        const targetH = Math.round(cropH * scaleRatio);
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = targetW;
                        canvas.height = targetH;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        
                        // 1px 크롭된 영역만 스케일에 맞춰 그리기
                        ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, targetW, targetH);
                        
                        canvas.toBlob((blob) => {
                            res({ blob: blob, width: targetW, height: targetH });
                        }, 'image/webp', quality);
                    });
                };

                try {
                    let currentScale = 1.0;
                    let resultData = await generateBlobAtScale(currentScale);

                    while (resultData.blob.size > MAX_SAFE_SIZE && currentScale > 0.1) {
                        currentScale -= 0.05;
                        resultData = await generateBlobAtScale(currentScale);
                    }

                    URL.revokeObjectURL(objectUrl);
                    resolve({ 
                        blob: resultData.blob, 
                        width: resultData.width, 
                        height: resultData.height, 
                        originalWidth: originalWidth, 
                        originalHeight: originalHeight,
                        orientation: orientation
                    });
                } catch (error) {
                    URL.revokeObjectURL(objectUrl);
                    reject(error);
                }
            };
            img.onerror = (e) => { URL.revokeObjectURL(objectUrl); reject(e); };
            img.src = objectUrl;
        });
    }

    function setupWebP() {
      const dropHq = document.getElementById('drop-zone-hq');
      const fileHq = document.getElementById('file-hq');
      const dropBlog = document.getElementById('drop-zone-blog');
      const fileBlog = document.getElementById('file-blog');

      if (!dropHq || !fileHq || !dropBlog || !fileBlog) return;

      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');
      const progressStatusText = document.getElementById('progress-status-text');
      
      const resultSection = document.getElementById('result-section');
      const resultList = document.getElementById('result-list');
      const resultCount = document.getElementById('result-count');
      const downloadZipBtn = document.getElementById('download-zip-btn');
      const clearBtn = document.getElementById('clear-btn');

      // 이벤트 바인딩 헬퍼
      function bindEvents(dropZone, fileInput, mode, hoverClass) {
          dropZone.addEventListener('click', () => fileInput.click());
          dropZone.addEventListener('dragover', (e) => {
              e.preventDefault(); dropZone.classList.add(hoverClass);
          });
          dropZone.addEventListener('dragleave', () => dropZone.classList.remove(hoverClass));
          dropZone.addEventListener('drop', (e) => {
              e.preventDefault(); dropZone.classList.remove(hoverClass);
              if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files, mode);
          });
          fileInput.addEventListener('change', (e) => {
              if (e.target.files.length > 0) handleFiles(e.target.files, mode);
          });
      }

      bindEvents(dropHq, fileHq, 'hq', 'drag-over-hq');
      bindEvents(dropBlog, fileBlog, 'blog', 'drag-over-blog');

      clearBtn.addEventListener('click', () => {
          convertedFiles = [];
          resultList.innerHTML = '';
          resultSection.classList.add('hidden');
          fileHq.value = '';
          fileBlog.value = '';
      });

      // ZIP 다운로드
      downloadZipBtn.addEventListener('click', async () => {
          if (convertedFiles.length === 0) return;
          
          const zip = new JSZip();
          const fileNames = new Set();
          
          convertedFiles.forEach((file, index) => {
              let name = file.newName;
              if (fileNames.has(name)) {
                  name = name.replace('.webp', `-${index}.webp`);
              }
              fileNames.add(name);
              zip.file(name, file.blob);
          });

          const originalBtnText = downloadZipBtn.innerHTML;
          downloadZipBtn.innerHTML = `압축 중...`;
          downloadZipBtn.disabled = true;

          try {
              const zipContent = await zip.generateAsync({ type: "blob" });
              const zipUrl = URL.createObjectURL(zipContent);
              const a = document.createElement('a');
              a.href = zipUrl;
              a.download = "optimized_images_pack.zip";
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(zipUrl);
          } catch (error) {
              alert("ZIP 파일 생성 중 오류가 발생했습니다.");
          } finally {
              downloadZipBtn.innerHTML = originalBtnText;
              downloadZipBtn.disabled = false;
          }
      });

      // 메인 핸들러
      async function handleFiles(files, mode) {
          const imageFiles = Array.from(files).filter(file => file.type.match(/image\/(jpeg|png)/i));
          if (imageFiles.length === 0) {
              alert("JPG 또는 PNG 파일만 처리할 수 있습니다."); return;
          }

          resultSection.classList.remove('hidden');
          progressContainer.classList.remove('hidden');
          
          if (mode === 'hq') {
              progressStatusText.textContent = `[홈페이지용] 1px 크롭 및 리사이징 진행 중...`;
          } else {
              progressStatusText.textContent = `[블로그용] 1px 크롭 및 WEBP 변환 중...`;
          }
          
          const total = imageFiles.length;

          for (let i = 0; i < total; i++) {
              const file = imageFiles[i];
              progressText.textContent = `${i + 1} / ${total}`;
              progressBar.style.width = `${((i + 1) / total) * 100}%`;

              try {
                  let resultData;
                  
                  if (mode === 'hq') {
                      resultData = await processWebpResizedAuto(file, 0.95, 1920, 1080);
                  } else {
                      resultData = await processWebpBlogOriginal(file, 0.95);
                  }
                  
                  const isLandscape = resultData.orientation === 'landscape';
                  let badgeText = '';
                  let badgeClass = '';
                  
                  if (mode === 'hq') {
                      badgeText = isLandscape ? '홈 가로 (1px크롭)' : '홈 세로 (1px크롭)';
                      badgeClass = isLandscape ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800';
                  } else {
                      badgeText = isLandscape ? '블로그 가로 (1px크롭)' : '블로그 세로 (1px크롭)';
                      badgeClass = isLandscape ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800';
                  }

                  let baseName = file.name.substring(0, file.name.lastIndexOf('.')).toLowerCase()
                      .replace(/[\s_]+/g, '-').replace(/[^a-z0-9가-힣-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '');
                  if (!baseName) baseName = `image-${Date.now()}`;
                  
                  const suffix = (mode === 'hq') ? '-home' : '-blog';
                  const newName = baseName + suffix + '.webp';
                  
                  const result = {
                      badgeText: badgeText,
                      badgeClass: badgeClass,
                      newName: newName,
                      originalSize: file.size,
                      newSize: resultData.blob.size,
                      originalWidth: resultData.originalWidth, // 크롭 전 순수 원본
                      originalHeight: resultData.originalHeight,
                      finalWidth: resultData.width,
                      finalHeight: resultData.height,
                      blob: resultData.blob,
                      url: URL.createObjectURL(resultData.blob)
                  };
                  
                  convertedFiles.push(result);
                  addResultToTable(result);
              } catch (error) {
                  console.error("변환 실패:", file.name, error);
              }
          }

          setTimeout(() => {
              progressContainer.classList.add('hidden');
              resultCount.textContent = convertedFiles.length;
              fileHq.value = '';
              fileBlog.value = '';
          }, 500);
      }

      // 테이블 출력
      function addResultToTable(result) {
          const tr = document.createElement('tr');
          tr.className = 'bg-white border-b hover:bg-gray-50 transition-colors';
          
          const isReduced = result.newSize < result.originalSize;
          const sizeClass = isReduced ? 'text-green-600' : 'text-red-600';
          const percentage = Math.round(Math.abs(result.originalSize - result.newSize) / result.originalSize * 100);

          let resChangeHtml = '';
          // 원본 해상도와 결과 해상도가 다르면 변경된 것으로 표시 (1px 크롭 포함)
          if (result.originalWidth !== result.finalWidth) {
              resChangeHtml = `<div class="text-[10px] text-gray-500 mt-1">해상도 변경: <span class="line-through">${result.originalWidth}px</span> ➔ <span class="font-bold text-blue-600">${result.finalWidth}px</span></div>`;
              if (result.badgeText.includes('블로그')) {
                  // 블로그용인데 너비가 원본 - 2px 보다 작으면 20MB 제한에 걸려 미세 축소된 것
                  if (result.finalWidth < result.originalWidth - 2) {
                      resChangeHtml += `<div class="text-[10px] text-red-500 font-bold mt-1">※ 20MB 제한으로 자동 미세 축소됨</div>`;
                  } else {
                      resChangeHtml += `<div class="text-[10px] text-indigo-500 font-bold mt-1">※ 유사 회피 (1px 크롭 완료)</div>`;
                  }
              }
          } else {
              resChangeHtml = `<div class="text-[10px] text-gray-500 mt-1">해상도 100% 보존됨</div>`;
          }

          tr.innerHTML = `
              <td class="px-4 py-3">
                  <span class="${result.badgeClass} text-xs font-bold px-2 py-1 rounded-full whitespace-nowrap">${result.badgeText}</span>
              </td>
              <td class="px-4 py-3">
                  <img src="${result.url}" alt="미리보기" class="h-10 w-10 object-cover rounded border border-gray-200">
              </td>
              <td class="px-4 py-3 font-medium text-gray-900">
                  <div class="truncate max-w-[150px]" title="${result.newName}">${result.newName}</div>
              </td>
              <td class="px-4 py-3">
                  <div class="text-xs text-gray-400 line-through">${formatBytes(result.originalSize)}</div>
                  <div class="font-bold ${sizeClass}">${formatBytes(result.newSize)} <span class="text-xs">(-${percentage}%)</span></div>
                  ${resChangeHtml}
              </td>
              <td class="px-4 py-3">
                  <a href="${result.url}" download="${result.newName}" class="text-gray-600 hover:text-black font-bold hover:underline text-sm">
                      다운로드
                  </a>
              </td>
          `;
          resultList.prepend(tr);
      }
    }

    function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    // ============================================
    // 키워드조합기 로직 (제공된 코드를 Vanilla JS로 변환)
    // ============================================
    const keywordState = {
      inputs: { 1: '', 2: '', 3: '', 4: '' },
      output: '',
      combOptions: { c12: true, c13: false, c14: false, c23: false, c24: false, c34: false, c123: true, c124: false, c134: false, c234: false, c1234: true },
      settings: { matchType: 'none', useSpace: true }
    };

      // 텍스트 입력 이벤트
      document.querySelectorAll('.keyword-input').forEach(input => {
        input.addEventListener('input', (e) => {
          keywordState.inputs[e.target.dataset.group] = e.target.value;

      });

      // 띄어쓰기 버튼
      document.querySelectorAll('.keyword-space-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const useSpace = e.target.dataset.space === 'true';
          keywordState.settings.useSpace = useSpace;
          document.querySelectorAll('.keyword-space-btn').forEach(b => {
            b.classList.remove('bg-white', 'dark-mode:text-indigo-400', 'shadow-sm', 'text-indigo-600');

          });
          e.target.classList.add('bg-white', 'dark-mode:text-indigo-400', 'shadow-sm', 'text-indigo-600');
          e.target.classList.remove('text-slate-500', 'dark-mode:text-slate-400');
        });
      });

      // 검색 광고 유형 라디오
      document.querySelectorAll('.keyword-match-type').forEach(radio => {
        radio.addEventListener('change', (e) => {
          keywordState.settings.matchType = e.target.dataset.type;
        });
      });

      // 조합 버튼
      document.getElementById('keyword-combine-btn').addEventListener('click', combineKeywords);

      // 복사 버튼
      document.getElementById('keyword-copy-btn').addEventListener('click', () => {
        const output = document.getElementById('keyword-output');
        if (!output.value) return;
        navigator.clipboard.writeText(output.value).then(() => {
          const btn = document.getElementById('keyword-copy-btn');
          const originalText = btn.innerHTML;
          btn.innerHTML = '✅ 복사됨';
          setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        });
      });
    }

    function combineKeywords() {
      const lists = {
        1: keywordState.inputs[1].split('\\n').map(s => s.trim()).filter(s => s !== ''),
        2: keywordState.inputs[2].split('\\n').map(s => s.trim()).filter(s => s !== ''),
        3: keywordState.inputs[3].split('\\n').map(s => s.trim()).filter(s => s !== ''),
        4: keywordState.inputs[4].split('\\n').map(s => s.trim()).filter(s => s !== '')
      };

      const separator = keywordState.settings.useSpace ? ' ' : '';
      let results = [];

      const getCombinations = (ids) => {
        if (ids.some(id => lists[id].length === 0)) return [];
        let temp = lists[ids[0]];
        for (let i = 1; i < ids.length; i++) {
          let next = [];
          temp.forEach(current => {
            lists[ids[i]].forEach(item => {
              next.push(`${current}${separator}${item}`);
            });
          });
          temp = next;
        }
        return temp;
      };

      if (keywordState.combOptions.c12) results.push(...getCombinations([1, 2]));
      if (keywordState.combOptions.c13) results.push(...getCombinations([1, 3]));
      if (keywordState.combOptions.c14) results.push(...getCombinations([1, 4]));
      if (keywordState.combOptions.c23) results.push(...getCombinations([2, 3]));
      if (keywordState.combOptions.c24) results.push(...getCombinations([2, 4]));
      if (keywordState.combOptions.c34) results.push(...getCombinations([3, 4]));
      if (keywordState.combOptions.c123) results.push(...getCombinations([1, 2, 3]));
      if (keywordState.combOptions.c124) results.push(...getCombinations([1, 2, 4]));
      if (keywordState.combOptions.c134) results.push(...getCombinations([1, 3, 4]));
      if (keywordState.combOptions.c234) results.push(...getCombinations([2, 3, 4]));
      if (keywordState.combOptions.c1234) results.push(...getCombinations([1, 2, 3, 4]));

      let finalResults = [...new Set(results)];

      if (keywordState.settings.matchType === 'exact') {
        finalResults = finalResults.map(kw => `[${kw}]`);
      } else if (keywordState.settings.matchType === 'phrase') {
        finalResults = finalResults.map(kw => `"${kw}"`);
      }

      const output = finalResults.join('\\n');
      document.getElementById('keyword-output').value = output;
      document.getElementById('keyword-result-count').textContent = finalResults.length;
      keywordState.output = output;
    }

    // ============================================
    // 통계 메뉴 함수
    // ============================================
    let monthlyData = [];
    let dailyData = [];

    function renderMonthlyTable() {
      const tbody = document.getElementById('monthly-body');
      if (!tbody) return;
      tbody.innerHTML = '';

      monthlyData.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-300 dark-mode:border-gray-600 hover:bg-gray-50 dark-mode:hover:bg-gray-700';
        let html = `<td class="py-2 px-2 font-bold text-center border-r border-gray-200 dark-mode:border-gray-600 bg-gray-50 dark-mode:bg-gray-700">${row.year}</td>`;

        row.data.forEach(val => {
          html += `<td class="py-2 px-1 text-center border-r border-gray-200 dark-mode:border-gray-600 text-gray-700 dark-mode:text-gray-200">${val}</td>`;
        });

        const avg = Math.round(row.data.reduce((a, b) => a + b, 0) / row.data.length);
        html += `<td class="py-2 px-2 text-center font-bold bg-gray-100 dark-mode:bg-gray-600 text-gray-800 dark-mode:text-gray-100">${avg}</td>`;
        tr.innerHTML = html;
        tbody.appendChild(tr);
      });
    }

    function renderDailyTable() {
      const tbody = document.getElementById('daily-body');
      if (!tbody) return;
      tbody.innerHTML = '';

      dailyData.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-300 dark-mode:border-gray-600 hover:bg-gray-50 dark-mode:hover:bg-gray-700';
        let html = `<td class="py-2 px-2 font-bold text-center border-r border-gray-200 dark-mode:border-gray-600 bg-gray-50 dark-mode:bg-gray-700">${row.year}</td>`;

        row.data.forEach(val => {
          html += `<td class="py-2 px-1 text-center border-r border-gray-200 dark-mode:border-gray-600 text-gray-700 dark-mode:text-gray-200">${val}</td>`;
        });

        const avg = Math.round(row.data.reduce((a, b) => a + b, 0) / row.data.length);
        html += `<td class="py-2 px-2 text-center font-bold bg-gray-100 dark-mode:bg-gray-600 text-gray-800 dark-mode:text-gray-100">${avg}</td>`;
        tr.innerHTML = html;
        tbody.appendChild(tr);
      });
    }

    // 초기 샘플 데이터
    monthlyData = [
      { year: '2026', data: [703, 1012, 2065, 1543, 2143, 1876, 2341, 2098, 1654, 1987, 2234, 1876] }
    ];

    dailyData = [
      { year: '2026', data: [23, 32, 68, 51, 71, 62, 77, 69, 55, 66, 74, 62] }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      renderMonthlyTable();
      renderDailyTable();

      const editBtn = document.getElementById('edit-stats-btn');
      const editPanel = document.getElementById('edit-panel');
      const closeBtn = document.getElementById('close-edit-btn');
      const importBtn = document.getElementById('import-btn');

      if (editBtn) {
        editBtn.addEventListener('click', () => {
          editPanel.classList.toggle('hidden');
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', () => {
          editPanel.classList.add('hidden');
        });
      }

      if (importBtn) {
        importBtn.addEventListener('click', () => {
          const monthlyText = document.getElementById('data-import').value;
          const dailyText = document.getElementById('daily-import').value;

          if (monthlyText) {
            const lines = monthlyText.trim().split('\\n');
            monthlyData = lines.map(line => {
              const parts = line.trim().split(/\\s+/);
              return {
                year: parts[0],
                data: parts.slice(1).map(Number)
              };
            });
          }

          if (dailyText) {
            const lines = dailyText.trim().split('\\n');
            dailyData = lines.map(line => {
              const parts = line.trim().split(/\\s+/);
              return {
                year: parts[0],
                data: parts.slice(1).map(Number)
              };
            });
          }

          renderMonthlyTable();
          renderDailyTable();
          editPanel.classList.add('hidden');
          alert('데이터가 적용되었습니다.');
        });
      }
    });

    // ============================================
    // 초기화
    // ============================================
    function initApp() {
      isDarkMode = loadDarkMode();
      isAuthenticated = loadAuthStatus();
      currentMenus = loadMenuOrder();

      document.getElementById("brand-name").textContent = loadBrandName();
      applyTheme();
      renderMenus();
      renderPanels();

      // 실시간 편집 저장 이벤트 등록
      const main = document.getElementById("main-content");
      if (main) {
        const saveContent = (e) => {
          if (e.target.id === "home-content") {
            localStorage.setItem("homeContent", e.target.innerHTML);
          } else if (e.target.id === "about-content") {
            localStorage.setItem("aboutContent", e.target.innerHTML);
          }
        };
        main.addEventListener("input", saveContent);
        main.addEventListener("blur", saveContent, true);
      }
    }

    window.addEventListener("load", initApp);
  </script>
